<script id="deck-source" type="application/json">{"deckTitle":"Pseudocode LaTeX Preset Demo","slides":[{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":"Mini-batch Stochastic Gradient Descent","kicker":"Same preset works for optimization algorithms too","lede":"","leftMode":"pseudocode-latex","leftHtml":"Input: dataset \\(D = \\{(x_i,y_i)\\}_{i=1}^n\\), batch size \\(B\\), epochs \\(E\\), step size \\(\\eta\\)\nParameters: \\(\\theta = [W^1, b^1, \\ldots, W^T,b^T]\\)\n\nfor \\(e = 1\\) to \\(E\\) do\n  randomly shuffle the dataset\n  split the shuffled data into \\(n/B\\) mini-batches \\(\\mathcal{D}_1, \\dots, \\mathcal{D}_{n/B}\\)\n\n  for \\(j = 1\\) to \\(n/B\\) do\n    \\(g \\leftarrow \\frac{1}{B}\\sum_{(x,y)\\in\\mathcal{D}_j}\\nabla_\\theta \\ell(h_\\theta(x), y)\\)\n    \\(\\theta \\leftarrow \\theta - \\eta g\\)\n  end\nend\n\nreturn \\(\\theta\\)","rightMode":"panel","rightHtml":"","notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":" Backpropagation","kicker":"","lede":"","leftMode":"custom","leftHtml":"","rightMode":"panel","rightHtml":"","notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":"Forward Pass","kicker":"Using the new pseudocode-latex preset","lede":"","leftMode":"pseudocode-latex","leftHtml":"Input: \\(x\\), parameters \\(W^1, b^1 \\dots, W^T, b^T\\)\n\n\\(a^0 \\leftarrow x\\)\nfor \\(t = 1\\) to \\(T\\) do\n  \\(z^t \\leftarrow W^t a^{t-1} + b^t\\)\n  \\(a^t \\leftarrow \\sigma(z^t)\\)\nend\n\n\\(\\hat y \\leftarrow a^T\\)\nreturn \\(\\hat y\\)","rightMode":"panel","rightHtml":"","notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":"Backward Pass","kicker":"Math stays typeset inside the pseudocode block","lede":"","leftMode":"pseudocode-latex","leftHtml":"Input: stored forward-pass values, target \\(y\\)\n\n\\(\\nabla_\\alpha \\ell \\leftarrow \\ell'(\\hat y, y)\\, z^T\\)\n\\(\\nabla_b \\ell \\leftarrow \\ell'(\\hat y, y)\\)\n\\(\\delta^T \\leftarrow \\ell'(\\hat y, y)\\, \\alpha \\odot \\sigma'(u^T)\\)\n\nfor \\(t = T\\) down to \\(1\\) do\n  \\(\\nabla_{W[t]} \\ell \\leftarrow \\delta^t (z^{t-1})^\\top\\)\n  \\(\\nabla_{b^t} \\ell \\leftarrow \\delta^t\\)\n  if \\(t > 1\\) then\n    \\(\\delta^{t-1} \\leftarrow \\sigma'(u^{t-1}) \\odot (W[t])^\\top \\delta^t\\)\n  end\nend\n\nreturn all gradients","rightMode":"panel","rightHtml":""}]}</script>
<style>

    --deck-panel:rgba(10,16,32,.82);
    --deck-line:rgba(255,255,255,.14);

  *{box-sizing:border-box}

  body{color:var(--deck-text);overflow:hidden}

  .col{min-width:0}

  }
  .rich p{color:rgba(17,17,17,.85);font-size:1.26rem;line-height:1.62;padding:1rem 1.15rem}

  .title-center{min-height:720px;display:grid;place-items:center;text-align:center;padding:3rem}
  .title-center h1,.title-center h2{font-size:clamp(3.2rem,8vw,5.6rem);max-width:16ch}
  .slides-button{
    position:absolute;top:1.2rem;right:1.2rem;border:1px solid rgba(17,17,17,.18);background:rgba(255,255,255,.85);
    color:#111;border-radius:999px;padding:.55rem .95rem;font:inherit;font-weight:700;cursor:pointer;backdrop-filter:blur(10px)
  }
  .slide-number{position:absolute;bottom:1.15rem;right:1.4rem;font-size:1rem;color:rgba(17,17,17,.62)}
  .deck-toolbar{position:fixed;left:1rem;top:1rem;display:flex;gap:.65rem;z-index:30}
  .deck-toolbar button,.slide-map button,.nav-btn{
    border:1px solid rgba(255,255,255,.14);background:var(--deck-panel);color:var(--deck-text);
    border-radius:14px;padding:.78rem .95rem;font:inherit;font-weight:700;cursor:pointer;box-shadow:0 18px 45px rgba(0,0,0,.25)
  }
  .slide-map{
    position:fixed;top:0;right:0;height:100svh;width:min(420px,92vw);background:rgba(7,11,23,.96);
    border-left:1px solid rgba(255,255,255,.10);padding:1rem;display:none;z-index:35;overflow:auto
  }
  .slide-map.open{display:block}
  .slide-map h3{margin:.2rem 0 1rem 0;font-size:1.2rem}
  .slide-map-list{display:grid;gap:.6rem}
  .slide-map-item{display:flex;gap:.6rem;align-items:flex-start;text-align:left}
  .slide-map-item span:first-child{opacity:.7;min-width:2.2rem}
  .bullet-card{padding:1rem 1.15rem;background:rgba(127,127,127,.045)}
  .bullet-card b{display:block;margin-bottom:.35rem;font-size:1.12rem}
  .placeholder{min-height:220px;display:grid;place-items:center;color:rgba(17,17,17,.72);padding:1rem 1.15rem;text-align:center}
  .diag{display:grid;place-items:center;padding:.9rem}
  .diagram{width:100%;max-width:680px;height:auto}
  .diagram .edge{stroke:currentColor;stroke-opacity:.32;stroke-width:6;stroke-linecap:round}
  .diagram .node{fill:none;stroke:currentColor;stroke-width:6}
  .diagram .label{fill:currentColor;font:700 28px Inter,system-ui,sans-serif}
  @media (max-width:900px){
    .deck-slide{padding:1.5rem 1.2rem 4.2rem}
    .deck-slide.two-col .slide-body{grid-template-columns:1fr}
    .deck-slide h1{font-size:2.3rem}
    .deck-slide h2{font-size:1.9rem}
  }
</style>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$','$'], ['\\(','\\)']],
    displayMath: [['$$','$$'], ['\\[','\\]']]
  },

<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<div class="deck-toolbar">
  <button class="nav-btn" id="prevBtn">◀</button>
  <button class="nav-btn" id="nextBtn">▶</button>
</div>
<div class="slide-map" id="slideMap">
  <button id="closeMapBtn" style="float:right;">Close</button>
  <h3 id="deckTitle"></h3>
  <div class="slide-map-list" id="slideMapList"></div>
</div>
<div class="deck" id="deck"></div>
<script>
const deckPayload = JSON.parse(document.getElementById('deck-source').textContent);

function escapeHtml(str){
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function preserveMathTokens(str){
  const tokens = [];
  let out = String(str ?? '');
  const patterns = [
    /\$\$[\s\S]+?\$\$/g,
    /\\\[[\s\S]+?\\\]/g,
    /\\\([\s\S]+?\\\)/g,
    /\$(?!\s)[^$\n]+?\$/g
  ];
  patterns.forEach((pattern)=>{
    out = out.replace(pattern, (m)=>{
      const key = '@@MATH' + tokens.length + '@@';
      tokens.push(m);
      return key;
    });
  });
  return { out, tokens };
}
function restoreMathTokens(str, tokens){
  return String(str).replace(/@@MATH(\d+)@@/g, (_, i)=>tokens[Number(i)] ?? '');
}
function hexToRgb(hex){
  const clean = String(hex || '').trim().replace('#','');
  if(!/^[0-9a-fA-F]{3}$|^[0-9a-fA-F]{6}$/.test(clean)) return null;
  const full = clean.length === 3 ? clean.split('').map(c=>c+c).join('') : clean;
  const num = parseInt(full, 16);
  return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
}
function rgbaFromHex(hex, alpha){
  const rgb = hexToRgb(hex);
  if(!rgb) return 'rgba(0,0,0,' + alpha + ')';
  return 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',' + alpha + ')';
}
function buildSlideStyle(slide){
  const bg = slide.bgColor || '#ffffff';
  const font = slide.fontColor || '#111111';
  const muted = rgbaFromHex(font, 0.72);
  const line = rgbaFromHex(font, 0.14);
  return 'background:' + bg + ';color:' + font + ';--text:' + font + ';--muted:' + muted + ';--line:' + line + ';';
}
function parseStructuredText(raw){
  const text = String(raw ?? '').replace(/\r\n/g, '\n').trim();
  if(!text) return '';
  function safeWithMath(str){
    const p = preserveMathTokens(str);
    return restoreMathTokens(escapeHtml(p.out), p.tokens);
  }
  const lines = text.split('\n');
  const parts = [];
  let paragraph = [];
  let listType = null;
  let listItems = [];
  function flushParagraph(){
    if(!paragraph.length) return;
    const joined = paragraph.join(' ').trim();
    if(joined) parts.push('<p>' + safeWithMath(joined) + '</p>');
    paragraph = [];
  }
  function flushList(){
    if(!listItems.length) return;
    const tag = listType === 'enumerate' ? 'ol' : 'ul';
    parts.push('<' + tag + '>' + listItems.map(item=>'<li>' + safeWithMath(item) + '</li>').join('') + '</' + tag + '>');
    listItems = [];
    listType = null;
  }
  function collectUntil(endPattern, startIndex){
    const chunk = [];
    let i = startIndex;
    while(i < lines.length && !endPattern.test(lines[i].trim())){
      chunk.push(lines[i]);
      i += 1;
    }
    return { body: chunk.join('\n').trim(), endIndex: i };
  }
  function simpleCardBody(body){
    const trimmed = body.trim();
    if(!trimmed) return '';
    return trimmed.split(/\n\s*\n/).map(block => '<p>' + safeWithMath(block.replace(/\s*\n\s*/g, ' ').trim()) + '</p>').join('');
  }
  for(let i = 0; i < lines.length; i += 1){
    const line = lines[i].trim();
    if(!line){ flushParagraph(); flushList(); continue; }
    const paragraphMatch = line.match(/^\\paragraph\{([\s\S]*)\}$/);
    if(paragraphMatch){
      flushParagraph(); flushList();
      parts.push('<p>' + safeWithMath(paragraphMatch[1].trim()) + '</p>');
      continue;
    }
    if(/^\\begin\{itemize\}$/i.test(line)){
      flushParagraph(); flushList();
      const items = [];
      i += 1;
      while(i < lines.length && !/^\\end\{itemize\}$/i.test(lines[i].trim())){
        const itemLine = lines[i].trim();
        if(itemLine){
          const itemMatch = itemLine.match(/^\\item\s+([\s\S]*)$/);
          if(itemMatch) items.push(itemMatch[1].trim());
        }
        i += 1;
      }
      parts.push('<ul>' + items.map(item=>'<li>' + safeWithMath(item) + '</li>').join('') + '</ul>');
      continue;
    }
    if(/^\\begin\{enumerate\}$/i.test(line)){
      flushParagraph(); flushList();
      const items = [];
      i += 1;
      while(i < lines.length && !/^\\end\{enumerate\}$/i.test(lines[i].trim())){
        const itemLine = lines[i].trim();
        if(itemLine){
          const itemMatch = itemLine.match(/^\\item\s+([\s\S]*)$/);
          if(itemMatch) items.push(itemMatch[1].trim());
        }
        i += 1;
      }
      parts.push('<ol>' + items.map(item=>'<li>' + safeWithMath(item) + '</li>').join('') + '</ol>');
      continue;
    }
    if(/^\\begin\{equation\}$/i.test(line)){
      flushParagraph(); flushList();
      const collected = collectUntil(/^\\end\{equation\}$/i, i + 1);
      const mathBody = escapeHtml(collected.body);
      parts.push('<div class="display-math">\\[\\begin{aligned}' + mathBody + '\\end{aligned}\\]</div>');
      i = collected.endIndex;
      continue;
    }
    const cardBegin = line.match(/^\\begin\{card\}\{([\s\S]*)\}$/i);
    if(cardBegin){
      flushParagraph(); flushList();
      const collected = collectUntil(/^\\end\{card\}$/i, i + 1);
      parts.push('<div class="bullet-card"><b>' + safeWithMath(cardBegin[1].trim()) + '</b><div>' + simpleCardBody(collected.body) + '</div></div>');
      i = collected.endIndex;
      continue;
    }
    if(/^UL:/i.test(line)){
      flushParagraph();
      if(listType && listType !== 'itemize') flushList();
      listType = 'itemize';
      listItems.push(line.replace(/^UL:/i, '').trim());
      continue;
    }
    if(line.startsWith('- ')){
      flushParagraph();
      if(listType && listType !== 'itemize') flushList();
      listType = 'itemize';
      listItems.push(line.slice(2).trim());
      continue;
    }
    flushList();
    if(line.startsWith('### ')){ flushParagraph(); parts.push('<h3>' + safeWithMath(line.slice(4).trim()) + '</h3>'); continue; }
    if(/^P:/i.test(line)){ flushParagraph(); parts.push('<p>' + safeWithMath(line.replace(/^P:/i, '').trim()) + '</p>'); continue; }
    if(/^EQ:/i.test(line)){ flushParagraph(); parts.push('<div class="display-math">' + safeWithMath(line.replace(/^EQ:/i, '').trim()) + '</div>'); continue; }
    if(/^CARD:/i.test(line)){
      flushParagraph();
      const payload = line.replace(/^CARD:/i, '').trim();
      const pieces = payload.split('|');
      const cardTitle = pieces.shift() || '';
      const cardBody = pieces.join('|');
      parts.push('<div class="bullet-card"><b>' + safeWithMath(cardTitle) + '</b><div><p>' + safeWithMath(cardBody) + '</p></div></div>');
      continue;
    }
    paragraph.push(line);
  }
  flushParagraph();
  flushList();
  return parts.join('\n');
}
function diagramMarkup(){
  return '<div class="diag"><svg class="diagram" viewBox="0 0 760 430" role="img" aria-label="Tiny neural network diagram placeholder"><line x1="145" y1="145" x2="355" y2="125" class="edge"/><line x1="145" y1="145" x2="355" y2="295" class="edge"/><line x1="145" y1="285" x2="355" y2="125" class="edge"/><line x1="145" y1="285" x2="355" y2="295" class="edge"/><line x1="405" y1="125" x2="615" y2="215" class="edge"/><line x1="405" y1="295" x2="615" y2="215" class="edge"/><circle cx="115" cy="145" r="34" class="node"/><circle cx="115" cy="285" r="34" class="node"/><circle cx="375" cy="125" r="34" class="node"/><circle cx="375" cy="295" r="34" class="node"/><circle cx="645" cy="215" r="34" class="node"/><text x="88" y="153" class="label">x₁</text><text x="88" y="293" class="label">x₂</text><text x="350" y="133" class="label">h₁</text><text x="350" y="303" class="label">h₂</text><text x="632" y="223" class="label">ŷ</text></svg></div>';
}
function renderModeContent(mode, raw, placeholderText){
  const resolvedMode = mode || 'panel';
  if(resolvedMode === 'diagram') return diagramMarkup();
  if(resolvedMode === 'custom') return raw || '<div class="placeholder">Paste custom HTML here.</div>';
  if(resolvedMode === 'placeholder') return '<div class="placeholder">' + escapeHtml(raw || placeholderText || 'Placeholder') + '</div>';
  if(resolvedMode === 'pseudocode') return '<pre class="pseudo-block">' + escapeHtml(raw || '') + '</pre>';
  if(resolvedMode === 'pseudocode-latex'){
    const p = preserveMathTokens(raw || '');
    return '<div class="pseudo-latex-block">' + restoreMathTokens(escapeHtml(p.out), p.tokens) + '</div>';
  }
  return '<div class="rich">' + parseStructuredText(raw) + '</div>';
}
function buildSlideInner(slide){
  const heading = slide.headingLevel || 'h2';
  const titleHtml = '<' + heading + '>' + escapeHtml(slide.title || 'Untitled slide').replace(/\n/g,'<br>') + '</' + heading + '>';
  const kickerHtml = slide.kicker ? '<div class="kicker">' + escapeHtml(slide.kicker) + '</div>' : '';
  const ledeHtml = slide.lede ? '<div class="lede">' + escapeHtml(slide.lede) + '</div>' : '';
  if(slide.slideType === 'title-center') return '<div class="title-center">' + titleHtml + kickerHtml + '</div>';
  if(slide.slideType === 'two-col'){
    return titleHtml + kickerHtml + ledeHtml + '<div class="slide-body"><div class="col">' + renderModeContent(slide.leftMode, slide.leftHtml, 'Left-column placeholder') + '</div><div class="col">' + renderModeContent(slide.rightMode, slide.rightHtml, 'Right-column placeholder') + '</div></div>';
  }
  return titleHtml + kickerHtml + ledeHtml + '<div class="slide-body"><div class="col">' + renderModeContent(slide.leftMode, slide.leftHtml, 'Main content placeholder') + '</div></div>';
}
const deck = document.getElementById('deck');
const slideMap = document.getElementById('slideMap');
const slideMapList = document.getElementById('slideMapList');
document.getElementById('deckTitle').textContent = deckPayload.deckTitle || 'Slides';
deck.innerHTML = deckPayload.slides.map((slide, idx)=>{
  const cls = slide.slideType === 'title-center' ? 'deck-slide title-center' : (slide.slideType === 'two-col' ? 'deck-slide two-col' : 'deck-slide single');
  return '<section class="' + cls + '" data-index="' + idx + '" style="' + buildSlideStyle(slide) + '"><button class="slides-button" type="button">Slides</button><div class="slide-number">' + (idx + 1) + ' / ' + deckPayload.slides.length + '</div>' + buildSlideInner(slide).trim() + '</section>';
}).join('\n');
slideMapList.innerHTML = deckPayload.slides.map((slide, idx)=>'<button type="button" class="slide-map-item" data-go="' + idx + '"><span>' + (idx+1) + '.</span><span>' + escapeHtml(slide.title || ('Slide ' + (idx+1))) + '</span></button>').join('');
let active = 0;
const slideEls = Array.from(document.querySelectorAll('.deck-slide'));
function render(){
  slideEls.forEach((el, i)=>el.classList.toggle('active', i === active));
  if(window.MathJax && typeof window.MathJax.typesetPromise === 'function'){
    if(typeof window.MathJax.typesetClear === 'function') window.MathJax.typesetClear(slideEls);
    window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).catch(()=>{});
  }
}
function go(i){
  if(i < 0 || i >= slideEls.length) return;
  active = i;
  render();
  slideMap.classList.remove('open');
}
document.getElementById('prevBtn').addEventListener('click', ()=>go(active-1));
document.getElementById('nextBtn').addEventListener('click', ()=>go(active+1));
document.getElementById('closeMapBtn').addEventListener('click', ()=>slideMap.classList.remove('open'));
document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click', ()=>slideMap.classList.add('open')));
document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click', ()=>go(Number(btn.dataset.go))));
window.addEventListener('keydown', (e)=>{
  if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); go(active+1); }
  if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); go(active-1); }
  if(e.key === 'Escape') slideMap.classList.remove('open');
});
render();
</script>
</body>
