<script id="deck-source" type="application/json">{"deckTitle":"My HTML Presentation","theme":{"name":"Default theme","bgColor":"#ffffff","fontColor":"#111111","accentColor":"#2f6fed","panelRadius":22,"titleScale":1},"slides":[{"slideType":"title-center","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"My presentation","kicker":"","lede":"Introduce the main idea in one short sentence.\nDfdfdfdf\n","leftBlocks":[{"mode":"panel","title":"Main points","content":"\\paragraph{Core idea}\n\n\\begin{itemize}\n\\item First point\n\\item Second point\n\\item Third point\n\\end{itemize}"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":"Concept slide","kicker":"","lede":"Introduce the main idea in one short sentence.","leftBlocks":[{"mode":"custom","title":"Main points","content":"<style>\n  .conv-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .conv-demo *{box-sizing:border-box}\n  .conv-demo .topbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:center;\n    margin-bottom:12px;\n  }\n  .conv-demo .controls{\n    display:flex;\n    flex-wrap:wrap;\n    gap:8px;\n    align-items:center;\n  }\n  .conv-demo button,\n  .conv-demo input[type=\"number\"],\n  .conv-demo input[type=\"range\"],\n  .conv-demo input[type=\"file\"]{\n    font:inherit;\n  }\n  .conv-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:7px 10px;\n    cursor:pointer;\n  }\n  .conv-demo button:hover{background:#f6f6f6}\n  .conv-demo .kernel-box{\n    display:grid;\n    grid-template-columns:repeat(3, 58px);\n    gap:6px;\n    align-items:center;\n  }\n  .conv-demo .kernel-box input{\n    width:58px;\n    padding:6px 4px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n  }\n  .conv-demo .layout{\n    display:grid;\n    grid-template-columns:minmax(260px,1fr) 210px minmax(260px,1fr);\n    gap:14px;\n    align-items:start;\n  }\n  .conv-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:14px;\n    padding:10px;\n    background:#fafafa;\n  }\n  .conv-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .conv-demo canvas{\n    display:block;\n    width:100%;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:10px;\n  }\n  .conv-demo .stats{\n    display:grid;\n    gap:6px;\n    margin-top:8px;\n    font-size:13px;\n    color:#444;\n  }\n  .conv-demo .kernel-preview{\n    margin-top:10px;\n    display:grid;\n    grid-template-columns:repeat(3, 1fr);\n    gap:4px;\n  }\n  .conv-demo .kernel-preview div{\n    border:1px solid rgba(0,0,0,.1);\n    border-radius:8px;\n    padding:8px 4px;\n    text-align:center;\n    background:#fff;\n    font-size:13px;\n  }\n  .conv-demo .tiny{\n    font-size:12px;\n    color:#555;\n  }\n  .conv-demo .legend{\n    margin-top:8px;\n    font-size:12px;\n    color:#555;\n    line-height:1.35;\n  }\n  .conv-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .conv-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  @media (max-width: 920px){\n    .conv-demo .layout{\n      grid-template-columns:1fr;\n    }\n  }\n</style>\n\n<div class=\"conv-demo\" id=\"convDemoRoot\">\n  <div class=\"topbar\">\n    <div class=\"controls\">\n      <label><strong>Load image</strong></label>\n      <input type=\"file\" accept=\"image/*\" id=\"imgFileInput\">\n      <button id=\"sampleBtn\" type=\"button\">Use sample</button>\n    </div>\n\n    <div class=\"controls\">\n      <button id=\"playBtn\" type=\"button\">Play</button>\n      <button id=\"pauseBtn\" type=\"button\">Pause</button>\n      <button id=\"stepBtn\" type=\"button\">Step</button>\n      <button id=\"resetBtn\" type=\"button\">Reset</button>\n    </div>\n\n    <div class=\"controls\">\n      <label for=\"speedRange\"><strong>Speed</strong></label>\n      <input id=\"speedRange\" type=\"range\" min=\"0.01\" max=\"30\" step=\"0.01\" value=\"10\">\n      <span id=\"speedLabel\">10.00 ms</span>\n    </div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Grayscale input image</h4>\n      <canvas id=\"inputCanvas\" width=\"420\" height=\"420\"></canvas>\n      <div class=\"stats\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Load an image or use the sample.</span></div>\n        <div><strong>Current window:</strong> <span id=\"windowText\">—</span></div>\n        <div><strong>Current sum:</strong> <span id=\"sumText\">—</span></div>\n      </div>\n      <div class=\"legend\">\n        The red square shows the current 3×3 receptive field. The uploaded image is converted to grayscale first, so the convolution runs on a single-channel input.\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>3×3 filter</h4>\n      <div class=\"kernel-box\" id=\"kernelBox\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"0\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"1\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"2\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"3\">\n        <input type=\"number\" step=\"any\" value=\"5\" data-k=\"4\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"5\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"6\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"7\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"8\">\n      </div>\n      <div class=\"tiny\" style=\"margin-top:8px;\">\n        Edit any entry. Reset or Play recomputes using the current filter.\n      </div>\n\n      <div class=\"kernel-preview\" id=\"kernelPreview\"></div>\n\n      <div class=\"legend\">\n        Output shown on the right is <em>valid convolution</em>, so the result size is\n        <span id=\"sizeText\">input−2 by input−2</span>.\n      </div>\n\n      <div class=\"progress\"><div id=\"progressBar\"></div></div>\n      <div class=\"tiny\" style=\"margin-top:8px;\">\n        Progress: <span id=\"progressText\">0 / 0</span>\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Animated convolution output</h4>\n      <canvas id=\"outputCanvas\" width=\"420\" height=\"420\"></canvas>\n      <div class=\"stats\">\n        <div><strong>Output range:</strong> <span id=\"rangeText\">—</span></div>\n        <div><strong>Finished:</strong> <span id=\"doneText\">No</span></div>\n      </div>\n      <div class=\"legend\">\n        Darker/lighter output pixels reflect the accumulated filter response at each valid position as the scan progresses.\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('convDemoRoot');\n  if(!root) return;\n\n  const inputCanvas = root.querySelector('#inputCanvas');\n  const outputCanvas = root.querySelector('#outputCanvas');\n  const inCtx = inputCanvas.getContext('2d');\n  const outCtx = outputCanvas.getContext('2d');\n\n  const imgFileInput = root.querySelector('#imgFileInput');\n  const sampleBtn = root.querySelector('#sampleBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n  const speedRange = root.querySelector('#speedRange');\n  const speedLabel = root.querySelector('#speedLabel');\n\n  const statusText = root.querySelector('#statusText');\n  const windowText = root.querySelector('#windowText');\n  const sumText = root.querySelector('#sumText');\n  const rangeText = root.querySelector('#rangeText');\n  const doneText = root.querySelector('#doneText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const sizeText = root.querySelector('#sizeText');\n\n  const kernelInputs = Array.from(root.querySelectorAll('[data-k]'));\n  const kernelPreview = root.querySelector('#kernelPreview');\n\n  let gray = null;\n  let inW = 0, inH = 0;\n  let outW = 0, outH = 0;\n  let outVals = [];\n  let stepIndex = 0;\n  let timer = null;\n  let finished = false;\n\n  function kernelValues(){\n    return kernelInputs.map(el => Number(el.value || 0));\n  }\n\n  function refreshKernelPreview(){\n    const vals = kernelValues();\n    kernelPreview.innerHTML = vals.map(v => '<div>' + String(v) + '</div>').join('');\n  }\n\n  function clamp(v, a, b){\n    return Math.max(a, Math.min(b, v));\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function defaultSample(){\n    const w = 32, h = 32;\n    const arr = new Uint8ClampedArray(w * h);\n    for(let y = 0; y < h; y++){\n      for(let x = 0; x < w; x++){\n        let v = 30 + x * 4 + y * 2;\n        if(x > 8 && x < 24 && y > 8 && y < 24) v += 80;\n        if((x - 16) * (x - 16) + (y - 16) * (y - 16) < 25) v = 220;\n        arr[y * w + x] = clamp(v, 0, 255);\n      }\n    }\n    setGrayImage(arr, w, h);\n  }\n\n  function setGrayImage(arr, w, h){\n    gray = arr;\n    inW = w;\n    inH = h;\n    outW = Math.max(0, inW - 2);\n    outH = Math.max(0, inH - 2);\n    outVals = new Array(outW * outH).fill(null);\n    stepIndex = 0;\n    finished = false;\n    sizeText.textContent = outW + ' × ' + outH;\n    doneText.textContent = 'No';\n    setStatus('Ready.');\n    windowText.textContent = '—';\n    sumText.textContent = '—';\n    rangeText.textContent = '—';\n    drawInput();\n    drawOutput();\n    updateProgress();\n  }\n\n  function loadImageFile(file){\n    const reader = new FileReader();\n    reader.onload = () => {\n      const img = new Image();\n      img.onload = () => {\n        const maxSide = 128; // higher-resolution uploaded image size\n        let w = img.width;\n        let h = img.height;\n        const scale = Math.min(1, maxSide / Math.max(w, h));\n        w = Math.max(3, Math.round(w * scale));\n        h = Math.max(3, Math.round(h * scale));\n\n        const c = document.createElement('canvas');\n        c.width = w;\n        c.height = h;\n        const ctx = c.getContext('2d');\n        ctx.drawImage(img, 0, 0, w, h);\n        const data = ctx.getImageData(0, 0, w, h).data;\n        const arr = new Uint8ClampedArray(w * h);\n\n        for(let i = 0; i < w * h; i++){\n          const r = data[4 * i + 0];\n          const g = data[4 * i + 1];\n          const b = data[4 * i + 2];\n          arr[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);\n        }\n        setGrayImage(arr, w, h);\n      };\n      img.src = reader.result;\n    };\n    reader.readAsDataURL(file);\n  }\n\n  function drawInput(currentX, currentY){\n    inCtx.clearRect(0, 0, inputCanvas.width, inputCanvas.height);\n    inCtx.fillStyle = '#fff';\n    inCtx.fillRect(0, 0, inputCanvas.width, inputCanvas.height);\n    if(!gray) return;\n\n    const img = inCtx.createImageData(inW, inH);\n    for(let i = 0; i < gray.length; i++){\n      const v = gray[i];\n      img.data[4*i+0] = v;\n      img.data[4*i+1] = v;\n      img.data[4*i+2] = v;\n      img.data[4*i+3] = 255;\n    }\n\n    const temp = document.createElement('canvas');\n    temp.width = inW;\n    temp.height = inH;\n    temp.getContext('2d').putImageData(img, 0, 0);\n\n    inCtx.imageSmoothingEnabled = false;\n    inCtx.drawImage(temp, 0, 0, inputCanvas.width, inputCanvas.height);\n\n    if(typeof currentX === 'number' && typeof currentY === 'number'){\n      const cellW = inputCanvas.width / inW;\n      const cellH = inputCanvas.height / inH;\n      inCtx.strokeStyle = '#e11d48';\n      inCtx.lineWidth = 2.5;\n      inCtx.strokeRect(currentX * cellW, currentY * cellH, 3 * cellW, 3 * cellH);\n    }\n  }\n\n  function currentOutputRange(){\n    const vals = outVals.filter(v => v !== null && Number.isFinite(v));\n    if(!vals.length) return null;\n    return {\n      min: Math.min(...vals),\n      max: Math.max(...vals)\n    };\n  }\n\n  function drawOutput(){\n    outCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);\n    outCtx.fillStyle = '#fff';\n    outCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);\n\n    if(outW <= 0 || outH <= 0) return;\n\n    const range = currentOutputRange();\n    if(!range){\n      rangeText.textContent = '—';\n      return;\n    }\n    rangeText.textContent = range.min.toFixed(2) + ' to ' + range.max.toFixed(2);\n\n    const temp = document.createElement('canvas');\n    temp.width = outW;\n    temp.height = outH;\n    const tctx = temp.getContext('2d');\n    const img = tctx.createImageData(outW, outH);\n    const span = Math.max(1e-9, range.max - range.min);\n\n    for(let i = 0; i < outVals.length; i++){\n      let v = outVals[i];\n      let g = 235;\n      if(v !== null && Number.isFinite(v)){\n        g = Math.round(255 * (v - range.min) / span);\n      }\n      img.data[4*i+0] = g;\n      img.data[4*i+1] = g;\n      img.data[4*i+2] = g;\n      img.data[4*i+3] = 255;\n    }\n    tctx.putImageData(img, 0, 0);\n\n    outCtx.imageSmoothingEnabled = false;\n    outCtx.drawImage(temp, 0, 0, outputCanvas.width, outputCanvas.height);\n  }\n\n  function convAt(x, y){\n    const k = kernelValues();\n    let s = 0;\n    let t = 0;\n    for(let dy = 0; dy < 3; dy++){\n      for(let dx = 0; dx < 3; dx++){\n        s += gray[(y + dy) * inW + (x + dx)] * k[t++];\n      }\n    }\n    return s;\n  }\n\n  function updateProgress(){\n    const total = outW * outH;\n    progressText.textContent = stepIndex + ' / ' + total;\n    const pct = total ? (100 * stepIndex / total) : 0;\n    progressBar.style.width = pct + '%';\n  }\n\n  function doStep(){\n    if(!gray || outW <= 0 || outH <= 0){\n      setStatus('Load an image first.');\n      return;\n    }\n    if(stepIndex >= outW * outH){\n      finished = true;\n      doneText.textContent = 'Yes';\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const x = stepIndex % outW;\n    const y = Math.floor(stepIndex / outW);\n    const v = convAt(x, y);\n    outVals[stepIndex] = v;\n    stepIndex += 1;\n\n    drawInput(x, y);\n    drawOutput();\n    windowText.textContent = '(' + x + ', ' + y + ')';\n    sumText.textContent = v.toFixed(2);\n    updateProgress();\n\n    if(stepIndex >= outW * outH){\n      finished = true;\n      doneText.textContent = 'Yes';\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      doneText.textContent = 'No';\n      setStatus('Running...');\n    }\n  }\n\n  function resetConvolution(){\n    stopTimer();\n    if(!gray) return;\n    outVals = new Array(outW * outH).fill(null);\n    stepIndex = 0;\n    finished = false;\n    doneText.textContent = 'No';\n    windowText.textContent = '—';\n    sumText.textContent = '—';\n    rangeText.textContent = '—';\n    drawInput();\n    drawOutput();\n    updateProgress();\n    setStatus('Reset.');\n  }\n\n  function play(){\n    if(!gray){\n      setStatus('Load an image first.');\n      return;\n    }\n    stopTimer();\n    const ms = Math.max(0.01, Number(speedRange.value || 10));\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n\n  speedRange.addEventListener('input', () => {\n    speedLabel.textContent = Number(speedRange.value).toFixed(2) + ' ms';\n    if(timer) play();\n  });\n\n  imgFileInput.addEventListener('change', (e) => {\n    const file = e.target.files && e.target.files[0];\n    if(file) loadImageFile(file);\n  });\n\n  sampleBtn.addEventListener('click', defaultSample);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', () => { stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', () => { stopTimer(); doStep(); });\n  resetBtn.addEventListener('click', resetConvolution);\n  kernelInputs.forEach(inp => inp.addEventListener('input', () => {\n    refreshKernelPreview();\n    if(gray) resetConvolution();\n  }));\n\n  refreshKernelPreview();\n  defaultSample();\n})();\n<\/script>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""}]}</script>
<style>
:root{--deck-bg:#060a16;--deck-panel:rgba(10,16,32,.82);--deck-text:#eef3ff}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,#17214a 0%,var(--deck-bg) 45%,#070b17 100%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{color:var(--deck-text);overflow:hidden}
.deck{position:relative;width:100vw;height:100svh}
.deck-slide{display:none;position:absolute;inset:0;overflow:auto;padding:3.2rem 3.5rem 5rem;background:#fff;color:#111}
.deck-slide.active{display:block}
.deck-slide h1,.deck-slide h2{margin:0;line-height:1.05}

.kicker{margin-top:.8rem;color:rgba(17,17,17,.72);font-size:1.05rem;line-height:1.45;max-width:70ch}
.lede{margin-top:.9rem;color:rgba(17,17,17,.72);font-size:1.18rem;line-height:1.5;max-width:70ch}
.slide-body{margin-top:1.35rem}.deck-slide.single .slide-body{display:block}.deck-slide.two-col .slide-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1.35rem;align-items:start}
.col{min-width:0}.col-stack{display:grid;gap:1rem}
.rich{display:grid;gap:1rem}
.rich p,.rich ul,.rich ol,.rich h3,.display-math,.bullet-card,.placeholder,.diag,.pseudo-block,.pseudo-latex-block,.custom-frame-wrap{margin:0;border:1px solid rgba(17,17,17,.12);border-radius:var(--radius,22px);background:rgba(127,127,127,.045);box-shadow:0 8px 24px rgba(0,0,0,.04)}
.rich p{color:rgba(17,17,17,.85);font-size:1.26rem;line-height:1.62;padding:1rem 1.15rem}
.rich ul,.rich ol{color:rgba(17,17,17,.85);font-size:1.22rem;line-height:1.58;padding:1rem 1.2rem 1rem 2.3rem}
.rich li{margin:.5rem 0;color:rgba(17,17,17,.85);font-size:1.22rem;line-height:1.58}
.rich h3{font-size:1.3rem;color:inherit;padding:.95rem 1.15rem}
.display-math{font-size:1.2rem;padding:1rem 1.15rem;overflow-x:auto}
.pseudo-block,.pseudo-latex-block{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:1.08rem;line-height:1.62;white-space:pre-wrap;tab-size:2;padding:1rem 1.15rem;overflow-x:auto;color:rgba(17,17,17,.9)}
.pseudo-latex-block mjx-container{font-size:100% !important}
.bullet-card{padding:1rem 1.15rem;background:rgba(127,127,127,.045)}.bullet-card b{display:block;margin-bottom:.35rem;font-size:1.12rem}
.placeholder{min-height:220px;display:grid;place-items:center;color:rgba(17,17,17,.72);padding:1rem 1.15rem;text-align:center}
.deck-slide .figure-embed{padding:0 !important;background:transparent !important;border:0 !important;box-shadow:none !important;overflow:visible !important;display:block;min-height:0;position:relative;width:fit-content;max-width:100%;margin:.2rem auto}
.deck-slide .figure-embed figure{margin:0;width:auto;height:auto;display:inline-flex;align-items:center;justify-content:center;overflow:visible;max-width:100%}
.deck-slide .figure-embed img,.deck-slide .figure-embed svg,.deck-slide .figure-embed canvas,.deck-slide .figure-embed iframe{display:block;max-width:100%;max-height:100%;width:auto;height:auto;margin:0 auto;object-fit:contain;pointer-events:none}
.deck-slide .figure-embed svg{overflow:visible}
.deck-slide .figure-embed svg *,.deck-slide .figure-embed figure *{pointer-events:none}
.deck-slide .figure-box{position:relative;display:inline-block;overflow:visible;padding:10px;background:#fff;border:1px solid rgba(17,17,17,.18);border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);touch-action:none;cursor:grab}
.deck-slide .figure-box.selected{outline:2px solid #61b4ff;outline-offset:2px}
.deck-slide .figure-box > img,.deck-slide .figure-box > svg,.deck-slide .figure-box > canvas,.deck-slide .figure-box > iframe,.deck-slide .figure-box > figure{display:block;width:100%;height:100%;max-width:100%;max-height:100%;pointer-events:none}
.deck-slide .figure-resize-handle{position:absolute;right:-8px;bottom:-8px;width:18px;height:18px;border-radius:50%;background:#61b4ff;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:nwse-resize;pointer-events:auto}
.custom-frame-wrap{overflow:hidden;background:#fff}.custom-frame{width:100%;height:720px;border:0;display:block;background:#fff}

<body>
<div class="deck-toolbar"><button class="nav-btn" id="prevBtn">◀</button><button class="nav-btn" id="nextBtn">▶</button></div>
<div class="slide-map" id="slideMap"><button id="closeMapBtn" style="float:right;">Close</button><h3 id="deckTitle"></h3><div class="slide-map-list" id="slideMapList"></div></div>
<div class="deck" id="deck"></div>
<script>
const deckPayload=JSON.parse(document.getElementById('deck-source').textContent);
function escapeHtml(str){return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escapeAttr(str){return escapeHtml(str).replace(/\n/g,'&#10;');}
function preserveMathTokens(str){const tokens=[];let out=String(str??'');const patterns=[/\$\$[\s\S]+?\$\$/g,/\\\[[\s\S]+?\\\]/g,/\\\([\s\S]+?\\\)/g,/\$(?!\s)[^$\n]+?\$/g];patterns.forEach(pattern=>{out=out.replace(pattern,m=>{const key='@@MATH'+tokens.length+'@@';tokens.push(m);return key;});});return {out,tokens};}
function restoreMathTokens(str,tokens){return String(str).replace(/@@MATH(\d+)@@/g,(_,i)=>tokens[Number(i)]??'');}
function hexToRgb(hex){const clean=String(hex||'').trim().replace('#','');if(!/^[0-9a-fA-F]{3}$|^[0-9a-fA-F]{6}$/.test(clean)) return null;const full=clean.length===3?clean.split('').map(c=>c+c).join(''):clean;const num=parseInt(full,16);return {r:(num>>16)&255,g:(num>>8)&255,b:num&255};}
function rgbaFromHex(hex,alpha){const rgb=hexToRgb(hex);if(!rgb) return 'rgba(0,0,0,'+alpha+')';return 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+alpha+')';}
function normalizeTheme(theme){const t=theme||{};return {name:t.name||'Default theme',bgColor:t.bgColor||'#ffffff',fontColor:t.fontColor||'#111111',accentColor:t.accentColor||'#2f6fed',panelRadius:Number.isFinite(Number(t.panelRadius))?Number(t.panelRadius):22,titleScale:Number.isFinite(Number(t.titleScale))?Number(t.titleScale):1};}function isTwoColType(type){return ['two-col','title-two-callouts','title-figure-explanation','comparison','image-left-text-right'].includes(type);}function buildSlideStyle(slide,theme=deckPayload.theme){const t=normalizeTheme(theme);const useTheme=slide.inheritTheme!==false;const bg=useTheme?t.bgColor:(slide.bgColor||t.bgColor);const font=useTheme?t.fontColor:(slide.fontColor||t.fontColor);const muted=rgbaFromHex(font,0.72);const line=rgbaFromHex(font,0.14);return 'background:'+bg+';color:'+font+';--text:'+font+';--muted:'+muted+';--line:'+line+';--accent:'+t.accentColor+';--radius:'+t.panelRadius+'px;--title-scale:'+t.titleScale+';';}
function parseStructuredText(raw){const text=String(raw??'').replace(/\r\n/g,'\n').trim();if(!text)return '';function safeWithMath(str){const p=preserveMathTokens(str);return restoreMathTokens(escapeHtml(p.out),p.tokens);}const lines=text.split('\n');const parts=[];let paragraph=[];let listType=null;let listItems=[];function flushParagraph(){if(!paragraph.length)return;const joined=paragraph.join(' ').trim();if(joined)parts.push('<p>'+safeWithMath(joined)+'</p>');paragraph=[];}function flushList(){if(!listItems.length)return;const tag=listType==='enumerate'?'ol':'ul';parts.push('<'+tag+'>'+listItems.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</'+tag+'>');listItems=[];listType=null;}function collectUntil(endPattern,startIndex){const chunk=[];let i=startIndex;while(i<lines.length&&!endPattern.test(lines[i].trim())){chunk.push(lines[i]);i+=1;}return {body:chunk.join('\n').trim(),endIndex:i};}function simpleCardBody(body){const trimmed=body.trim();if(!trimmed)return '';return trimmed.split(/\n\s*\n/).map(block=>'<p>'+safeWithMath(block.replace(/\s*\n\s*/g,' ').trim())+'</p>').join('');}
for(let i=0;i<lines.length;i+=1){const line=lines[i].trim();if(!line){flushParagraph();flushList();continue;}const paragraphMatch=line.match(/^\\paragraph\{([\s\S]*)\}$/);if(paragraphMatch){flushParagraph();flushList();parts.push('<p>'+safeWithMath(paragraphMatch[1].trim())+'</p>');continue;}if(/^\\begin\{itemize\}$/i.test(line)){flushParagraph();flushList();const items=[];i+=1;while(i<lines.length&&!/^\\end\{itemize\}$/i.test(lines[i].trim())){const itemLine=lines[i].trim();if(itemLine){const itemMatch=itemLine.match(/^\\item\s+([\s\S]*)$/);if(itemMatch)items.push(itemMatch[1].trim());}i+=1;}parts.push('<ul>'+items.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</ul>');continue;}if(/^\\begin\{enumerate\}$/i.test(line)){flushParagraph();flushList();const items=[];i+=1;while(i<lines.length&&!/^\\end\{enumerate\}$/i.test(lines[i].trim())){const itemLine=lines[i].trim();if(itemLine){const itemMatch=itemLine.match(/^\\item\s+([\s\S]*)$/);if(itemMatch)items.push(itemMatch[1].trim());}i+=1;}parts.push('<ol>'+items.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</ol>');continue;}if(/^\\begin\{equation\}$/i.test(line)){flushParagraph();flushList();const collected=collectUntil(/^\\end\{equation\}$/i,i+1);parts.push('<div class="display-math">\\[\\begin{aligned}'+escapeHtml(collected.body)+'\\end{aligned}\\]</div>');i=collected.endIndex;continue;}const cardBegin=line.match(/^\\begin\{card\}\{([\s\S]*)\}$/i);if(cardBegin){flushParagraph();flushList();const collected=collectUntil(/^\\end\{card\}$/i,i+1);parts.push('<div class="bullet-card"><b>'+safeWithMath(cardBegin[1].trim())+'</b><div>'+simpleCardBody(collected.body)+'</div></div>');i=collected.endIndex;continue;}if(/^\\begin\{figurehtml\}$/i.test(line)){flushParagraph();flushList();const collected=collectUntil(/^\\end\{figurehtml\}$/i,i+1);parts.push('<div class="figure-embed">'+collected.body+'</div>');i=collected.endIndex;continue;}if(/^UL:/i.test(line)){flushParagraph();if(listType&&listType!=='itemize')flushList();listType='itemize';listItems.push(line.replace(/^UL:/i,'').trim());continue;}if(line.startsWith('- ')){flushParagraph();if(listType&&listType!=='itemize')flushList();listType='itemize';listItems.push(line.slice(2).trim());continue;}flushList();if(line.startsWith('### ')){flushParagraph();parts.push('<h3>'+safeWithMath(line.slice(4).trim())+'</h3>');continue;}if(/^P:/i.test(line)){flushParagraph();parts.push('<p>'+safeWithMath(line.replace(/^P:/i,'').trim())+'</p>');continue;}if(/^EQ:/i.test(line)){flushParagraph();parts.push('<div class="display-math">'+safeWithMath(line.replace(/^EQ:/i,'').trim())+'</div>');continue;}if(/^CARD:/i.test(line)){flushParagraph();const payload=line.replace(/^CARD:/i,'').trim();const pieces=payload.split('|');const cardTitle=pieces.shift()||'';const cardBody=pieces.join('|');parts.push('<div class="bullet-card"><b>'+safeWithMath(cardTitle)+'</b><div><p>'+safeWithMath(cardBody)+'</p></div></div>');continue;}paragraph.push(line);}flushParagraph();flushList();return parts.join('\n');}
function diagramMarkup(){return '<div class="diag"><svg class="diagram" viewBox="0 0 760 430" role="img" aria-label="Tiny neural network diagram placeholder"><line x1="145" y1="145" x2="355" y2="125" class="edge"/><line x1="145" y1="145" x2="355" y2="295" class="edge"/><line x1="145" y1="285" x2="355" y2="125" class="edge"/><line x1="145" y1="285" x2="355" y2="295" class="edge"/><line x1="405" y1="125" x2="615" y2="215" class="edge"/><line x1="405" y1="295" x2="615" y2="215" class="edge"/><circle cx="115" cy="145" r="34" class="node"/><circle cx="115" cy="285" r="34" class="node"/><circle cx="375" cy="125" r="34" class="node"/><circle cx="375" cy="295" r="34" class="node"/><circle cx="645" cy="215" r="34" class="node"/><text x="88" y="153" class="label">x₁</text><text x="88" y="293" class="label">x₂</text><text x="350" y="133" class="label">h₁</text><text x="350" y="303" class="label">h₂</text><text x="632" y="223" class="label">ŷ</text></svg></div>';}
function customFrameMarkup(raw){const html=String(raw||'').trim();if(!html)return '<div class="placeholder">Paste custom HTML here.</div>';return '<div class="custom-frame-wrap"><iframe class="custom-frame" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-downloads" referrerpolicy="no-referrer" srcdoc="'+escapeAttr(html)+'"></iframe></div>';}
function normalizeBlock(block){const mode=block.mode||'panel';if(mode==='diagram'){return {mode:'custom',title:block.title||'Legacy diagram',content:'<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}.diag{display:grid;place-items:center;padding:.9rem}.diagram{width:100%;max-width:680px;height:auto}.diagram .edge{stroke:currentColor;stroke-opacity:.32;stroke-width:6;stroke-linecap:round}.diagram .node{fill:none;stroke:currentColor;stroke-width:6}.diagram .label{fill:currentColor;font:700 28px Inter,system-ui,sans-serif}</style></head><body>'+(block.content||diagramMarkup())+'</body></html>'};}return {mode:mode,title:block.title||'',content:block.content||''};}
function normalizeSlide(slide){const out=JSON.parse(JSON.stringify(slide||{}));let leftBlocks=Array.isArray(out.leftBlocks)?out.leftBlocks.map(normalizeBlock):null;let rightBlocks=Array.isArray(out.rightBlocks)?out.rightBlocks.map(normalizeBlock):null;if(!leftBlocks){leftBlocks=[{mode:out.leftMode||'panel',title:'',content:out.leftHtml||''}];}if(!rightBlocks){rightBlocks=isTwoColType(out.slideType)?[{mode:out.rightMode||'panel',title:'',content:out.rightHtml||''}]:[];}out.leftBlocks=leftBlocks;out.rightBlocks=rightBlocks;out.inheritTheme=out.inheritTheme!==false;return out;}
function renderBlock(block,placeholderText){const resolvedMode=block.mode||'panel';const raw=block.content||'';if(resolvedMode==='diagram')return diagramMarkup();if(resolvedMode==='custom')return customFrameMarkup(raw);if(resolvedMode==='placeholder')return '<div class="placeholder">'+escapeHtml(raw||placeholderText||'Placeholder')+'</div>';if(resolvedMode==='pseudocode')return '<pre class="pseudo-block">'+escapeHtml(raw)+'</pre>';if(resolvedMode==='pseudocode-latex'){const p=preserveMathTokens(raw);return '<div class="pseudo-latex-block">'+restoreMathTokens(escapeHtml(p.out),p.tokens)+'</div>';}return '<div class="rich">'+parseStructuredText(raw)+'</div>';}
function renderBlocks(blocks,placeholder){const list=blocks&&blocks.length?blocks:[{mode:'placeholder',content:placeholder||'Add a block'}];return '<div class="col-stack">'+list.map(block=>renderBlock(block,placeholder)).join('')+'</div>';}
function buildSlideInner(slide){const heading=slide.headingLevel||'h2';const titleHtml='<'+heading+'>'+escapeHtml(slide.title||'Untitled slide').replace(/\n/g,'<br>')+'</'+heading+'>';const kickerHtml=slide.kicker?'<div class="kicker">'+escapeHtml(slide.kicker)+'</div>':'';const ledeHtml=slide.lede?'<div class="lede">'+escapeHtml(slide.lede)+'</div>':'';const s=normalizeSlide(slide);if(s.slideType==='title-center')return '<div class="title-center">'+titleHtml+kickerHtml+'</div>';if(s.slideType==='section-divider')return '<div class="section-divider-wrap"><div><div class="divider-kicker">'+escapeHtml(s.kicker||'Section')+'</div>'+titleHtml+'<div class="divider-line"></div><div class="divider-lede">'+escapeHtml(s.lede||'')+'</div></div></div>';if(['two-col','title-two-callouts','title-figure-explanation','comparison','image-left-text-right'].includes(s.slideType)){const layoutClass={ 'two-col':'layout-two-col','title-two-callouts':'layout-two-callouts','title-figure-explanation':'layout-figure-explanation','comparison':'layout-comparison','image-left-text-right':'layout-image-left-text-right'}[s.slideType]||'layout-two-col';const leftHead=s.slideType==='comparison'?'<div class="comparison-head">'+escapeHtml((s.leftBlocks[0]&&s.leftBlocks[0].title)||'Left')+'</div>':'';const rightHead=s.slideType==='comparison'?'<div class="comparison-head">'+escapeHtml((s.rightBlocks[0]&&s.rightBlocks[0].title)||'Right')+'</div>':'';return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body '+layoutClass+'"><div class="col">'+leftHead+renderBlocks(s.leftBlocks,'Left column')+'</div><div class="col">'+rightHead+renderBlocks(s.rightBlocks,'Right column')+'</div></div>';}if(s.slideType==='theorem-proof'){const theorem=s.leftBlocks[0]||{mode:'panel',content:'\paragraph{Theorem} State the result here.'};const proof=s.leftBlocks[1]||{mode:'panel',content:'\paragraph{Proof sketch} Add the argument here.'};return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col theorem-proof-wrap"><div class="named-box"><div class="named-box-head">'+escapeHtml(theorem.title||'Theorem')+'</div><div class="named-box-body">'+renderBlock({...theorem,title:''},'Theorem')+'</div></div><div class="named-box"><div class="named-box-head">'+escapeHtml(proof.title||'Proof')+'</div><div class="named-box-body">'+renderBlock({...proof,title:''},'Proof')+'</div></div></div></div>';}if(s.slideType==='algorithm-layout'){const algo=s.leftBlocks[0]||{mode:'pseudocode',content:'Algorithm goes here'};const notes=s.leftBlocks.slice(1);return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col algorithm-wrap">'+renderBlock(algo,'Algorithm')+(notes.length?renderBlocks(notes,'Notes'):'')+'</div></div>';}if(s.slideType==='full-width-figure-caption'){const fig=s.leftBlocks[0]||{mode:'placeholder',content:'Add a figure block'};const captionBlocks=s.leftBlocks.slice(1);return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col full-figure-wrap">'+renderBlock(fig,'Figure')+(captionBlocks.length?'<div class="figure-caption">'+renderBlocks(captionBlocks,'Caption')+'</div>':'')+'</div></div>';}return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col">'+renderBlocks(s.leftBlocks,'Main content')+'</div></div>';}
const deck=document.getElementById('deck');const slideMap=document.getElementById('slideMap');const slideMapList=document.getElementById('slideMapList');document.getElementById('deckTitle').textContent=deckPayload.deckTitle||'Slides';
deck.innerHTML=deckPayload.slides.map((slide,idx)=>{const cls=slide.slideType==='title-center'?'deck-slide title-center':(slide.slideType==='two-col'?'deck-slide two-col':'deck-slide single');return '<section class="'+cls+'" data-index="'+idx+'" style="'+buildSlideStyle(slide)+'"><button class="slides-button" type="button">Slides</button><div class="slide-number">'+(idx+1)+' / '+deckPayload.slides.length+'</div>'+buildSlideInner(slide).trim()+'</section>';}).join('\n');
slideMapList.innerHTML=deckPayload.slides.map((slide,idx)=>'<button type="button" class="slide-map-item" data-go="'+idx+'"><span>'+(idx+1)+'.</span><span>'+escapeHtml(slide.title||('Slide '+(idx+1)))+'</span></button>').join('');
let active=0;const slideEls=Array.from(document.querySelectorAll('.deck-slide'));
function fitFiguresInSlide(slideEl){if(!slideEl)return;const figures=Array.from(slideEl.querySelectorAll('.figure-embed'));if(!figures.length)return;figures.forEach(embed=>{embed.style.maxHeight='';const media=embed.querySelector('img,svg,canvas,iframe');if(media)media.style.maxHeight='';});const maxHeight=slideEl.clientHeight||window.innerHeight||900;let guard=0;while(slideEl.scrollHeight>maxHeight+2&&guard<16){const overflow=slideEl.scrollHeight-maxHeight;const candidates=figures.map(embed=>{const media=embed.querySelector('img,svg,canvas,iframe');const rect=(media||embed).getBoundingClientRect();return {embed,media,h:rect.height||0};}).filter(x=>x.h>40).sort((a,b)=>b.h-a.h);if(!candidates.length)break;const c=candidates[0];const current=parseFloat((c.media&&c.media.style.maxHeight)||c.h);const reduce=Math.min(Math.max(overflow+8,24),current*0.35);const next=Math.max(70,current-reduce);c.embed.style.maxHeight=(next+12)+'px';if(c.media)c.media.style.maxHeight=next+'px';guard+=1;}}
function fitFiguresIn(root){(root||document).querySelectorAll('.deck-slide.active,.print-cell .slide,.slide').forEach(fitFiguresInSlide);}
function render(){slideEls.forEach((el,i)=>el.classList.toggle('active',i===active));if(window.MathJax&&typeof window.MathJax.typesetPromise==='function'){if(typeof window.MathJax.typesetClear==='function')window.MathJax.typesetClear(slideEls);window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).then(()=>fitFiguresIn(document)).catch(()=>fitFiguresIn(document));}else{fitFiguresIn(document);}}
function go(i){if(i<0||i>=slideEls.length)return;active=i;render();slideMap.classList.remove('open');}
document.getElementById('prevBtn').addEventListener('click',()=>go(active-1));document.getElementById('nextBtn').addEventListener('click',()=>go(active+1));document.getElementById('closeMapBtn').addEventListener('click',()=>slideMap.classList.remove('open'));document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click',()=>slideMap.classList.add('open')));document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click',()=>go(Number(btn.dataset.go))));window.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(active+1);}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(active-1);}if(e.key==='Escape')slideMap.classList.remove('open');});render();
</script>
