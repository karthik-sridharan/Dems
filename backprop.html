<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backpropagation on a 2×3×1 Network</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(','\\)'], ['$', '$']],
        displayMath: [['\\[','\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'svg', 'text']
      },
      chtml: {
        scale: 0.95
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    :root{
      --edge:#777777;
      --forward:#2f6fed;
      --backward:#d97706;
      --loss:#cc0033;
      --linear:#1f8f46;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#ffffff;
      color:#000000;
    }
    .wrap{
      max-width:1500px;
      margin:0 auto;
      padding:22px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    button{
      border:1.5px solid #000000;
      border-radius:10px;
      padding:10px 16px;
      cursor:pointer;
      color:#000000;
      background:#ffffff;
      font-size:15px;
      transition:transform .15s ease, opacity .15s ease, background .2s ease;
    }
    button:hover{transform:translateY(-1px); background:#f3f3f3;}
    button:active{transform:translateY(1px)}
    .badge{
      padding:8px 12px;
      border-radius:999px;
      background:#ffffff;
      border:1.5px solid #000000;
      font-weight:700;
      color:#000000;
    }
    .layout{
      display:grid;
      grid-template-columns:1.55fr 1fr;
      gap:18px;
    }
    .card{
      background:#ffffff;
      border:1.5px solid #000000;
      border-radius:16px;
      padding:16px;
      box-shadow:none;
    }
    #networkCard{min-height:860px}
    svg{width:100%; height:820px; display:block; background:#ffffff;}
    .node circle{
      fill:#ffffff;
      stroke:#000000;
      stroke-width:2.2;
      transition:all .25s ease;
    }
    .node .title{
      fill:#000000;
      font-size:28px;
      font-weight:700;
      text-anchor:middle;
      dominant-baseline:middle;
      font-family: Arial, Helvetica, sans-serif;
    }
    .node.forward circle{
      stroke:var(--forward);
      stroke-width:4;
    }
    .node.backward circle{
      stroke:var(--backward);
      stroke-width:4;
    }
    .node.linear circle{
      stroke:var(--linear);
      stroke-width:4;
    }
    .node.loss circle{
      stroke:var(--loss);
      stroke-width:4;
    }
    .edge{
      stroke:var(--edge);
      stroke-width:3;
      opacity:.9;
      transition:all .25s ease;
    }
    .edge.forward{
      stroke:var(--forward);
      stroke-width:5;
      opacity:1;
    }
    .edge.backward{
      stroke:var(--backward);
      stroke-width:5;
      opacity:1;
    }
    .label{
      fill:#000000;
      font-size:22px;
      text-anchor:middle;
      font-family: Arial, Helvetica, sans-serif;
    }
    .grad{
      display:none;
    }
    .grad.show{display:none;}
    .panelTitle{
      margin:0 0 8px;
      font-size:24px;
      color:#000000;
    }
    .explain{
      line-height:1.6;
      font-size:16px;
      color:#000000;
    }
    .formula{
      margin-top:12px;
      padding:14px 16px;
      border-radius:12px;
      background:#ffffff;
      border:1.5px solid #000000;
      line-height:1.7;
      min-height:260px;
      color:#000000;
      overflow-x:auto;
      font-size:18px;
    }
    .note{
      margin-top:12px;
      padding:11px 12px;
      border-radius:12px;
      background:#ffffff;
      border:1.5px solid #000000;
      color:#000000;
      line-height:1.5;
      font-size:14px;
    }
    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:14px 18px;
      margin-top:10px;
      color:#000000;
      font-size:14px;
    }
    .legendItem{display:flex; align-items:center; gap:8px;}
    .dot{
      width:12px;height:12px;border-radius:999px;display:inline-block;
    }
    .tiny{font-size:15px;color:#000000}

    mjx-container { font-size: 100% !important; }
    .formula mjx-container[display="true"] { margin: 0.5em 0 !important; }
    .explain mjx-container, .note mjx-container {
      font-size: 1em !important;
    }

    @media (max-width:1100px){
      .layout{grid-template-columns:1fr}
      svg{height:760px}
    }
  </style>
</head>

        <line id="e_yhat_L" class="edge" x1="900" y1="450" x2="900" y2="590"></line>

        <text class="label" x="240" y="118">W¹₁,₁</text>
        <text class="label" x="245" y="210">W¹₁,₂</text>
        <text class="label" x="245" y="304">W¹₁,₃</text>
        <text class="label" x="245" y="205">W¹₂,₁</text>
        <text class="label" x="245" y="330">W¹₂,₂</text>
        <text class="label" x="245" y="408">W¹₂,₃</text>

        <text class="label" x="505" y="105">σ</text>
        <text class="label" x="505" y="265">σ</text>
        <text class="label" x="505" y="425">σ</text>

        <text class="label" x="745" y="148">W²₁</text>
        <text class="label" x="740" y="268">W²₂</text>
        <text class="label" x="745" y="420">W²₃</text>

        <text class="label" x="390" y="65">+ b¹₁</text>
        <text class="label" x="390" y="225">+ b¹₂</text>
        <text class="label" x="390" y="385">+ b¹₃</text>
        <text class="label" x="955" y="245">+ b²</text>
        <text class="label" x="965" y="522">y</text>

        <text id="g_yhat_L" class="grad" x="980" y="520"></text>
        <text id="g_z2out_yhat" class="grad" x="980" y="335"></text>

        <text id="g_a1_z2out" class="grad" x="765" y="120"></text>
        <text id="g_a2_z2out" class="grad" x="750" y="250"></text>
        <text id="g_a3_z2out" class="grad" x="765" y="452"></text>

        <text id="g_z1_a1" class="grad" x="505" y="98"></text>
        <text id="g_z2_a2" class="grad" x="505" y="258"></text>
        <text id="g_z3_a3" class="grad" x="505" y="418"></text>

        <text id="g_x1_z1" class="grad" x="255" y="96"></text>
        <text id="g_x2_z1" class="grad" x="250" y="170"></text>
        <text id="g_x1_z2" class="grad" x="260" y="242"></text>
        <text id="g_x2_z2" class="grad" x="255" y="315"></text>
        <text id="g_x1_z3" class="grad" x="260" y="398"></text>
        <text id="g_x2_z3" class="grad" x="255" y="468"></text>

        <g id="x1" class="node">
          <circle cx="80" cy="170" r="42"></circle>

        </g>

          <circle cx="390" cy="120" r="40"></circle>
          <text class="title" x="390" y="120">z¹₁</text>
        </g>

          <text class="title" x="390" y="280">z¹₂</text>
        </g>

          <circle cx="390" cy="440" r="40"></circle>
          <text class="title" x="390" y="440">z¹₃</text>
        </g>

          <circle cx="620" cy="120" r="40"></circle>
          <text class="title" x="620" y="120">a₁</text>
        </g>

          <circle cx="620" cy="280" r="40"></circle>
          <text class="title" x="620" y="280">a₂</text>
        </g>
        <g id="a3" class="node">
          <circle cx="620" cy="440" r="40"></circle>
          <text class="title" x="620" y="440">a₃</text>
        </g>
        <g id="z2out" class="node">
          <circle cx="900" cy="250" r="48"></circle>
          <text class="title" x="900" y="250">z²</text>
        </g>
        <g id="yhat" class="node">
          <circle cx="900" cy="420" r="48"></circle>

      <div class="legend">
        <div class="legendItem"><span class="dot" style="background:#1f8f46"></span> linear combination node</div>
        <div class="legendItem"><span class="dot" style="background:#2f6fed"></span> forward computation</div>
        <div class="legendItem"><span class="dot" style="background:#d97706"></span> backward gradient flow</div>
        <div class="legendItem"><span class="dot" style="background:#cc0033"></span> loss</div>
      </div>

    <div class="card">
      <h2 class="panelTitle" id="panelTitle">Step 1: Structure</h2>
      <div class="explain" id="explain"></div>
      <div class="formula" id="formula"></div>
      <div class="note" id="noteBox" style="display:none;"></div>

<script>
  const $ = (id) => document.getElementById(id);

  const allNodes = ["x1","x2","z1","z2","z3","a1","a2","a3","z2out","yhat","loss"];
  const linearNodes = ["z1","z2","z3","z2out"];
  const allEdges = [
    "e_x1_z1","e_x1_z2","e_x1_z3","e_x2_z1","e_x2_z2","e_x2_z3",
    "e_z1_a1","e_z2_a2","e_z3_a3",
    "e_a1_z2out","e_a2_z2out","e_a3_z2out",
    "e_z2out_yhat","e_yhat_L"
  ];
  const gradIds = [
    "g_yhat_L","g_z2out_yhat","g_a1_z2out","g_a2_z2out","g_a3_z2out","g_z1_a1","g_z2_a2","g_z3_a3",
    "g_x1_z1","g_x2_z1","g_x1_z2","g_x2_z2","g_x1_z3","g_x2_z3"
  ];

  const steps = [
    {
      title:"Step 1: Structure",
      explain:`The hidden layer is written using linear nodes \\(z^1_j\\) and activation nodes \\(a_j=\\sigma(z^1_j)\\). The output layer is written as a linear node \\(z^2\\) followed by the prediction \\(\\hat y=\\sigma(z^2)\\).`,
      formula:String.raw`\[
\begin{aligned}
z^1_j &= W^1_{1,j}x_1 + W^1_{2,j}x_2 + b^1_j, \qquad j=1,2,3,\\
a_j &= \sigma(z^1_j),\\
z^2 &= W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2,\\
\hat y &= \sigma(z^2),\\
L &= \frac12(\hat y-y)^2.
\end{aligned}
\]`,
      note:`This notation shows exactly where the layer-1 parameters, layer-2 parameters, and activation derivatives enter.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["x1","x2","z1","z2","z3","a1","a2","a3","z2out","yhat","loss"],
      forwardEdges:["e_x1_z1","e_x1_z2","e_x1_z3","e_x2_z1","e_x2_z2","e_x2_z3","e_z1_a1","e_z2_a2","e_z3_a3","e_a1_z2out","e_a2_z2out","e_a3_z2out","e_z2out_yhat","e_yhat_L"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 2: Hidden linear outputs",
      explain:`First compute the hidden linear outputs. These are affine combinations of the inputs using the first-layer weights and biases.`,
      formula:String.raw`\[
\begin{aligned}
z^1_1 &= W^1_{1,1}x_1 + W^1_{2,1}x_2 + b^1_1,\\
z^1_2 &= W^1_{1,2}x_1 + W^1_{2,2}x_2 + b^1_2,\\
z^1_3 &= W^1_{1,3}x_1 + W^1_{2,3}x_2 + b^1_3.
\end{aligned}
\]`,
      note:`These nodes are purely linear; the nonlinearity has not yet been applied.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["x1","x2","z1","z2","z3"],
      forwardEdges:["e_x1_z1","e_x1_z2","e_x1_z3","e_x2_z1","e_x2_z2","e_x2_z3"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 3: Hidden activations",
      explain:`Now apply the activation \\(\\sigma\\) to each hidden linear node.`,
      formula:String.raw`\[
\begin{aligned}
a_1 &= \sigma(z^1_1),\\
a_2 &= \sigma(z^1_2),\\
a_3 &= \sigma(z^1_3).
\end{aligned}
\]`,
      note:`Later, when the gradient crosses from \\(a_j\\) back to \\(z^1_j\\), it multiplies by \\(\\sigma'(z^1_j)\\).`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["z1","z2","z3","a1","a2","a3"],
      forwardEdges:["e_z1_a1","e_z2_a2","e_z3_a3"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 4: Output linear node",
      explain:`The output layer first forms the linear quantity \\(z^2\\) from the hidden activations.`,
      formula:String.raw`\[
\begin{aligned}
z^2 &= W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2\\
    &= W^2_1\sigma(z^1_1) + W^2_2\sigma(z^1_2) + W^2_3\sigma(z^1_3) + b^2.
\end{aligned}
\]`,
      note:`This is the pre-activation of the output unit.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["a1","a2","a3","z2out"],
      forwardEdges:["e_a1_z2out","e_a2_z2out","e_a3_z2out"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 5: Prediction node",
      explain:`Now apply the output activation.`,
      formula:String.raw`\[
\hat y = \sigma(z^2).
\]`,
      note:`This means the backward pass must also cross the output activation edge and pick up \\(\\sigma'(z^2)\\).`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["z2out","yhat"],
      forwardEdges:["e_z2out_yhat"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 6: Loss",
      explain:`Use squared error loss for one example.`,
      formula:String.raw`\[
L = \frac12(\hat y-y)^2.
\]`,
      note:`Backpropagation starts here.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["yhat","loss"],
      forwardEdges:["e_yhat_L"],
      backwardNodes:[],
      backwardEdges:[],
      grads:{}
    },
    {
      title:"Step 7: Gradient at the prediction",
      explain:`Differentiate the loss with respect to the prediction.`,
      formula:String.raw`\[
\frac{\partial L}{\partial \hat y} = \hat y - y.
\]`,
      note:`This is the first upstream gradient.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:[],
      backwardNodes:["yhat","loss"],
      backwardEdges:["e_yhat_L"],
      grads:{ g_yhat_L:"∂L/∂ŷ = ŷ - y" }
    },
    {
      title:"Step 8: Cross the output activation",
      explain:`Since \\(\\hat y=\\sigma(z^2)\\), the gradient picks up the derivative of the output activation.`,
      formula:String.raw`\[
\frac{\partial L}{\partial z^2}
=
\frac{\partial L}{\partial \hat y}
\frac{\partial \hat y}{\partial z^2}
=
(\hat y-y)\sigma'(z^2).
\]`,
      note:`This is the correct replacement for the earlier identity step.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:[],
      backwardNodes:["z2out","yhat"],
      backwardEdges:["e_z2out_yhat"],
      grads:{ g_z2out_yhat:"× σ′(z²)" }
    },
    {
      title:"Step 9: Second-layer gradients and messages to hidden activations",
      explain:`Now use \\(z^2 = W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2\\) to compute the layer-2 parameter gradients and the gradients arriving at the hidden activations.`,
      formula:String.raw`\[
\begin{aligned}
\frac{\partial L}{\partial W^2_1} &= \frac{\partial L}{\partial z^2}\frac{\partial z^2}{\partial W^2_1}
= (\hat y-y)\sigma'(z^2)a_1,\\
\frac{\partial L}{\partial W^2_2} &= (\hat y-y)\sigma'(z^2)a_2,\\
\frac{\partial L}{\partial W^2_3} &= (\hat y-y)\sigma'(z^2)a_3,\\
\frac{\partial L}{\partial b^2} &= (\hat y-y)\sigma'(z^2),\\[4pt]
\frac{\partial L}{\partial a_1} &= \frac{\partial L}{\partial z^2}\frac{\partial z^2}{\partial a_1}
= (\hat y-y)\sigma'(z^2)W^2_1,\\
\frac{\partial L}{\partial a_2} &= (\hat y-y)\sigma'(z^2)W^2_2,\\
\frac{\partial L}{\partial a_3} &= (\hat y-y)\sigma'(z^2)W^2_3.
\end{aligned}
\]`,
      note:`These are the backward messages arriving at the hidden activation nodes.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:[],
      backwardNodes:["a1","a2","a3","z2out"],
      backwardEdges:["e_a1_z2out","e_a2_z2out","e_a3_z2out"],
      grads:{
        g_a1_z2out:"∂L/∂a₁=(ŷ-y)σ′(z²)W²₁",
        g_a2_z2out:"∂L/∂a₂=(ŷ-y)σ′(z²)W²₂",
        g_a3_z2out:"∂L/∂a₃=(ŷ-y)σ′(z²)W²₃"
      }
    },
    {
      title:"Step 10: Cross the hidden activation edges",
      explain:`Now move from each hidden activation \\(a_j\\) back to the corresponding hidden linear node \\(z^1_j\\).`,
      formula:String.raw`\[
\begin{aligned}
\frac{\partial L}{\partial z^1_1}
&=
\frac{\partial L}{\partial a_1}
\frac{\partial a_1}{\partial z^1_1}
=
(\hat y-y)\sigma'(z^2)W^2_1\sigma'(z^1_1),\\
\frac{\partial L}{\partial z^1_2}
&=
(\hat y-y)\sigma'(z^2)W^2_2\sigma'(z^1_2),\\
\frac{\partial L}{\partial z^1_3}
&=
(\hat y-y)\sigma'(z^2)W^2_3\sigma'(z^1_3).
\end{aligned}
\]`,
      note:`This is where the hidden-layer activation derivatives enter.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:[],
      backwardNodes:["z1","z2","z3","a1","a2","a3"],
      backwardEdges:["e_z1_a1","e_z2_a2","e_z3_a3"],
      grads:{
        g_z1_a1:"× σ′(z¹₁)",
        g_z2_a2:"× σ′(z¹₂)",
        g_z3_a3:"× σ′(z¹₃)"
      }
    },
    {
      title:"Step 11: First-layer weights and biases",
      explain:`Finally differentiate the hidden linear expressions with respect to the first-layer weights and biases.`,
      formula:String.raw`\[
\begin{aligned}
\frac{\partial L}{\partial W^1_{1,j}}
&=
\frac{\partial L}{\partial z^1_j}
\frac{\partial z^1_j}{\partial W^1_{1,j}}
=
(\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j)x_1,\\
\frac{\partial L}{\partial W^1_{2,j}}
&=
\frac{\partial L}{\partial z^1_j}
\frac{\partial z^1_j}{\partial W^1_{2,j}}
=
(\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j)x_2,\\
\frac{\partial L}{\partial b^1_j}
&=
\frac{\partial L}{\partial z^1_j}
\frac{\partial z^1_j}{\partial b^1_j}
=
(\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j).
\end{aligned}
\]`,
      note:`So each first-layer weight gets: upstream gradient × output activation derivative × second-layer weight × hidden activation derivative × input.`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:[],
      backwardNodes:["x1","x2","z1","z2","z3"],
      backwardEdges:["e_x1_z1","e_x1_z2","e_x1_z3","e_x2_z1","e_x2_z2","e_x2_z3"],
      grads:{
        g_x1_z1:"∂L/∂W¹₁,₁=(ŷ-y)σ′(z²)W²₁σ′(z¹₁)x₁",
        g_x2_z1:"∂L/∂W¹₂,₁=(ŷ-y)σ′(z²)W²₁σ′(z¹₁)x₂",
        g_x1_z2:"∂L/∂W¹₁,₂=(ŷ-y)σ′(z²)W²₂σ′(z¹₂)x₁",
        g_x2_z2:"∂L/∂W¹₂,₂=(ŷ-y)σ′(z²)W²₂σ′(z¹₂)x₂",
        g_x1_z3:"∂L/∂W¹₁,₃=(ŷ-y)σ′(z²)W²₃σ′(z¹₃)x₁",
        g_x2_z3:"∂L/∂W¹₂,₃=(ŷ-y)σ′(z²)W²₃σ′(z¹₃)x₂"
      }
    },
    {
      title:"Step 12: Full result",
      explain:`Putting everything together gives the complete backpropagation formulas for this notation.`,
      formula:String.raw`\[
\begin{aligned}
\frac{\partial L}{\partial \hat y} &= \hat y-y,\\
\frac{\partial L}{\partial z^2} &= (\hat y-y)\sigma'(z^2),\\
\frac{\partial L}{\partial W^2_j} &= (\hat y-y)\sigma'(z^2)a_j,\\
\frac{\partial L}{\partial b^2} &= (\hat y-y)\sigma'(z^2),\\
\frac{\partial L}{\partial a_j} &= (\hat y-y)\sigma'(z^2)W^2_j,\\
\frac{\partial L}{\partial z^1_j} &= (\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j),\\
\frac{\partial L}{\partial W^1_{1,j}} &= (\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j)x_1,\\
\frac{\partial L}{\partial W^1_{2,j}} &= (\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j)x_2,\\
\frac{\partial L}{\partial b^1_j} &= (\hat y-y)\sigma'(z^2)W^2_j\sigma'(z^1_j).
\end{aligned}
\]`,
      note:`The output activation contributes the factor \\(\\sigma'(z^2)\\), and each hidden activation contributes \\(\\sigma'(z^1_j)\\).`,
      linear:["z1","z2","z3","z2out"],
      forwardNodes:["x1","x2","z1","z2","z3","a1","a2","a3","z2out","yhat","loss"],
      forwardEdges:[],
      backwardNodes:["x1","x2","z1","z2","z3","a1","a2","a3","z2out","yhat","loss"],
      backwardEdges:["e_yhat_L","e_z2out_yhat","e_a1_z2out","e_a2_z2out","e_a3_z2out","e_z1_a1","e_z2_a2","e_z3_a3","e_x1_z1","e_x1_z2","e_x1_z3","e_x2_z1","e_x2_z2","e_x2_z3"],
      grads:{
        g_yhat_L:"∂L/∂ŷ=ŷ-y",
        g_z2out_yhat:"×σ′(z²)",
        g_a1_z2out:"∂L/∂a₁=(ŷ-y)σ′(z²)W²₁",
        g_a2_z2out:"∂L/∂a₂=(ŷ-y)σ′(z²)W²₂",
        g_a3_z2out:"∂L/∂a₃=(ŷ-y)σ′(z²)W²₃",
        g_z1_a1:"×σ′(z¹₁)",
        g_z2_a2:"×σ′(z¹₂)",
        g_z3_a3:"×σ′(z¹₃)"
      }

  ];

  function clearClasses(){
    allNodes.forEach(id => $(id).className.baseVal = "node");
    allEdges.forEach(id => $(id).setAttribute("class","edge"));
    gradIds.forEach(id => {
      $(id).textContent = "";
      $(id).setAttribute("class","grad");
    });
  }

  async function typesetIfReady() {
    if (window.MathJax && MathJax.typesetPromise) {
      try { await MathJax.typesetPromise(); } catch (e) {}
    }
  }

  let step = 0;
  function render(){
    clearClasses();
    const s = steps[step];

    $("panelTitle").innerHTML = s.title;
    $("explain").innerHTML = s.explain;
    $("formula").innerHTML = s.formula;
    $("noteBox").innerHTML = s.note;
    $("stepBadge").textContent = `Step ${step + 1} / ${steps.length}`;

    linearNodes.forEach(id => $(id).classList.add("linear"));
    (s.forwardNodes || []).forEach(id => $(id).classList.add("forward"));
    (s.backwardNodes || []).forEach(id => $(id).classList.add("backward"));
    (s.linear || []).forEach(id => $(id).classList.add("linear"));
    (s.forwardEdges || []).forEach(id => $(id).setAttribute("class","edge forward"));
    (s.backwardEdges || []).forEach(id => $(id).setAttribute("class","edge backward"));

    if ((s.forwardNodes || []).includes("loss") || (s.backwardNodes || []).includes("loss")) {
      $("loss").classList.add("loss");
    }

    Object.entries(s.grads || {}).forEach(([id, txt]) => {
      $(id).textContent = txt;
      $(id).classList.add("show");
    });

    $("prevBtn").disabled = step === 0;
    $("nextBtn").disabled = step === steps.length - 1;
    $("prevBtn").style.opacity = step === 0 ? 0.45 : 1;
    $("nextBtn").style.opacity = step === steps.length - 1 ? 0.45 : 1;

    typesetIfReady();
  }

  $("nextBtn").addEventListener("click", () => {
    if (step < steps.length - 1) {
      step += 1;
      render();
    }
  });
  $("prevBtn").addEventListener("click", () => {
    if (step > 0) {
      step -= 1;
      render();
    }
  });
  $("resetBtn").addEventListener("click", () => {
    step = 0;
    render();
  });

  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") $("nextBtn").click();
    if (e.key === "ArrowLeft") $("prevBtn").click();
  });

  window.addEventListener("load", () => {
    render();
    setTimeout(typesetIfReady, 300);
  });
</script>
</body>
</html>
