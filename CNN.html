));\n      container.appendChild(btn);\n    }\n  }\n\n  function renderEditableGrid(container, mat, onChange){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 30px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const inp = document.createElement('input');\n        inp.type = 'number';\n        inp.step = 'any';\n        inp.value = mat[r][c];\n        inp.addEventListener('input', ()=>{\n          mat[r][c] = Number(inp.value || 0);\n          resetComputation(true);\n          if(typeof onChange === 'function') onChange();\n        });\n        container.appendChild(inp);\n      }\n    }\n  }\n\n  function renderInputEditor(){\n    renderTabs(inputTabs, inputMats.length, selectedInputChannel, (i)=>{ selectedInputChannel = i; renderInputEditor(); }, 'In');\n    renderEditableGrid(inputEditGrid, inputMats[selectedInputChannel], ()=>{});\n  }\n\n  function renderFilterEditor(){\n    const cout = filters.length;\n    renderTabs(outputTabs, cout, selectedOutputChannel, (i)=>{ selectedOutputChannel = i; renderFilterEditor(); }, 'Out');\n\n    biasRow.innerHTML = '';\n    biases.forEach((b, oc)=>{\n      const wrap = document.createElement('div');\n      wrap.className = 'control';\n      const lbl = document.createElement('label');\n      lbl.textContent = `Bias o${oc}`;\n      const inp = document.createElement('input');\n      inp.type = 'number';\n      inp.step = 'any';\n      inp.value = b;\n      inp.addEventListener('input', ()=>{\n        biases[oc] = Number(inp.value || 0);\n        resetComputation(true);\n      });\n      wrap.appendChild(lbl);\n      wrap.appendChild(inp);\n      biasRow.appendChild(wrap);\n    });\n\n    filterEditorStack.innerHTML = '';\n    const perIn = filters[selectedOutputChannel];\n    perIn.forEach((ker, ic)=>{\n      const block = document.createElement('div');\n      block.className = 'channel-block';\n      const title = document.createElement('div');\n      title.className = 'channel-title';\n      title.textContent = `Filter for output ${selectedOutputChannel} from input ${ic}`;\n      const grid = document.createElement('div');\n      grid.className = 'matrix-edit';\n      grid.style.gridTemplateColumns = `repeat(${ker[0].length}, 30px)`;\n      for(let r = 0; r < ker.length; r++){\n        for(let c = 0; c < ker[0].length; c++){\n          const inp = document.createElement('input');\n          inp.type = 'number';\n          inp.step = 'any';\n          inp.value = ker[r][c];\n          inp.addEventListener('input', ()=>{\n            ker[r][c] = Number(inp.value || 0);\n            resetComputation(true);\n          });\n          grid.appendChild(inp);\n        }\n      }\n      block.appendChild(title);\n      block.appendChild(grid);\n      filterEditorStack.appendChild(block);\n    });\n  }\n\n  function renderMatrixView(container, mat, activeTop, activeLeft, k, markCurrentOutput){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.className = 'matrix-grid';\n    container.style.gridTemplateColumns = `repeat(${cols}, 30px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        if(typeof activeTop === 'number' && typeof activeLeft === 'number' && typeof k === 'number'){\n          if(r >= activeTop && r < activeTop + k && c >= activeLeft && c < activeLeft + k){\n            div.classList.add('active');\n          }\n        }\n        div.textContent = round2(mat[r][c]);\n        container.appendChild(div);\n      }\n    }\n  }\n\n  function renderInputViews(activeTop, activeLeft){\n    inputViewsStack.innerHTML = '';\n    const k = clampInt(kernelSizeInput.value, 1, 20);\n    for(let ic = 0; ic < inputMats.length; ic++){\n      const block = document.createElement('div');\n      block.className = 'channel-block';\n      const title = document.createElement('div');\n      title.className = 'channel-title';\n      title.textContent = `Padded input channel ${ic}`;\n      const view = document.createElement('div');\n      renderMatrixView(view, paddedInput(ic), activeTop, activeLeft, k);\n      block.appendChild(title);\n      block.appendChild(view);\n      inputViewsStack.appendChild(block);\n    }\n  }\n\n  function getPatch(ch, top, left){\n    const pad = paddedInput(ch);\n    const k = clampInt(kernelSizeInput.value, 1, 20);\n    const patch = [];\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        row.push(pad[top + r][left + c]);\n      }\n      patch.push(row);\n    }\n    return patch;\n  }\n\n  function channelContribution(ch, oc, top, left){\n    const patch = getPatch(ch, top, left);\n    const ker = filters[oc][ch];\n    const prod = [];\n    let sum = 0;\n    const terms = [];\n    for(let r = 0; r < ker.length; r++){\n      const prow = [];\n      for(let c = 0; c < ker[0].length; c++){\n        const v = patch[r][c] * ker[r][c];\n        prow.push(v);\n        sum += v;\n        terms.push(`${round2(patch[r][c])}×${round2(ker[r][c])}`);\n      }\n      prod.push(prow);\n    }\n    return {patch, kernel:ker, prod, sum, terms};\n  }\n\n  function currentCoord(index){\n    if(outRows === 0 || outCols === 0) return null;\n    const plane = outRows * outCols;\n    const oc = Math.floor(index / plane);\n    const rem = index % plane;\n    const r = Math.floor(rem / outCols);\n    const c = rem % outCols;\n    return {oc, r, c};\n  }\n\n  function renderMiniGrid(mat, highlightCell){\n    const grid = document.createElement('div');\n    grid.className = 'mini-grid';\n    grid.style.gridTemplateColumns = `repeat(${mat[0].length}, 34px)`;\n    for(let r = 0; r < mat.length; r++){\n      for(let c = 0; c < mat[0].length; c++){\n        const div = document.createElement('div');\n        div.className = 'mini-cell';\n        if(highlightCell && highlightCell.r === r && highlightCell.c === c){\n          div.classList.add('best');\n        }\n        div.textContent = round2(mat[r][c]);\n        grid.appendChild(div);\n      }\n    }\n    return grid;\n  }\n\n  function renderPatchStack(infoList){\n    patchStack.innerHTML = '';\n    infoList.forEach((info, ic)=>{\n      const block = document.createElement('div');\n      block.className = 'channel-block';\n      const title = document.createElement('div');\n      title.className = 'channel-title';\n      title.textContent = `Input channel ${ic}: patch × filter = channel sum ${round2(info.sum)}`;\n      block.appendChild(title);\n\n      const patchCap = document.createElement('div');\n      patchCap.className = 'small';\n      patchCap.textContent = 'Patch';\n      block.appendChild(patchCap);\n      block.appendChild(renderMiniGrid(info.patch));\n\n      const filterCap = document.createElement('div');\n      filterCap.className = 'small';\n      filterCap.textContent = 'Filter';\n      block.appendChild(filterCap);\n      block.appendChild(renderMiniGrid(info.kernel));\n\n      const prodCap = document.createElement('div');\n      prodCap.className = 'small';\n      prodCap.textContent = 'Elementwise product';\n      block.appendChild(prodCap);\n      block.appendChild(renderMiniGrid(info.prod));\n\n      patchStack.appendChild(block);\n    });\n  }\n\n  function renderOutputs(currentOc, currentR, currentC){\n    outputStack.innerHTML = '';\n    for(let oc = 0; oc < outputs.length; oc++){\n      const block = document.createElement('div');\n      block.className = 'channel-block';\n      const title = document.createElement('div');\n      title.className = 'channel-title';\n      title.textContent = `Output channel ${oc}`;\n      block.appendChild(title);\n\n      const view = document.createElement('div');\n      view.className = 'matrix-grid';\n      view.style.gridTemplateColumns = `repeat(${Math.max(1, outCols)}, 30px)`;\n      for(let r = 0; r < outRows; r++){\n        for(let c = 0; c < outCols; c++){\n          const div = document.createElement('div');\n          div.className = 'matrix-cell';\n          if(outputs[oc][r][c] !== null) div.classList.add('done');\n          if(oc === currentOc && r === currentR && c === currentC) div.classList.add('center');\n          div.textContent = outputs[oc][r][c] === null ? '·' : round2(outputs[oc][r][c]);\n          view.appendChild(div);\n        }\n      }\n\n      block.appendChild(view);\n      outputStack.appendChild(block);\n    }\n  }\n\n  function updateProgress(){\n    const total = outputs.length * outRows * outCols;\n    progressText.textContent = `${Math.min(stepIndex, total)} / ${total}`;\n    progressBar.style.width = total ? `${100 * Math.min(stepIndex, total) / total}%` : '0%';\n  }\n\n  function doStep(){\n    const total = outputs.length * outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const coord = currentCoord(stepIndex);\n    const s = clampInt(strideInput.value, 1, 20);\n    const top = coord.r * s;\n    const left = coord.c * s;\n\n    const infos = [];\n    let sumAll = 0;\n    const summary = [];\n    for(let ic = 0; ic < inputMats.length; ic++){\n      const info = channelContribution(ic, coord.oc, top, left);\n      infos.push(info);\n      sumAll += info.sum;\n      summary.push(`ch${ic}: (${info.terms.join(' + ')}) = ${round2(info.sum)}`);\n    }\n    const z = sumAll + Number(biases[coord.oc] || 0);\n    const a = Math.max(0, z);\n    outputs[coord.oc][coord.r][coord.c] = a;\n\n    renderInputViews(top, left);\n    renderPatchStack(infos);\n    renderOutputs(coord.oc, coord.r, coord.c);\n\n    formulaBox.innerHTML = `\n      <div><strong>Output channel ${coord.oc}, position (${coord.r}, ${coord.c})</strong></div>\n      <div style=\"margin-top:6px;\"><strong>Per-input-channel sums:</strong><br>${summary.join('<br>')}</div>\n      <div style=\"margin-top:6px;\"><strong>Pre-activation:</strong> z = ${round2(sumAll)} + bias(${coord.oc})=${round2(biases[coord.oc] || 0)} = ${round2(z)}</div>\n      <div style=\"margin-top:6px;\"><strong>Activation:</strong> a = ReLU(z) = max(0, ${round2(z)}) = ${round2(a)}</div>\n    `;\n\n    outChannelText.textContent = String(coord.oc);\n    positionText.textContent = `(${coord.r}, ${coord.c})`;\n    lastZText.textContent = round2(z);\n    lastAText.textContent = round2(a);\n\n    stepIndex += 1;\n    updateProgress();\n\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      setStatus('Running...');\n    }\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n  function play(){\n    const ms = Math.max(10, Number(speedInput.value || 350));\n    stopTimer();\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n  function finishInstant(){\n    const total = outputs.length * outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    stopTimer();\n    while(stepIndex < total){\n      doStep();\n    }\n    setStatus('Finished instantly.');\n  }\n\n  function renderAll(){\n    renderInputEditor();\n    renderFilterEditor();\n    renderInputViews();\n    patchStack.innerHTML = '';\n    renderOutputs(-1, -1, -1);\n  }\n\n  function resetComputation(render = true){\n    stopTimer();\n    computeOutputShape();\n    stepIndex = 0;\n    formulaBox.textContent = 'Click Play or Step to begin.';\n    outChannelText.textContent = '—';\n    positionText.textContent = '—';\n    lastZText.textContent = '—';\n    lastAText.textContent = '—';\n    updateProgress();\n    if(render) renderAll();\n    setStatus('Ready.');\n  }\n\n  rebuildBtn.addEventListener('click', rebuildStructures);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', ()=>{ stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', ()=>{ stopTimer(); doStep(); });\n  instantBtn.addEventListener('click', finishInstant);\n  resetBtn.addEventListener('click', ()=>resetComputation(true));\n\n  strideInput.addEventListener('input', ()=>resetComputation(true));\n  paddingInput.addEventListener('input', ()=>resetComputation(true));\n  speedInput.addEventListener('input', ()=>{ if(timer) play(); });\n  matSizeInput.addEventListener('change', rebuildStructures);\n  kernelSizeInput.addEventListener('change', rebuildStructures);\n  inChannelsInput.addEventListener('change', rebuildStructures);\n  outChannelsInput.addEventListener('change', rebuildStructures);\n\n  rebuildStructures();\n})();\n<\/script>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Use the default three channels to show how channelwise contributions add into each output channel before bias and ReLU."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"What does a 1×1 convolution mean?","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"Convolve a 64 x 64 x 3 image with 1x1 filter to produce new output with K output channels, what does this do?"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Emphasize that 1×1 conv changes channel representation but not receptive field."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"What does a 1×1 convolution mean?","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:A 1×1 filter has no spatial extent beyond a single pixel location.\nUL:It does not mix neighboring pixels spatially.\nUL:Instead, it applies a learned linear map across the channel vector at each location.\nUL:This is a per-pixel fully connected layer over channels."},{"mode":"panel","title":"","content":"EQ: \\(y(i,j)=\\sum_{c=1}^{C_{\\text{in}}} w_c\\,x_c(i,j)+b\\)\nUL:Use cases: channel compression, channel expansion and cross-channel mixing."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Emphasize that 1×1 conv changes channel representation but not receptive field."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Pooling","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .pool-step-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .pool-step-demo *{box-sizing:border-box}\n  .pool-step-demo .toolbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:end;\n    margin-bottom:12px;\n  }\n  .pool-step-demo .control{\n    display:flex;\n    flex-direction:column;\n    gap:4px;\n    min-width:84px;\n  }\n  .pool-step-demo label{\n    font-size:12px;\n    color:#444;\n    font-weight:600;\n  }\n  .pool-step-demo input,\n  .pool-step-demo button{\n    font:inherit;\n  }\n  .pool-step-demo input[type=\"number\"]{\n    width:84px;\n    padding:6px 8px;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n    background:#fff;\n  }\n  .pool-step-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:8px 10px;\n    cursor:pointer;\n  }\n  .pool-step-demo button:hover{background:#f6f6f6}\n  .pool-step-demo .mode-buttons{\n    display:flex;\n    gap:6px;\n    flex-wrap:wrap;\n  }\n  .pool-step-demo .mode-buttons button.active{\n    background:#dbeafe;\n    border-color:#60a5fa;\n    font-weight:700;\n  }\n  .pool-step-demo .layout{\n    display:grid;\n    grid-template-columns:1.45fr 1fr 1.1fr;\n    gap:14px;\n    align-items:start;\n  }\n  .pool-step-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    background:#fafafa;\n    border-radius:14px;\n    padding:10px;\n  }\n  .pool-step-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .pool-step-demo .matrix-grid{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .pool-step-demo .matrix-edit{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .pool-step-demo .matrix-cell{\n    width:32px;\n    height:32px;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:6px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    font-size:12px;\n    background:#fff;\n  }\n  .pool-step-demo .matrix-cell.active{\n    background:#ffe4e6;\n    border-color:#fb7185;\n    font-weight:700;\n  }\n  .pool-step-demo .matrix-cell.done{\n    background:#dbeafe;\n    border-color:#60a5fa;\n  }\n  .pool-step-demo .matrix-cell.center{\n    outline:2px solid #ef4444;\n    outline-offset:-2px;\n  }\n  .pool-step-demo .matrix-edit input{\n    width:32px;\n    height:32px;\n    padding:2px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.16);\n    border-radius:6px;\n    font-size:12px;\n  }\n  .pool-step-demo .mini-matrix{\n    display:grid;\n    gap:2px;\n    justify-content:start;\n    margin-bottom:8px;\n  }\n  .pool-step-demo .mini-cell{\n    width:38px;\n    height:38px;\n    border:1px solid rgba(0,0,0,.14);\n    border-radius:8px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    background:#fff;\n    font-size:13px;\n  }\n  .pool-step-demo .mini-cell.hit{\n    background:#fee2e2;\n    border-color:#f87171;\n    font-weight:700;\n  }\n  .pool-step-demo .mini-cell.best{\n    background:#dcfce7;\n    border-color:#22c55e;\n    font-weight:700;\n  }\n  .pool-step-demo .formula{\n    font-size:13px;\n    line-height:1.45;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.10);\n    border-radius:10px;\n    padding:10px;\n    min-height:90px;\n  }\n  .pool-step-demo .stats{\n    display:grid;\n    gap:6px;\n    font-size:13px;\n    color:#444;\n    margin-top:8px;\n  }\n  .pool-step-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .pool-step-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  .pool-step-demo .small{\n    font-size:12px;\n    color:#555;\n  }\n  .pool-step-demo .matrix-caption{\n    font-size:12px;\n    color:#555;\n    margin:6px 0 8px;\n  }\n  .pool-step-demo .output-grid-wrap{\n    overflow:auto;\n  }\n  @media (max-width: 980px){\n    .pool-step-demo .layout{\n      grid-template-columns:1fr;\n    }\n  }\n</style>\n\n<div class=\"pool-step-demo\" id=\"poolStepDemoRoot\">\n  <div class=\"toolbar\">\n    <div class=\"control\">\n      <label>Input size</label>\n      <input id=\"matSizeInput\" type=\"number\" min=\"1\" max=\"15\" step=\"1\" value=\"9\">\n    </div>\n    <div class=\"control\">\n      <label>Pool size m</label>\n      <input id=\"poolSizeInput\" type=\"number\" min=\"1\" max=\"7\" step=\"1\" value=\"2\">\n    </div>\n    <div class=\"control\">\n      <label>Stride</label>\n      <input id=\"strideInput\" type=\"number\" min=\"1\" max=\"5\" step=\"1\" value=\"2\">\n    </div>\n    <div class=\"control\">\n      <label>Speed (ms)</label>\n      <input id=\"speedInput\" type=\"number\" min=\"10\" max=\"2000\" step=\"10\" value=\"350\">\n    </div>\n    <div class=\"control\">\n      <label>Pooling type</label>\n      <div class=\"mode-buttons\">\n        <button id=\"maxModeBtn\" type=\"button\" class=\"active\">Max</button>\n        <button id=\"avgModeBtn\" type=\"button\">Average</button>\n      </div>\n    </div>\n    <div class=\"control\"><button id=\"rebuildBtn\" type=\"button\">Rebuild</button></div>\n    <div class=\"control\"><button id=\"playBtn\" type=\"button\">Play</button></div>\n    <div class=\"control\"><button id=\"pauseBtn\" type=\"button\">Pause</button></div>\n    <div class=\"control\"><button id=\"stepBtn\" type=\"button\">Step</button></div>\n    <div class=\"control\"><button id=\"instantBtn\" type=\"button\">Instant</button></div>\n    <div class=\"control\"><button id=\"resetBtn\" type=\"button\">Reset</button></div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Editable input matrix</h4>\n      <div class=\"matrix-caption\">Edit the entries directly. The highlighted window is the current pooling region.</div>\n      <div id=\"inputEditGrid\" class=\"matrix-edit\"></div>\n      <div class=\"matrix-caption\" id=\"inputCaption\">Input matrix</div>\n      <div id=\"inputMatrixView\" class=\"matrix-grid\"></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Current pooling window</h4>\n      <div class=\"matrix-caption\">Current m × m patch</div>\n      <div id=\"patchView\" class=\"mini-matrix\"></div>\n      <div class=\"formula\" id=\"formulaBox\">Click Play or Step to begin.</div>\n      <div class=\"stats\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Ready.</span></div>\n        <div><strong>Mode:</strong> <span id=\"modeText\">Max pooling</span></div>\n        <div><strong>Current output position:</strong> <span id=\"positionText\">—</span></div>\n        <div><strong>Output size:</strong> <span id=\"outputSizeText\">—</span></div>\n      </div>\n      <div class=\"progress\"><div id=\"progressBar\"></div></div>\n      <div class=\"small\">Progress: <span id=\"progressText\">0 / 0</span></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Output matrix</h4>\n      <div class=\"matrix-caption\">The output gets filled in step by step as the pooling window moves.</div>\n      <div class=\"output-grid-wrap\">\n        <div id=\"outputMatrixView\" class=\"matrix-grid\"></div>\n      </div>\n      <div class=\"stats\">\n        <div><strong>Formula:</strong> <span id=\"sizeFormulaText\">—</span></div>\n        <div><strong>Last computed value:</strong> <span id=\"lastValueText\">—</span></div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('poolStepDemoRoot');\n  if(!root) return;\n\n  const matSizeInput = root.querySelector('#matSizeInput');\n  const poolSizeInput = root.querySelector('#poolSizeInput');\n  const strideInput = root.querySelector('#strideInput');\n  const speedInput = root.querySelector('#speedInput');\n\n  const maxModeBtn = root.querySelector('#maxModeBtn');\n  const avgModeBtn = root.querySelector('#avgModeBtn');\n\n  const rebuildBtn = root.querySelector('#rebuildBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const instantBtn = root.querySelector('#instantBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n\n  const inputEditGrid = root.querySelector('#inputEditGrid');\n  const inputMatrixView = root.querySelector('#inputMatrixView');\n  const patchView = root.querySelector('#patchView');\n\n  const formulaBox = root.querySelector('#formulaBox');\n  const statusText = root.querySelector('#statusText');\n  const modeText = root.querySelector('#modeText');\n  const positionText = root.querySelector('#positionText');\n  const outputSizeText = root.querySelector('#outputSizeText');\n  const sizeFormulaText = root.querySelector('#sizeFormulaText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const lastValueText = root.querySelector('#lastValueText');\n\n  const outputMatrixView = root.querySelector('#outputMatrixView');\n\n  let poolMode = 'max';\n  let inputMat = [];\n  let outputMat = [];\n  let outRows = 0, outCols = 0;\n  let stepIndex = 0;\n  let timer = null;\n\n  function clampInt(v, lo, hi){\n    return Math.max(lo, Math.min(hi, Math.floor(Number(v) || 0)));\n  }\n\n  function round2(x){\n    const n = Number(x);\n    if(!Number.isFinite(n)) return x;\n    return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(2);\n  }\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function setMode(mode){\n    poolMode = mode === 'avg' ? 'avg' : 'max';\n    maxModeBtn.classList.toggle('active', poolMode === 'max');\n    avgModeBtn.classList.toggle('active', poolMode === 'avg');\n    modeText.textContent = poolMode === 'max' ? 'Max pooling' : 'Average pooling';\n    resetComputation(true);\n  }\n\n  function makeDefaultInput(n){\n    const arr = [];\n    for(let r = 0; r < n; r++){\n      const row = [];\n      for(let c = 0; c < n; c++){\n        row.push(((r * 3 + c * 2) % 9) + 1);\n      }\n      arr.push(row);\n    }\n    return arr;\n  }\n\n  function renderEditableMatrix(container, mat){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const inp = document.createElement('input');\n        inp.type = 'number';\n        inp.step = 'any';\n        inp.value = mat[r][c];\n        inp.addEventListener('input', () => {\n          mat[r][c] = Number(inp.value || 0);\n          resetComputation(true);\n        });\n        container.appendChild(inp);\n      }\n    }\n  }\n\n  function computeOutputShape(){\n    const n = inputMat.length;\n    const m = clampInt(poolSizeInput.value, 1, 20);\n    const s = clampInt(strideInput.value, 1, 20);\n    outRows = Math.floor((n - m) / s) + 1;\n    outCols = Math.floor((n - m) / s) + 1;\n    if(!Number.isFinite(outRows) || outRows < 0) outRows = 0;\n    if(!Number.isFinite(outCols) || outCols < 0) outCols = 0;\n    outputMat = Array.from({length:outRows}, ()=>Array(outCols).fill(null));\n    outputSizeText.textContent = `${outRows} × ${outCols}`;\n    sizeFormulaText.textContent = `⌊(N - M)/S⌋ + 1 = ⌊(${n} - ${m})/${s}⌋ + 1 = ${outRows}`;\n  }\n\n  function renderInput(activeTop, activeLeft){\n    const rows = inputMat.length;\n    const cols = rows ? inputMat[0].length : 0;\n    inputMatrixView.innerHTML = '';\n    inputMatrixView.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    const m = clampInt(poolSizeInput.value, 1, 20);\n\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        if(typeof activeTop === 'number' && typeof activeLeft === 'number'){\n          if(r >= activeTop && r < activeTop + m && c >= activeLeft && c < activeLeft + m){\n            div.classList.add('active');\n          }\n        }\n        div.textContent = round2(inputMat[r][c]);\n        inputMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function renderMiniMatrix(container, mat, classFn){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 38px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'mini-cell';\n        const extra = classFn ? classFn(r, c, mat[r][c]) : '';\n        if(extra) div.classList.add(extra);\n        div.textContent = round2(mat[r][c]);\n        container.appendChild(div);\n      }\n    }\n  }\n\n  function renderOutput(currentRow, currentCol){\n    outputMatrixView.innerHTML = '';\n    outputMatrixView.style.gridTemplateColumns = `repeat(${Math.max(1, outCols)}, 32px)`;\n    for(let r = 0; r < outRows; r++){\n      for(let c = 0; c < outCols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        if(outputMat[r][c] !== null) div.classList.add('done');\n        if(r === currentRow && c === currentCol) div.classList.add('center');\n        div.textContent = outputMat[r][c] === null ? '·' : round2(outputMat[r][c]);\n        outputMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function getPatch(top, left){\n    const m = clampInt(poolSizeInput.value, 1, 20);\n    const patch = [];\n    for(let r = 0; r < m; r++){\n      const row = [];\n      for(let c = 0; c < m; c++){\n        row.push(Number(inputMat[top + r][left + c] || 0));\n      }\n      patch.push(row);\n    }\n    return patch;\n  }\n\n  function poolPatch(patch){\n    const flat = patch.flat();\n    if(poolMode === 'max'){\n      const best = Math.max(...flat);\n      const idx = flat.indexOf(best);\n      const cols = patch[0].length;\n      return {\n        value: best,\n        highlight: { r: Math.floor(idx / cols), c: idx % cols },\n        text: `max(${flat.map(round2).join(', ')}) = ${round2(best)}`\n      };\n    } else {\n      const sum = flat.reduce((a,b)=>a+b,0);\n      const avg = sum / flat.length;\n      return {\n        value: avg,\n        highlight: null,\n        text: `(${flat.map(round2).join(' + ')}) / ${flat.length} = ${round2(avg)}`\n      };\n    }\n  }\n\n  function currentOutputCoord(index){\n    if(outRows === 0 || outCols === 0) return null;\n    const r = Math.floor(index / outCols);\n    const c = index % outCols;\n    return {r, c};\n  }\n\n  function updateProgress(){\n    const total = outRows * outCols;\n    progressText.textContent = `${Math.min(stepIndex, total)} / ${total}`;\n    progressBar.style.width = total ? `${100 * Math.min(stepIndex, total) / total}%` : '0%';\n  }\n\n  function doStep(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check pool size and stride.');\n      return;\n    }\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const coord = currentOutputCoord(stepIndex);\n    const s = clampInt(strideInput.value, 1, 20);\n    const top = coord.r * s;\n    const left = coord.c * s;\n\n    const patch = getPatch(top, left);\n    const pooled = poolPatch(patch);\n    outputMat[coord.r][coord.c] = pooled.value;\n\n    renderInput(top, left);\n    renderMiniMatrix(patchView, patch, (r, c) => {\n      if(poolMode === 'max' && pooled.highlight && pooled.highlight.r === r && pooled.highlight.c === c) return 'best';\n      return 'hit';\n    });\n    renderOutput(coord.r, coord.c);\n\n    formulaBox.innerHTML = `\n      <div><strong>Output(${coord.r}, ${coord.c})</strong> uses the window whose top-left corner is at input position (${top}, ${left}).</div>\n      <div style=\"margin-top:6px;\"><strong>${poolMode === 'max' ? 'Max pooling' : 'Average pooling'}:</strong> ${pooled.text}</div>\n      <div style=\"margin-top:6px;\"><strong>Result:</strong> ${round2(pooled.value)}</div>\n    `;\n    positionText.textContent = `(${coord.r}, ${coord.c})`;\n    lastValueText.textContent = round2(pooled.value);\n\n    stepIndex += 1;\n    updateProgress();\n\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      setStatus('Running...');\n    }\n  }\n\n  function finishInstant(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check pool size and stride.');\n      return;\n    }\n    stopTimer();\n    while(stepIndex < total){\n      doStep();\n    }\n    setStatus('Finished instantly.');\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n\n  function play(){\n    const ms = Math.max(10, Number(speedInput.value || 350));\n    stopTimer();\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n\n  function resetComputation(render = true){\n    stopTimer();\n    computeOutputShape();\n    stepIndex = 0;\n    formulaBox.textContent = 'Click Play or Step to begin.';\n    positionText.textContent = '—';\n    lastValueText.textContent = '—';\n    updateProgress();\n    if(render) renderAllViews();\n    setStatus('Ready.');\n  }\n\n  function renderAllViews(){\n    renderInput();\n    const m = clampInt(poolSizeInput.value, 1, 20);\n    const dots = Array.from({length:m}, ()=>Array.from({length:m}, ()=> '·'));\n    renderMiniMatrix(patchView, dots);\n    renderOutput(-1, -1);\n  }\n\n  function rebuildStructures(){\n    const n = clampInt(matSizeInput.value, 1, 15);\n    matSizeInput.value = n;\n    inputMat = makeDefaultInput(n);\n    renderEditableMatrix(inputEditGrid, inputMat);\n    resetComputation(true);\n  }\n\n  rebuildBtn.addEventListener('click', rebuildStructures);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', ()=>{ stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', ()=>{ stopTimer(); doStep(); });\n  instantBtn.addEventListener('click', finishInstant);\n  resetBtn.addEventListener('click', ()=>resetComputation(true));\n\n  maxModeBtn.addEventListener('click', ()=>setMode('max'));\n  avgModeBtn.addEventListener('click', ()=>setMode('avg'));\n\n  poolSizeInput.addEventListener('input', ()=>resetComputation(true));\n  strideInput.addEventListener('input', ()=>resetComputation(true));\n  speedInput.addEventListener('input', ()=>{ if(timer) play(); });\n  matSizeInput.addEventListener('change', rebuildStructures);\n\n  rebuildStructures();\n})();\n<\/script>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Use the toggle to contrast max and average pooling, and connect pooling windows to stride."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Pooling","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Pooling summarizes a local neighborhood and reduces spatial resolution.\nUL:Max pooling keeps the strongest local activation.\nUL:Average pooling keeps the local mean response.\nUL:Pooling increases robustness to small shifts and reduces computation deeper in the network."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Stacking CNN layers","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":""},{"mode":"panel","title":"","content":"UL:One 3×3 layer sees only a small patch.\nUL:After stacking several layers, a later unit depends on a much larger effective receptive field.\nUL:This lets the network move from edges to motifs to object parts to object-level evidence.\nUL:Depth therefore gives semantic abstraction while keeping local filters small."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"A typical CNN pipeline","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Common pattern: conv → bias/norm → ReLU → optional pooling or stride.\nUL:Repeat blocks until features are sufficiently abstract.\nUL:Finish with global average pooling or flattening, then a classifier head.\nUL:Train everything end to end with SGD or its variants."},{"mode":"panel","title":"","content":"\n\\begin{figurehtml}\n<div class=\"figure-box\" data-original-w=\"516\" data-original-h=\"191\" style=\"width: 1240px; height: 488px; transform: translate(-18px, -17px); z-index: 1; max-width: none; max-height: none;\"><figure style=\"max-width: none; max-height: none; width: 100%; height: 100%;\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAkACQAAD/4QECRXhpZgAATU0AKgAAAAgABwEOAAIAAAALAAAAYgESAAMAAAABAAEAAAEaAAUAAAABAAAAbgEbAAUAAAABAAAAdgEoAAMAAAABAAIAAAEyAAIAAAAUAAAAfodpAAQAAAABAAAAkgAAAABTY3JlZW5zaG90AAAAAACQAAAAAQAAAJAAAAABMjAyNjowNDoyMyAxMTo0OTozMgAABZADAAIAAAAUAAAA1JKGAAcAAAASAAAA6KABAAMAAAAB//8AAKACAAQAAAABAAAElqADAAQAAAABAAABpgAAAAAyMDI2OjA0OjIzIDExOjQ5OjMyAEFTQ0lJAAAAU2NyZWVuc2hvdP/tAG5QaG90b3Nob3AgMy4wADhCSU0EBAAAAAAANhwBWgADGyVHHAIAAAIAAhwCeAAKU2NyZWVuc2hvdBwCPAAGMTE0OTMyHAI3AAgyMDI2MDQyMzhCSU0EJQAAAAAA and residual connections are standard in modern convolutional architectures.\nUL:Bottleneck blocks: use 1×1 convolutions to compress and expand channels around a 3×3 convolution.\nUL:Depth-wise separable convolutions: split spatial filtering from channel mixing for efficiency.\nUL:Global average pooling: summarize each output channel before the classifier."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Bridge from the previous deep learning lecture to CNN-specific training."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"What do learned CNN layers capture?","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Early layers often act like oriented edge or color-contrast detectors.\nUL:Middle layers capture textures, corners, repeated motifs, and parts.\nUL:Later layers respond to more semantic object evidence."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Interactive demo: layer-wise CNN feature visualization","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .cnn-explorer{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .cnn-explorer *{box-sizing:border-box}\n  .cnn-explorer .topbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:center;\n    margin-bottom:12px;\n  }\n  .cnn-explorer .controls{\n    display:flex;\n    flex-wrap:wrap;\n    gap:8px;\n    align-items:center;\n  }\n  .cnn-explorer button,\n  .cnn-explorer input[type=\"file\"]{\n    font:inherit;\n  }\n  .cnn-explorer button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:7px 10px;\n    cursor:pointer;\n  }\n  .cnn-explorer button:hover{background:#f6f6f6}\n  .cnn-explorer .layout{\n    display:grid;\n    grid-template-columns:320px minmax(240px, 360px) 1fr;\n    gap:14px;\n    align-items:start;\n  }\n  .cnn-explorer .panel{\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:14px;\n    padding:10px;\n    background:#fafafa;\n  }\n  .cnn-explorer .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .cnn-explorer .image-wrap{\n    display:grid;\n    gap:8px;\n  }\n  .cnn-explorer canvas{\n    display:block;\n    width:100%;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:10px;\n  }\n  .cnn-explorer .small{\n    font-size:12px;\n    color:#555;\n    line-height:1.35;\n  }\n  .cnn-explorer .status{\n    font-size:13px;\n    color:#444;\n    margin-top:8px;\n    line-height:1.4;\n  }\n  .cnn-explorer .layer-list{\n    display:grid;\n    gap:6px;\n    max-height:620px;\n    overflow:auto;\n    padding-right:4px;\n  }\n  .cnn-explorer .layer-chip{\n    border:1px solid rgba(0,0,0,.12);\n    background:#fff;\n    border-radius:10px;\n    padding:8px 10px;\n    text-align:left;\n    cursor:pointer;\n  }\n  .cnn-explorer .layer-chip.active{\n    border-color:#60a5fa;\n    background:#dbeafe;\n  }\n  .cnn-explorer .layer-chip small{\n    display:block;\n    color:#555;\n    margin-top:3px;\n    line-height:1.25;\n  }\n  .cnn-explorer .layer-meta{\n    display:grid;\n    gap:8px;\n    margin-bottom:10px;\n  }\n  .cnn-explorer .activation-grid{\n    display:grid;\n    grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));\n    gap:10px;\n  }\n  .cnn-explorer .act-card{\n    border:1px solid rgba(0,0,0,.10);\n    background:#fff;\n    border-radius:12px;\n    padding:8px;\n  }\n  .cnn-explorer .act-card canvas{\n    width:100%;\n    aspect-ratio:1/1;\n  }\n  .cnn-explorer .act-title{\n    font-size:12px;\n    font-weight:700;\n    margin-bottom:6px;\n  }\n  .cnn-explorer .explain{\n    font-size:13px;\n    color:#444;\n    line-height:1.45;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.10);\n    border-radius:10px;\n    padding:10px;\n    margin-bottom:10px;\n  }\n  .cnn-explorer .nav{\n    display:flex;\n    gap:8px;\n    flex-wrap:wrap;\n    margin-bottom:8px;\n  }\n  .cnn-explorer .loading{\n    font-size:13px;\n    color:#444;\n  }\n  .cnn-explorer .pred-list{\n    display:grid;\n    gap:8px;\n  }\n  .cnn-explorer .pred-item{\n    border:1px solid rgba(0,0,0,.10);\n    background:#fff;\n    border-radius:12px;\n    padding:8px 10px;\n  }\n  .cnn-explorer .pred-item strong{\n    display:block;\n    margin-bottom:4px;\n  }\n  .cnn-explorer .pred-bar{\n    height:8px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:6px;\n  }\n  .cnn-explorer .pred-bar > div{\n    height:100%;\n    background:#4b89ff;\n  }\n\n  @media (max-width: 1080px){\n    .cnn-explorer .layout{\n      grid-template-columns:1fr;\n    }\n    .cnn-explorer .layer-list{\n      max-height:none;\n    }\n  }\n</style>\n\n<div class=\"cnn-explorer\" id=\"cnnExplorerRoot\">\n  <div class=\"topbar\">\n    <div class=\"controls\">\n      <label><strong>Load real image</strong></label>\n      <input type=\"file\" accept=\"image/*\" id=\"imageInput\">\n    </div>\n    <div class=\"controls\">\n      <button type=\"button\" id=\"analyzeBtn\">Analyze image</button>\n      <button type=\"button\" id=\"prevLayerBtn\">Previous layer</button>\n      <button type=\"button\" id=\"nextLayerBtn\">Next layer</button>\n    </div>\n    <div class=\"controls small\" id=\"modelStatus\">Loading pretrained CNN…</div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Input image</h4>\n      <div class=\"image-wrap\">\n        <canvas id=\"imageCanvas\" width=\"300\" height=\"300\"></canvas>\n        <canvas id=\"modelCanvas\" width=\"224\" height=\"224\"></canvas>\n      </div>\n      <div class=\"status\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Waiting for model.</span></div>\n        <div><strong>Selected layer:</strong> <span id=\"selectedLayerText\">—</span></div>\n      </div>\n      <div class=\"small\" style=\"margin-top:8px;\">\n        Top canvas shows your uploaded image. Bottom canvas shows the 224×224 version actually fed into the pretrained CNN.\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Feature layers</h4>\n      <div class=\"small\" style=\"margin-bottom:8px;\">\n        Click any convolutional feature layer to see the activation maps it produces for the current image.\n      </div>\n      <div class=\"layer-list\" id=\"layerList\"></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>What this layer captures</h4>\n      <div class=\"nav\">\n        <button type=\"button\" id=\"refreshLayerBtn\">Refresh selected layer</button>\n      </div>\n      <div class=\"layer-meta\">\n        <div class=\"loading\" id=\"layerInfoText\">Upload an image and click Analyze image.</div>\n      </div>\n      <div class=\"explain\" id=\"explainBox\">\n        Early layers usually respond to simple edges and local contrast. Mid layers respond to textures and parts. Later layers respond to more object-specific patterns.\n      </div>\n      <div class=\"activation-grid\" id=\"activationGrid\"></div>\n    </div>\n  </div>\n</div>\n\n<script src=\"https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js\"><\/script>\n<script>\n(function(){\n  const root = document.getElementById('cnnExplorerRoot');\n  if(!root || !window.tf) return;\n\n  const imageInput = root.querySelector('#imageInput');\n  const analyzeBtn = root.querySelector('#analyzeBtn');\n  const prevLayerBtn = root.querySelector('#prevLayerBtn');\n  const nextLayerBtn = root.querySelector('#nextLayerBtn');\n  const refreshLayerBtn = root.querySelector('#refreshLayerBtn');\n\n  const imageCanvas = root.querySelector('#imageCanvas');\n  const modelCanvas = root.querySelector('#modelCanvas');\n  const imgCtx = imageCanvas.getContext('2d');\n  const modelCtx = modelCanvas.getContext('2d');\n\n  const modelStatus = root.querySelector('#modelStatus');\n  const statusText = root.querySelector('#statusText');\n  const selectedLayerText = root.querySelector('#selectedLayerText');\n  const layerList = root.querySelector('#layerList');\n  const layerInfoText = root.querySelector('#layerInfoText');\n  const explainBox = root.querySelector('#explainBox');\n  const activationGrid = root.querySelector('#activationGrid');\n\n  let model = null;\n  let featureLayers = [];\n  let submodels = [];\n  let layerCache = new Map();\n  let classifierCache = null;\n  let currentLayer = 0;\n  let imageLoaded = false;\n  let imagenetLabels = [];\n\n  const MODEL_URL = 'https://storage.googleapis.com/tfjs-models/tfjs/mobilenet_v1_0.25_224/model.json';\n  const LABELS_URL = 'https://storage.googleapis.com/download.tensorflow.org/data/ImageNetLabels.txt';\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function clearActivations(){\n    activationGrid.innerHTML = '';\n    layerInfoText.textContent = 'Upload an image and click Analyze image.';\n  }\n\n  function renderImageToCanvases(img){\n    imgCtx.clearRect(0,0,imageCanvas.width,imageCanvas.height);\n    imgCtx.fillStyle = '#fff';\n    imgCtx.fillRect(0,0,imageCanvas.width,imageCanvas.height);\n\n    const scale = Math.min(imageCanvas.width / img.width, imageCanvas.height / img.height);\n    const w = img.width * scale;\n    const h = img.height * scale;\n    const x = (imageCanvas.width - w) / 2;\n    const y = (imageCanvas.height - h) / 2;\n    imgCtx.drawImage(img, x, y, w, h);\n\n    modelCtx.clearRect(0,0,modelCanvas.width,modelCanvas.height);\n    modelCtx.fillStyle = '#fff';\n    modelCtx.fillRect(0,0,224,224);\n\n    const cropSize = Math.min(img.width, img.height);\n    const sx = (img.width - cropSize) / 2;\n    const sy = (img.height - cropSize) / 2;\n    modelCtx.drawImage(img, sx, sy, cropSize, cropSize, 0, 0, 224, 224);\n  }\n\n  function preprocess(){\n    return tf.tidy(() => tf.browser.fromPixels(modelCanvas).toFloat().sub(127.5).div(127.5).expandDims(0));\n  }\n\n  function pickFeatureLayers(allLayers){\n    return allLayers.filter(l => {\n      const shape = l.outputShape;\n      return Array.isArray(shape) &&\n             shape.length === 4 &&\n             Number(shape[1]) > 1 &&\n             Number(shape[2]) > 1 &&\n             Number(shape[3]) >= 4;\n    });\n  }\n\n  function buildLayerList(){\n    layerList.innerHTML = '';\n    featureLayers.forEach((layer, idx) => {\n      const btn = document.createElement('button');\n      btn.type = 'button';\n      btn.className = 'layer-chip' + (idx === currentLayer ? ' active' : '');\n      const s = layer.outputShape;\n      btn.innerHTML = '<strong>' + (idx + 1) + '. ' + layer.name + '</strong><small>' + [s[1], s[2], s[3]].join(' × ') + '</small>';\n      btn.addEventListener('click', () => {\n        currentLayer = idx;\n        buildLayerList();\n        if(imageLoaded) analyzeCurrentLayer();\n      });\n      layerList.appendChild(btn);\n    });\n\n    const clsBtn = document.createElement('button');\n    clsBtn.type = 'button';\n    clsBtn.className = 'layer-chip' + (currentLayer === featureLayers.length ? ' active' : '');\n    clsBtn.innerHTML = '<strong>' + (featureLayers.length + 1) + '. final classifier</strong><small>fully connected logits → softmax</small>';\n    clsBtn.addEventListener('click', () => {\n      currentLayer = featureLayers.length;\n      buildLayerList();\n      if(imageLoaded) analyzeCurrentLayer();\n    });\n    layerList.appendChild(clsBtn);\n  }\n\n  function describeDepth(idx, total){\n    const t = total <= 1 ? 1 : idx / (total - 1);\n    if(t < 0.25) return 'This is an early layer. It usually responds to local edges, contrast boundaries, and simple oriented patterns.';\n    if(t < 0.6) return 'This is a middle layer. It usually combines earlier edges into textures, repeated motifs, corners, and object parts.';\n    return 'This is a deeper layer. It usually responds to more abstract parts and class-relevant configurations rather than raw edges alone.';\n  }\n\n  function argTopK(arr, k){\n    return arr.map((v, i) => ({v, i})).sort((a, b) => b.v - a.v).slice(0, k).map(o => o.i);\n  }\n\n  async function tensor2dToCanvas(t2d, canvas){\n    const [h, w] = t2d.shape;\n    const tmp = document.createElement('canvas');\n    tmp.width = w;\n    tmp.height = h;\n    const tmpCtx = tmp.getContext('2d');\n    const data = await t2d.data();\n    const img = tmpCtx.createImageData(w, h);\n    for(let i = 0; i < data.length; i++){\n      const g = Math.max(0, Math.min(255, Math.round(data[i] * 255)));\n      img.data[4*i+0] = g;\n      img.data[4*i+1] = g;\n      img.data[4*i+2] = g;\n      img.data[4*i+3] = 255;\n    }\n    tmpCtx.putImageData(img, 0, 0);\n    const ctx = canvas.getContext('2d');\n    ctx.clearRect(0,0,canvas.width,canvas.height);\n    ctx.imageSmoothingEnabled = false;\n    ctx.drawImage(tmp, 0, 0, canvas.width, canvas.height);\n  }\n\n  async function loadLabels(){\n    if(imagenetLabels.length) return imagenetLabels;\n    try{\n      const txt = await fetch(LABELS_URL).then(r => r.text());\n      let lines = txt.split(/\\r?\\n/).map(x => x.trim()).filter(Boolean);\n      if(lines.length === 1001 && /^background$/i.test(lines[0])) lines = lines.slice(1);\n      imagenetLabels = lines;\n    }catch(err){\n      console.error(err);\n      imagenetLabels = [];\n    }\n    return imagenetLabels;\n  }\n\n  async function computeClassifierSummary(){\n    if(classifierCache) return classifierCache;\n    const input = preprocess();\n    const logits = model.predict(input);\n    input.dispose();\n    try{\n      const probs = tf.softmax(logits.squeeze());\n      const values = Array.from(await probs.data());\n      probs.dispose();\n      const labels = await loadLabels();\n      const top = argTopK(values, 5).map(i => ({\n        index: i,\n        label: labels[i] || ('class ' + i),\n        prob: values[i]\n      }));\n      classifierCache = { top, numClasses: values.length };\n      return classifierCache;\n    } finally {\n      logits.dispose();\n    }\n  }\n\n  function renderClassifierSummary(summary){\n    selectedLayerText.textContent = 'final classifier';\n    layerInfoText.textContent = 'Final fully connected output over ' + summary.numClasses + ' classes. Below are the top predicted classes after softmax.';\n    explainBox.textContent = 'The convolutional stack has already converted the image into high-level features. This final linear classifier turns those features into class scores, and softmax converts them into probabilities.';\n    activationGrid.innerHTML = '';\n    const list = document.createElement('div');\n    list.className = 'pred-list';\n    summary.top.forEach((item, rank) => {\n      const div = document.createElement('div');\n      div.className = 'pred-item';\n      div.innerHTML = '<strong>#' + (rank + 1) + ' ' + item.label + '</strong>' +\n        '<div class=\"small\">probability = ' + (100 * item.prob).toFixed(2) + '%</div>' +\n        '<div class=\"pred-bar\"><div style=\"width:' + (100 * item.prob).toFixed(2) + '%\"></div></div>';\n      list.appendChild(div);\n    });\n    activationGrid.appendChild(list);\n    setStatus('Showing final classifier predictions.');\n  }\n\n  async function computeLayerSummary(idx){\n    const key = String(idx);\n    if(layerCache.has(key)) return layerCache.get(key);\n\n    const layer = featureLayers[idx];\n    if(!submodels[idx]){\n      submodels[idx] = tf.model({inputs: model.inputs, outputs: layer.output});\n    }\n\n    const input = preprocess();\n    const act = submodels[idx].predict(input);\n    input.dispose();\n\n    const summary = { layerName: layer.name, shape: act.shape.slice(), meanUrl: null, top: [] };\n\n    try{\n      const squeezed = act.squeeze();\n      const channelMeansTensor = tf.mean(squeezed, [0,1]);\n      const channelMeans = Array.from(await channelMeansTensor.data());\n      channelMeansTensor.dispose();\n\n      const meanMap = tf.tidy(() => {\n        const x = tf.mean(squeezed, -1);\n        const min = x.min();\n        const max = x.max();\n        return x.sub(min).div(max.sub(min).add(1e-6));\n      });\n\n      const meanCanvas = document.createElement('canvas');\n      meanCanvas.width = 160;\n      meanCanvas.height = 160;\n      await tensor2dToCanvas(meanMap, meanCanvas);\n      summary.meanUrl = meanCanvas.toDataURL();\n      meanMap.dispose();\n\n      const topChannels = argTopK(channelMeans, Math.min(6, channelMeans.length));\n      for(const ch of topChannels){\n        const t = tf.tidy(() => {\n          const chMap = squeezed.slice([0,0,ch], [squeezed.shape[0], squeezed.shape[1], 1]).squeeze();\n          const min = chMap.min();\n          const max = chMap.max();\n          return chMap.sub(min).div(max.sub(min).add(1e-6));\n        });\n        const c = document.createElement('canvas');\n        c.width = 140;\n        c.height = 140;\n        await tensor2dToCanvas(t, c);\n        summary.top.push({\n          channel: ch,\n          score: channelMeans[ch],\n          url: c.toDataURL()\n        });\n        t.dispose();\n      }\n      squeezed.dispose();\n    } finally {\n      act.dispose();\n    }\n\n    layerCache.set(key, summary);\n    return summary;\n  }\n\n  async function analyzeCurrentLayer(){\n    if(!imageLoaded){\n      setStatus('Load an image first.');\n      return;\n    }\n\n    if(currentLayer === featureLayers.length){\n      selectedLayerText.textContent = 'final classifier';\n      layerInfoText.textContent = 'Computing classifier predictions…';\n      explainBox.textContent = 'The convolutional stack has already converted the image into high-level features. This final linear classifier turns those features into class scores, and softmax converts them into probabilities.';\n      activationGrid.innerHTML = '';\n      const summary = await computeClassifierSummary();\n      renderClassifierSummary(summary);\n      return;\n    }\n\n    const layer = featureLayers[currentLayer];\n    selectedLayerText.textContent = layer.name;\n    layerInfoText.textContent = 'Computing activations for ' + layer.name + '…';\n    explainBox.textContent = describeDepth(currentLayer, featureLayers.length);\n    activationGrid.innerHTML = '';\n\n    const summary = await computeLayerSummary(currentLayer);\n    const shape = summary.shape;\n    layerInfoText.textContent = 'Layer ' + (currentLayer + 1) + ' of ' + featureLayers.length + ': ' +\n      summary.layerName + ' → shape ' + shape.slice(1).join(' × ');\n\n    const meanCard = document.createElement('div');\n    meanCard.className = 'act-card';\n    meanCard.innerHTML = '<div class=\"act-title\">Mean over channels</div>';\n    const meanCanvas = document.createElement('canvas');\n    meanCanvas.width = 140;\n    meanCanvas.height = 140;\n    meanCard.appendChild(meanCanvas);\n    activationGrid.appendChild(meanCard);\n\n    const meanImg = new Image();\n    meanImg.onload = () => {\n      const ctx = meanCanvas.getContext('2d');\n      ctx.clearRect(0,0,meanCanvas.width,meanCanvas.height);\n      ctx.imageSmoothingEnabled = false;\n      ctx.drawImage(meanImg, 0, 0, meanCanvas.width, meanCanvas.height);\n    };\n    meanImg.src = summary.meanUrl;\n\n    summary.top.forEach(item => {\n      const card = document.createElement('div');\n      card.className = 'act-card';\n      card.innerHTML = '<div class=\"act-title\">Channel ' + item.channel + '<br><span class=\"small\">mean=' + item.score.toFixed(4) + '</span></div>';\n      const c = document.createElement('canvas');\n      c.width = 140;\n      c.height = 140;\n      card.appendChild(c);\n      activationGrid.appendChild(card);\n\n      const img = new Image();\n      img.onload = () => {\n        const ctx = c.getContext('2d');\n        ctx.clearRect(0,0,c.width,c.height);\n        ctx.imageSmoothingEnabled = false;\n        ctx.drawImage(img, 0, 0, c.width, c.height);\n      };\n      img.src = item.url;\n    });\n\n    setStatus('Showing activations for ' + layer.name + '.');\n  }\n\n  async function loadModel(){\n    modelStatus.textContent = 'Loading pretrained CNN…';\n    setStatus('Loading pretrained CNN…');\n    model = await tf.loadLayersModel(MODEL_URL);\n    await loadLabels();\n    featureLayers = pickFeatureLayers(model.layers);\n    submodels = new Array(featureLayers.length).fill(null);\n    currentLayer = 0;\n    buildLayerList();\n    modelStatus.textContent = 'Loaded pretrained MobileNet.';\n    setStatus('Model ready. Load an image and click Analyze image.');\n  }\n\n  imageInput.addEventListener('change', e => {\n    const file = e.target.files && e.target.files[0];\n    if(!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      const img = new Image();\n      img.onload = () => {\n        imageLoaded = true;\n        layerCache.clear();\n        classifierCache = null;\n        renderImageToCanvases(img);\n        clearActivations();\n        setStatus('Image loaded. Click Analyze image.');\n      };\n      img.src = reader.result;\n    };\n    reader.readAsDataURL(file);\n  });\n\n  analyzeBtn.addEventListener('click', () => analyzeCurrentLayer());\n  refreshLayerBtn.addEventListener('click', () => analyzeCurrentLayer());\n\n  prevLayerBtn.addEventListener('click', () => {\n    if(!featureLayers.length) return;\n    currentLayer = Math.max(0, currentLayer - 1);\n    buildLayerList();\n    if(imageLoaded) analyzeCurrentLayer();\n  });\n\n  nextLayerBtn.addEventListener('click', () => {\n    if(!featureLayers.length) return;\n    currentLayer = Math.min(featureLayers.length, currentLayer + 1);\n    buildLayerList();\n    if(imageLoaded) analyzeCurrentLayer();\n  });\n\n  loadModel().catch(err => {\n    console.error(err);\n    modelStatus.textContent = 'Could not load pretrained CNN.';\n    setStatus('Model load failed.');\n    layerInfoText.textContent = String(err && err function renderBlock(block,placeholderText){const resolvedMode=block.mode||'panel';const raw=block.content||'';if(resolvedMode==='diagram')return diagramMarkup();if(resolvedMode==='custom')return customFrameMarkup(raw);if(resolvedMode==='placeholder')return '<div class="placeholder">'+escapeHtml(raw||placeholderText||'Placeholder')+'</div>';if(resolvedMode==='pseudocode')return '<pre class="pseudo-block">'+escapeHtml(raw)+'</pre>';if(resolvedMode==='pseudocode-latex'){const p=preserveMathTokens(raw);return '<div class="pseudo-latex-block">'+restoreMathTokens(escapeHtml(p.out),p.tokens)+'</div>';}return '<div class="rich">'+parseStructuredText(raw)+'</div>';}
function renderBlocks(blocks,placeholder){const list=blocks&&blocks.length?blocks:[{mode:'placeholder',content:placeholder||'Add a block'}];return '<div class="col-stack">'+list.map(block=>renderBlock(block,placeholder)).join('')+'</div>';}
function buildSlideInner(slide){const heading=slide.headingLevel||'h2';const titleHtml='<'+heading+'>'+escapeHtml(slide.title||'Untitled slide').replace(/\n/g,'<br>')+'</'+heading+'>';const kickerHtml=slide.kicker?'<div class="kicker">'+escapeHtml(slide.kicker)+'</div>':'';const ledeHtml=slide.lede?'<div class="lede">'+escapeHtml(slide.lede)+'</div>':'';const s=normalizeSlide(slide);if(s.slideType==='title-center')return '<div class="title-center">'+titleHtml+kickerHtml+'</div>';if(s.slideType==='section-divider')return '<div class="section-divider-wrap"><div><div class="divider-kicker">'+escapeHtml(s.kicker||'Section')+'</div>'+titleHtml+'<div class="divider-line"></div><div class="divider-lede">'+escapeHtml(s.lede||'')+'</div></div></div>';if(['two-col','title-two-callouts','title-figure-explanation','comparison','image-left-text-right'].includes(s.slideType)){const layoutClass={ 'two-col':'layout-two-col','title-two-callouts':'layout-two-callouts','title-figure-explanation':'layout-figure-explanation','comparison':'layout-comparison','image-left-text-right':'layout-image-left-text-right'}[s.slideType]||'layout-two-col';const leftHead=s.slideType==='comparison'?'<div class="comparison-head">'+escapeHtml((s.leftBlocks[0]&&s.leftBlocks[0].title)||'Left')+'</div>':'';const rightHead=s.slideType==='comparison'?'<div class="comparison-head">'+escapeHtml((s.rightBlocks[0]&&s.rightBlocks[0].title)||'Right')+'</div>':'';return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body '+layoutClass+'"><div class="col">'+leftHead+renderBlocks(s.leftBlocks,'Left column')+'</div><div class="col">'+rightHead+renderBlocks(s.rightBlocks,'Right column')+'</div></div>';}if(s.slideType==='theorem-proof'){const theorem=s.leftBlocks[0]||{mode:'panel',content:'\paragraph{Theorem} State the result here.'};const proof=s.leftBlocks[1]||{mode:'panel',content:'\paragraph{Proof sketch} Add the argument here.'};return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col theorem-proof-wrap"><div class="named-box"><div class="named-box-head">'+escapeHtml(theorem.title||'Theorem')+'</div><div class="named-box-body">'+renderBlock({...theorem,title:''},'Theorem')+'</div></div><div class="named-box"><div class="named-box-head">'+escapeHtml(proof.title||'Proof')+'</div><div class="named-box-body">'+renderBlock({...proof,title:''},'Proof')+'</div></div></div></div>';}if(s.slideType==='algorithm-layout'){const algo=s.leftBlocks[0]||{mode:'pseudocode',content:'Algorithm goes here'};const notes=s.leftBlocks.slice(1);return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col algorithm-wrap">'+renderBlock(algo,'Algorithm')+(notes.length?renderBlocks(notes,'Notes'):'')+'</div></div>';}if(s.slideType==='full-width-figure-caption'){const fig=s.leftBlocks[0]||{mode:'placeholder',content:'Add a figure block'};const captionBlocks=s.leftBlocks.slice(1);return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col full-figure-wrap">'+renderBlock(fig,'Figure')+(captionBlocks.length?'<div class="figure-caption">'+renderBlocks(captionBlocks,'Caption')+'</div>':'')+'</div></div>';}return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col">'+renderBlocks(s.leftBlocks,'Main content')+'</div></div>';}
const deck=document.getElementById('deck');const slideMap=document.getElementById('slideMap');const slideMapList=document.getElementById('slideMapList');document.getElementById('deckTitle').textContent=deckPayload.deckTitle||'Slides';
deck.innerHTML=deckPayload.slides.map((slide,idx)=>{const cls=slide.slideType==='title-center'?'deck-slide title-center':(slide.slideType==='two-col'?'deck-slide two-col':'deck-slide single');return '<section class="'+cls+'" data-index="'+idx+'" style="'+buildSlideStyle(slide)+'"><button class="slides-button" type="button">Slides</button><div class="slide-number">'+(idx+1)+' / '+deckPayload.slides.length+'</div>'+buildSlideInner(slide).trim()+'</section>';}).join('\n');
slideMapList.innerHTML=deckPayload.slides.map((slide,idx)=>'<button type="button" class="slide-map-item" data-go="'+idx+'"><span>'+(idx+1)+'.</span><span>'+escapeHtml(slide.title||('Slide '+(idx+1)))+'</span></button>').join('');
let active=0;const slideEls=Array.from(document.querySelectorAll('.deck-slide'));
function fitFiguresInSlide(slideEl){if(!slideEl)return;const figures=Array.from(slideEl.querySelectorAll('.figure-embed'));if(!figures.length)return;figures.forEach(embed=>{embed.style.maxHeight='';const media=embed.querySelector('img,svg,canvas,iframe');if(media)media.style.maxHeight='';});const maxHeight=slideEl.clientHeight||window.innerHeight||900;let guard=0;while(slideEl.scrollHeight>maxHeight+2&&guard<16){const overflow=slideEl.scrollHeight-maxHeight;const candidates=figures.map(embed=>{const media=embed.querySelector('img,svg,canvas,iframe');const rect=(media||embed).getBoundingClientRect();return {embed,media,h:rect.height||0};}).filter(x=>x.h>40).sort((a,b)=>b.h-a.h);if(!candidates.length)break;const c=candidates[0];const current=parseFloat((c.media&&c.media.style.maxHeight)||c.h);const reduce=Math.min(Math.max(overflow+8,24),current*0.35);const next=Math.max(70,current-reduce);c.embed.style.maxHeight=(next+12)+'px';if(c.media)c.media.style.maxHeight=next+'px';guard+=1;}}
function fitFiguresIn(root){(root||document).querySelectorAll('.deck-slide.active,.print-cell .slide,.slide').forEach(fitFiguresInSlide);}
function render(){slideEls.forEach((el,i)=>el.classList.toggle('active',i===active));if(window.MathJax&&typeof window.MathJax.typesetPromise==='function'){if(typeof window.MathJax.typesetClear==='function')window.MathJax.typesetClear(slideEls);window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).then(()=>fitFiguresIn(document)).catch(()=>fitFiguresIn(document));}else{fitFiguresIn(document);}}
function go(i){if(i<0||i>=slideEls.length)return;active=i;render();slideMap.classList.remove('open');}
document.getElementById('prevBtn').addEventListener('click',()=>go(active-1));document.getElementById('nextBtn').addEventListener('click',()=>go(active+1));document.getElementById('closeMapBtn').addEventListener('click',()=>slideMap.classList.remove('open'));document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click',()=>slideMap.classList.add('open')));document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click',()=>go(Number(btn.dataset.go))));window.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(active+1);}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(active-1);}if(e.key==='Escape')slideMap.classList.remove('open');});render();
</script>
