ightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Motivate locality and sharing before introducing the algebra."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Convolution as sliding dot products","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Take a small filter \\(W\\in\\mathbb{R}^{k\\times k}\\).\nUL:Place it on a local patch of the input.\nUL:Multiply elementwise, sum, add a bias, and move to the next location.\nUL:This produces one output channel or feature map.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}},{"mode":"panel","title":"","content":"EQ: \\(\\textrm{Convolve filter } z(i,j)=\\sum_{u=1}^{k}\\sum_{v=1}^{k} W(u,v)\\,X(i+u-1,j+v-1)+b\\)\nP:Apply activation fucntion such as ReLU   \\(~~~~~~~~~~~~~~~~~~~a(i,j) = \\sigma(z(i,j))\\)","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Interactive demo: single-channel convolution","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .conv-step-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .conv-step-demo *{box-sizing:border-box}\n  .conv-step-demo .toolbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:end;\n    margin-bottom:12px;\n  }\n  .conv-step-demo .control{\n    display:flex;\n    flex-direction:column;\n    gap:4px;\n    min-width:84px;\n  }\n  .conv-step-demo label{\n    font-size:12px;\n    color:#444;\n    font-weight:600;\n  }\n  .conv-step-demo input,\n  .conv-step-demo button,\n  .conv-step-demo select{\n    font:inherit;\n  }\n  .conv-step-demo input[type=\"number\"]{\n    width:84px;\n    padding:6px 8px;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n    background:#fff;\n  }\n  .conv-step-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:8px 10px;\n    cursor:pointer;\n  }\n  .conv-step-demo button:hover{background:#f6f6f6}\n  .conv-step-demo .layout{\n    display:grid;\n    grid-template-columns:1.4fr 1fr 1.15fr;\n    gap:14px;\n    align-items:start;\n  }\n  .conv-step-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    background:#fafafa;\n    border-radius:14px;\n    padding:10px;\n  }\n  .conv-step-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .conv-step-demo .matrix-grid{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .conv-step-demo .matrix-cell{\n    width:32px;\n    height:32px;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:6px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    font-size:12px;\n    background:#fff;\n  }\n  .conv-step-demo .matrix-cell.pad{\n    background:#f2f2f2;\n    color:#666;\n  }\n  .conv-step-demo .matrix-cell.active{\n    background:#ffe4e6;\n    border-color:#fb7185;\n    font-weight:700;\n  }\n  .conv-step-demo .matrix-cell.center{\n    outline:2px solid #ef4444;\n    outline-offset:-2px;\n  }\n  .conv-step-demo .matrix-cell.done{\n    background:#dbeafe;\n    border-color:#60a5fa;\n  }\n  .conv-step-demo .matrix-edit{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .conv-step-demo .matrix-edit input{\n    width:32px;\n    height:32px;\n    padding:2px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.16);\n    border-radius:6px;\n    font-size:12px;\n  }\n  .conv-step-demo .mini-matrix{\n    display:grid;\n    gap:2px;\n    justify-content:start;\n    margin-bottom:8px;\n  }\n  .conv-step-demo .mini-cell{\n    width:38px;\n    height:38px;\n    border:1px solid rgba(0,0,0,.14);\n    border-radius:8px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    background:#fff;\n    font-size:13px;\n  }\n  .conv-step-demo .mini-cell.hit{\n    background:#fee2e2;\n    border-color:#f87171;\n    font-weight:700;\n  }\n  .conv-step-demo .formula{\n    font-size:13px;\n    line-height:1.45;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.10);\n    border-radius:10px;\n    padding:10px;\n    min-height:90px;\n  }\n  .conv-step-demo .stats{\n    display:grid;\n    gap:6px;\n    font-size:13px;\n    color:#444;\n    margin-top:8px;\n  }\n  .conv-step-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .conv-step-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  .conv-step-demo .small{\n    font-size:12px;\n    color:#555;\n  }\n  .conv-step-demo .matrix-caption{\n    font-size:12px;\n    color:#555;\n    margin:6px 0 8px;\n  }\n  .conv-step-demo .output-grid-wrap{\n    overflow:auto;\n  }\n  @media (max-width: 980px){\n    .conv-step-demo .layout{\n      grid-template-columns:1fr;\n    }\n  }\n</style>\n\n<div class=\"conv-step-demo\" id=\"convStepDemoRoot\">\n  <div class=\"toolbar\">\n    <div class=\"control\">\n      <label>Input size</label>\n      <input id=\"matSizeInput\" type=\"number\" min=\"1\" max=\"15\" step=\"1\" value=\"9\">\n    </div>\n    <div class=\"control\">\n      <label>Filter size k</label>\n      <input id=\"kernelSizeInput\" type=\"number\" min=\"1\" max=\"7\" step=\"1\" value=\"3\">\n    </div>\n    <div class=\"control\">\n      <label>Stride</label>\n      <input id=\"strideInput\" type=\"number\" min=\"1\" max=\"5\" step=\"1\" value=\"1\">\n    </div>\n    <div class=\"control\">\n      <label>Padding</label>\n      <input id=\"paddingInput\" type=\"number\" min=\"0\" max=\"5\" step=\"1\" value=\"0\">\n    </div>\n    <div class=\"control\">\n      <label>Speed (ms)</label>\n      <input id=\"speedInput\" type=\"number\" min=\"10\" max=\"2000\" step=\"10\" value=\"350\">\n    </div>\n    <div class=\"control\"><button id=\"rebuildBtn\" type=\"button\">Rebuild</button></div>\n    <div class=\"control\"><button id=\"playBtn\" type=\"button\">Play</button></div>\n    <div class=\"control\"><button id=\"pauseBtn\" type=\"button\">Pause</button></div>\n    <div class=\"control\"><button id=\"stepBtn\" type=\"button\">Step</button></div>\n    <div class=\"control\"><button id=\"instantBtn\" type=\"button\">Instant</button></div>\n    <div class=\"control\"><button id=\"resetBtn\" type=\"button\">Reset</button></div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Editable input matrix</h4>\n      <div class=\"matrix-caption\">Edit the entries directly. The padded matrix below is what convolution actually scans.</div>\n      <div id=\"inputEditGrid\" class=\"matrix-edit\"></div>\n      <div class=\"matrix-caption\" id=\"paddedCaption\">Padded matrix</div>\n      <div id=\"paddedMatrixView\" class=\"matrix-grid\"></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Filter and current computation</h4>\n      <div class=\"matrix-caption\">Edit the filter entries directly.</div>\n      <div id=\"kernelEditGrid\" class=\"matrix-edit\"></div>\n      <div class=\"matrix-caption\">Current input patch</div>\n      <div id=\"patchView\" class=\"mini-matrix\"></div>\n      <div class=\"matrix-caption\">Current elementwise products</div>\n      <div id=\"productView\" class=\"mini-matrix\"></div>\n      <div class=\"formula\" id=\"formulaBox\">Click Play or Step to begin.</div>\n      <div class=\"stats\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Ready.</span></div>\n        <div><strong>Current output position:</strong> <span id=\"positionText\">—</span></div>\n        <div><strong>Output size:</strong> <span id=\"outputSizeText\">—</span></div>\n      </div>\n      <div class=\"progress\"><div id=\"progressBar\"></div></div>\n      <div class=\"small\">Progress: <span id=\"progressText\">0 / 0</span></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Output matrix</h4>\n      <div class=\"matrix-caption\">The output gets filled in step by step as the filter moves.</div>\n      <div class=\"output-grid-wrap\">\n        <div id=\"outputMatrixView\" class=\"matrix-grid\"></div>\n      </div>\n      <div class=\"stats\">\n        <div><strong>Formula:</strong> <span id=\"sizeFormulaText\">—</span></div>\n        <div><strong>Last computed value:</strong> <span id=\"lastValueText\">—</span></div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('convStepDemoRoot');\n  if(!root) return;\n\n  const matSizeInput = root.querySelector('#matSizeInput');\n  const kernelSizeInput = root.querySelector('#kernelSizeInput');\n  const strideInput = root.querySelector('#strideInput');\n  const paddingInput = root.querySelector('#paddingInput');\n  const speedInput = root.querySelector('#speedInput');\n\n  const rebuildBtn = root.querySelector('#rebuildBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const instantBtn = root.querySelector('#instantBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n\n  const inputEditGrid = root.querySelector('#inputEditGrid');\n  const kernelEditGrid = root.querySelector('#kernelEditGrid');\n  const paddedMatrixView = root.querySelector('#paddedMatrixView');\n  const patchView = root.querySelector('#patchView');\n  const productView = root.querySelector('#productView');\n  const outputMatrixView = root.querySelector('#outputMatrixView');\n\n  const formulaBox = root.querySelector('#formulaBox');\n  const statusText = root.querySelector('#statusText');\n  const positionText = root.querySelector('#positionText');\n  const outputSizeText = root.querySelector('#outputSizeText');\n  const sizeFormulaText = root.querySelector('#sizeFormulaText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const lastValueText = root.querySelector('#lastValueText');\n  const paddedCaption = root.querySelector('#paddedCaption');\n\n  let inputMat = [];\n  let kernelMat = [];\n  let paddedMat = [];\n  let outputMat = [];\n  let outRows = 0, outCols = 0;\n  let stepIndex = 0;\n  let timer = null;\n\n  function clampInt(v, lo, hi){\n    return Math.max(lo, Math.min(hi, Math.floor(Number(v) || 0)));\n  }\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function makeDefaultInput(n){\n    const arr = Array.from({length:n}, ()=>Array(n).fill(0));\n    const start = Math.max(1, Math.floor(n * 0.22));\n    const end = Math.min(n - 2, Math.ceil(n * 0.78));\n    for(let r = start; r <= end; r++){\n      for(let c = start; c <= end; c++){\n        if(r === start || r === end || c === start || c === end){\n          arr[r][c] = 1;\n        }\n      }\n    }\n    return arr;\n  }\n\n  function makeDefaultKernel(k){\n    const arr = [];\n    const center = Math.floor(k / 2);\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        if(k === 3){\n          const preset = [[1,0,-1],[1,0,-1],[1,0,-1]];\n          row.push(preset[r][c]);\n        } else {\n          row.push(r === center && c === center ? 1 : 0);\n        }\n      }\n      arr.push(row);\n    }\n    return arr;\n  }\n\n  function renderEditableMatrix(container, mat, onChange){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const inp = document.createElement('input');\n        inp.type = 'number';\n        inp.step = 'any';\n        inp.value = mat[r][c];\n        inp.addEventListener('input', () => {\n          mat[r][c] = Number(inp.value || 0);\n          resetComputation(false);\n          renderAllViews();\n          if(r === 0 && c === 0){/* noop to keep linter calm */}\n          if(typeof onChange === 'function') onChange();\n        });\n        container.appendChild(inp);\n      }\n    }\n  }\n\n  function buildPadded(){\n    const p = clampInt(paddingInput.value, 0, 10);\n    const n = inputMat.length;\n    const m = n + 2 * p;\n    paddedMat = Array.from({length:m}, ()=>Array(m).fill(0));\n    for(let r = 0; r < n; r++){\n      for(let c = 0; c < n; c++){\n        paddedMat[r + p][c + p] = Number(inputMat[r][c] || 0);\n      }\n    }\n    paddedCaption.textContent = `Padded matrix (${m}×${m})`;\n  }\n\n  function computeOutputShape(){\n    const n = inputMat.length;\n    const k = kernelMat.length;\n    const s = clampInt(strideInput.value, 1, 20);\n    const p = clampInt(paddingInput.value, 0, 10);\n    outRows = Math.floor((n + 2*p - k) / s) + 1;\n    outCols = Math.floor((n + 2*p - k) / s) + 1;\n    if(!Number.isFinite(outRows) || outRows < 0) outRows = 0;\n    if(!Number.isFinite(outCols) || outCols < 0) outCols = 0;\n    outputMat = Array.from({length:outRows}, ()=>Array(outCols).fill(null));\n    outputSizeText.textContent = `${outRows} × ${outCols}`;\n    sizeFormulaText.textContent = `⌊(N + 2P - K)/S⌋ + 1 = ⌊(${n} + 2·${p} - ${k})/${s}⌋ + 1 = ${outRows}`;\n  }\n\n  function renderPadded(activeTop, activeLeft){\n    const rows = paddedMat.length;\n    const cols = rows ? paddedMat[0].length : 0;\n    paddedMatrixView.innerHTML = '';\n    paddedMatrixView.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    const p = clampInt(paddingInput.value, 0, 10);\n    const origN = inputMat.length;\n\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        const isPad = r < p || c < p || r >= p + origN || c >= p + origN;\n        if(isPad) div.classList.add('pad');\n        if(typeof activeTop === 'number' && typeof activeLeft === 'number'){\n          const k = kernelMat.length;\n          if(r >= activeTop && r < activeTop + k && c >= activeLeft && c < activeLeft + k){\n            div.classList.add('active');\n          }\n        }\n        div.textContent = paddedMat[r][c];\n        paddedMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function renderMiniMatrix(container, mat, classFn){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 38px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'mini-cell';\n        if(classFn) {\n          const extra = classFn(r, c, mat[r][c]);\n          if(extra) div.classList.add(extra);\n        }\n        div.textContent = Number.isFinite(mat[r][c]) ? round2(mat[r][c]) : mat[r][c];\n        container.appendChild(div);\n      }\n    }\n  }\n\n  function renderOutput(currentRow, currentCol){\n    outputMatrixView.innerHTML = '';\n    outputMatrixView.style.gridTemplateColumns = `repeat(${Math.max(1, outCols)}, 32px)`;\n    for(let r = 0; r < outRows; r++){\n      for(let c = 0; c < outCols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        if(outputMat[r][c] !== null) div.classList.add('done');\n        if(r === currentRow && c === currentCol) div.classList.add('center');\n        div.textContent = outputMat[r][c] === null ? '·' : round2(outputMat[r][c]);\n        outputMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function round2(x){\n    const n = Number(x);\n    if(!Number.isFinite(n)) return x;\n    return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(2);\n  }\n\n  function getPatch(top, left){\n    const k = kernelMat.length;\n    const patch = [];\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        row.push(paddedMat[top + r][left + c]);\n      }\n      patch.push(row);\n    }\n    return patch;\n  }\n\n  function multiplyPatch(patch, kernel){\n    const k = kernel.length;\n    const prod = [];\n    let sum = 0;\n    const terms = [];\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        const v = patch[r][c] * kernel[r][c];\n        row.push(v);\n        sum += v;\n        terms.push(`${round2(patch[r][c])}×${round2(kernel[r][c])}`);\n      }\n      prod.push(row);\n    }\n    return {prod, sum, terms};\n  }\n\n  function currentOutputCoord(index){\n    if(outRows === 0 || outCols === 0) return null;\n    const r = Math.floor(index / outCols);\n    const c = index % outCols;\n    return {r, c};\n  }\n\n  function updateProgress(){\n    const total = outRows * outCols;\n    progressText.textContent = `${Math.min(stepIndex, total)} / ${total}`;\n    progressBar.style.width = total ? `${100 * Math.min(stepIndex, total) / total}%` : '0%';\n  }\n\n  function doStep(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const coord = currentOutputCoord(stepIndex);\n    const s = clampInt(strideInput.value, 1, 20);\n    const top = coord.r * s;\n    const left = coord.c * s;\n\n    const patch = getPatch(top, left);\n    const result = multiplyPatch(patch, kernelMat);\n    outputMat[coord.r][coord.c] = result.sum;\n\n    renderPadded(top, left);\n    renderMiniMatrix(patchView, patch, ()=> 'hit');\n    renderMiniMatrix(productView, result.prod, ()=> 'hit');\n    renderOutput(coord.r, coord.c);\n\n    formulaBox.innerHTML = `\n      <div><strong>Output(${coord.r}, ${coord.c})</strong> uses the patch whose top-left corner is at padded input position (${top}, ${left}).</div>\n      <div style=\"margin-top:6px;\"><strong>Computation:</strong> ${result.terms.join(' + ')}</div>\n      <div style=\"margin-top:6px;\"><strong>Sum:</strong> ${round2(result.sum)}</div>\n    `;\n    positionText.textContent = `(${coord.r}, ${coord.c})`;\n    lastValueText.textContent = round2(result.sum);\n\n    stepIndex += 1;\n    updateProgress();\n\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      setStatus('Running...');\n    }\n  }\n\n  function finishInstant(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    stopTimer();\n    while(stepIndex < total){\n      doStep();\n    }\n    setStatus('Finished instantly.');\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n\n  function play(){\n    const ms = Math.max(10, Number(speedInput.value || 350));\n    stopTimer();\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n\n  function resetComputation(render = true){\n    stopTimer();\n    buildPadded();\n    computeOutputShape();\n    stepIndex = 0;\n    formulaBox.textContent = 'Click Play or Step to begin.';\n    positionText.textContent = '—';\n    lastValueText.textContent = '—';\n    updateProgress();\n    if(render) renderAllViews();\n    setStatus('Ready.');\n  }\n\n  function renderAllViews(){\n    renderPadded();\n    renderMiniMatrix(patchView, kernelMat.map(row=>row.map(()=> '·')));\n    renderMiniMatrix(productView, kernelMat.map(row=>row.map(()=> '·')));\n    renderOutput(-1, -1);\n  }\n\n  function rebuildStructures(){\n    const n = clampInt(matSizeInput.value, 1, 15);\n    const k = clampInt(kernelSizeInput.value, 1, 7);\n    matSizeInput.value = n;\n    kernelSizeInput.value = k;\n\n    inputMat = makeDefaultInput(n);\n    kernelMat = makeDefaultKernel(k);\n\n    renderEditableMatrix(inputEditGrid, inputMat, () => {});\n    renderEditableMatrix(kernelEditGrid, kernelMat, () => {});\n    resetComputation(true);\n  }\n\n  rebuildBtn.addEventListener('click', rebuildStructures);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', ()=>{ stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', ()=>{ stopTimer(); doStep(); });\n  instantBtn.addEventListener('click', finishInstant);\n  resetBtn.addEventListener('click', ()=>resetComputation(true));\n\n  strideInput.addEventListener('input', ()=>resetComputation(true));\n  paddingInput.addEventListener('input', ()=>resetComputation(true));\n  speedInput.addEventListener('input', ()=>{ if(timer) play(); });\n  matSizeInput.addEventListener('change', rebuildStructures);\n  kernelSizeInput.addEventListener('change', rebuildStructures);\n\n  rebuildStructures();\n})();\n<\/script>\n","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Use this to explain the mechanics of the sliding window, output size, and the sum at each location."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Lets try on a Real Image","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .conv-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .conv-demo *{box-sizing:border-box}\n  .conv-demo .topbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:center;\n    margin-bottom:12px;\n  }\n  .conv-demo .controls{\n    display:flex;\n    flex-wrap:wrap;\n    gap:8px;\n    align-items:center;\n  }\n  .conv-demo button,\n  .conv-demo input[type=\"number\"],\n  .conv-demo input[type=\"range\"],\n  .conv-demo input[type=\"file\"]{\n    font:inherit;\n  }\n  .conv-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:7px 10px;\n    cursor:pointer;\n  }\n  .conv-demo button:hover{background:#f6f6f6}\n  .conv-demo .kernel-box{\n    display:grid;\n    grid-template-columns:repeat(3, 58px);\n    gap:6px;\n    align-items:center;\n  }\n  .conv-demo .kernel-box input{\n    width:58px;\n    padding:6px 4px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n  }\n  .conv-demo .layout{\n    display:grid;\n    grid-template-columns:minmax(220px,1fr) 190px minmax(220px,1fr) minmax(220px,1fr);\n    gap:14px;\n    align-items:start;\n  }\n  .conv-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:14px;\n    padding:10px;\n    background:#fafafa;\n  }\n  .conv-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .conv-demo canvas{\n    display:block;\n    width:100%;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:10px;\n  }\n  .conv-demo .stats{\n    display:grid;\n    gap:6px;\n    margin-top:8px;\n    font-size:13px;\n    color:#444;\n  }\n  .conv-demo .kernel-preview{\n    margin-top:10px;\n    display:grid;\n    grid-template-columns:repeat(3, 1fr);\n    gap:4px;\n  }\n  .conv-demo .kernel-preview div{\n    border:1px solid rgba(0,0,0,.1);\n    border-radius:8px;\n    padding:8px 4px;\n    text-align:center;\n    background:#fff;\n    font-size:13px;\n  }\n  .conv-demo .tiny{\n    font-size:12px;\n    color:#555;\n  }\n  .conv-demo .legend{\n    margin-top:8px;\n    font-size:12px;\n    color:#555;\n    line-height:1.35;\n  }\n  .conv-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .conv-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  @media (max-width: 920px){\n    .conv-demo .layout{\n      grid-template-columns:1fr;\n    }\n  }\n</style>\n\n<div class=\"conv-demo\" id=\"convDemoRoot\">\n  <div class=\"topbar\">\n    <div class=\"controls\">\n      <label><strong>Load image</strong></label>\n      <input type=\"file\" accept=\"image/*\" id=\"imgFileInput\">\n      <button id=\"sampleBtn\" type=\"button\">Use sample</button>\n    </div>\n\n    <div class=\"controls\">\n      <button id=\"playBtn\" type=\"button\">Play</button>\n      <button id=\"pauseBtn\" type=\"button\">Pause</button>\n      <button id=\"stepBtn\" type=\"button\">Step</button>\n      <button id=\"instantBtn\" type=\"button\">Instantaneous</button>\n      <button id=\"resetBtn\" type=\"button\">Reset</button>\n    </div>\n\n    <div class=\"controls\">\n      <label for=\"speedRange\"><strong>Speed</strong></label>\n      <input id=\"speedRange\" type=\"range\" min=\"0.01\" max=\"30\" step=\"0.01\" value=\"10\">\n      <span id=\"speedLabel\">10.00 ms</span>\n    </div>\n\n    <div class=\"controls\">\n      <label for=\"biasInput\"><strong>Bias</strong></label>\n      <input id=\"biasInput\" type=\"number\" step=\"any\" value=\"0\" style=\"width:80px\">\n      <button id=\"reluBtn\" type=\"button\">Apply bias + ReLU</button>\n    </div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Grayscale input image</h4>\n      <canvas id=\"inputCanvas\" width=\"420\" height=\"420\"></canvas>\n      <div class=\"stats\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Load an image or use the sample.</span></div>\n        <div><strong>Current window:</strong> <span id=\"windowText\">—</span></div>\n        <div><strong>Current sum:</strong> <span id=\"sumText\">—</span></div>\n      </div>\n      <div class=\"legend\">\n        The red square shows the current 3×3 receptive field. The uploaded image is converted to grayscale first, so the convolution runs on a single-channel input.\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>3×3 filter</h4>\n      <div class=\"kernel-box\" id=\"kernelBox\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"0\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"1\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"2\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"3\">\n        <input type=\"number\" step=\"any\" value=\"5\" data-k=\"4\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"5\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"6\">\n        <input type=\"number\" step=\"any\" value=\"-1\" data-k=\"7\">\n        <input type=\"number\" step=\"any\" value=\"0\" data-k=\"8\">\n      </div>\n      <div class=\"tiny\" style=\"margin-top:8px;\">\n        Edit any entry. Reset or Play recomputes using the current filter.\n      </div>\n\n      <div class=\"kernel-preview\" id=\"kernelPreview\"></div>\n\n      <div class=\"legend\">\n        Output shown on the right is <em>valid convolution</em>, so the result size is\n        <span id=\"sizeText\">input−2 by input−2</span>.\n      </div>\n\n      <div class=\"progress\"><div id=\"progressBar\"></div></div>\n      <div class=\"tiny\" style=\"margin-top:8px;\">\n        Progress: <span id=\"progressText\">0 / 0</span>\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Animated convolution output</h4>\n      <canvas id=\"outputCanvas\" width=\"420\" height=\"420\"></canvas>\n      <div class=\"stats\">\n        <div><strong>Output range:</strong> <span id=\"rangeText\">—</span></div>\n        <div><strong>Finished:</strong> <span id=\"doneText\">No</span></div>\n      </div>\n      <div class=\"legend\">\n        Darker/lighter output pixels reflect the accumulated filter response at each valid position as the scan progresses.\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Bias + ReLU output</h4>\n      <canvas id=\"reluCanvas\" width=\"420\" height=\"420\"></canvas>\n      <div class=\"stats\">\n        <div><strong>Output size:</strong> <span id=\"reluSizeText\">—</span></div>\n        <div><strong>ReLU range:</strong> <span id=\"reluRangeText\">—</span></div>\n      </div>\n      <div class=\"legend\">\n        Click <em>Apply bias + ReLU</em> to add the chosen bias to every convolution output and then apply <em>ReLU(x)=max(0,x)</em>.\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('convDemoRoot');\n  if(!root) return;\n\n  const inputCanvas = root.querySelector('#inputCanvas');\n  const outputCanvas = root.querySelector('#outputCanvas');\n  const reluCanvas = root.querySelector('#reluCanvas');\n  const inCtx = inputCanvas.getContext('2d');\n  const outCtx = outputCanvas.getContext('2d');\n  const reluCtx = reluCanvas.getContext('2d');\n\n  const imgFileInput = root.querySelector('#imgFileInput');\n  const sampleBtn = root.querySelector('#sampleBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const instantBtn = root.querySelector('#instantBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n  const reluBtn = root.querySelector('#reluBtn');\n  const biasInput = root.querySelector('#biasInput');\n  const speedRange = root.querySelector('#speedRange');\n  const speedLabel = root.querySelector('#speedLabel');\n\n  const statusText = root.querySelector('#statusText');\n  const windowText = root.querySelector('#windowText');\n  const sumText = root.querySelector('#sumText');\n  const rangeText = root.querySelector('#rangeText');\n  const doneText = root.querySelector('#doneText');\n  const reluSizeText = root.querySelector('#reluSizeText');\n  const reluRangeText = root.querySelector('#reluRangeText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const sizeText = root.querySelector('#sizeText');\n\n  const kernelInputs = Array.from(root.querySelectorAll('[data-k]'));\n  const kernelPreview = root.querySelector('#kernelPreview');\n\n  let gray = null;\n  let inW = 0, inH = 0;\n  let outW = 0, outH = 0;\n  let outVals = [];\n  let reluVals = [];\n  let reluW = 0, reluH = 0;\n  let stepIndex = 0;\n  let timer = null;\n  let finished = false;\n\n  function kernelValues(){\n    return kernelInputs.map(el => Number(el.value || 0));\n  }\n\n  function refreshKernelPreview(){\n    const vals = kernelValues();\n    kernelPreview.innerHTML = vals.map(v => '<div>' + String(v) + '</div>').join('');\n  }\n\n  function clamp(v, a, b){\n    return Math.max(a, Math.min(b, v));\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function defaultSample(){\n    const w = 32, h = 32;\n    const arr = new Uint8ClampedArray(w * h);\n    for(let y = 0; y < h; y++){\n      for(let x = 0; x < w; x++){\n        let v = 30 + x * 4 + y * 2;\n        if(x > 8 && x < 24 && y > 8 && y < 24) v += 80;\n        if((x - 16) * (x - 16) + (y - 16) * (y - 16) < 25) v = 220;\n        arr[y * w + x] = clamp(v, 0, 255);\n      }\n    }\n    setGrayImage(arr, w, h);\n  }\n\n  function setGrayImage(arr, w, h){\n    gray = arr;\n    inW = w;\n    inH = h;\n    outW = Math.max(0, inW - 2);\n    outH = Math.max(0, inH - 2);\n    outVals = new Array(outW * outH).fill(null);\n    reluVals = [];\n    reluW = 0; reluH = 0;\n    stepIndex = 0;\n    finished = false;\n    sizeText.textContent = outW + ' × ' + outH;\n    doneText.textContent = 'No';\n    setStatus('Ready.');\n    windowText.textContent = '—';\n    sumText.textContent = '—';\n    rangeText.textContent = '—';\n    reluSizeText.textContent = '—';\n    reluRangeText.textContent = '—';\n    drawInput();\n    drawOutput();\n    drawRelu();\n    updateProgress();\n  }\n\n  function loadImageFile(file){\n    const reader = new FileReader();\n    reader.onload = () => {\n      const img = new Image();\n      img.onload = () => {\n        const maxSide = 128; // higher-resolution uploaded image size\n        let w = img.width;\n        let h = img.height;\n        const scale = Math.min(1, maxSide / Math.max(w, h));\n        w = Math.max(3, Math.round(w * scale));\n        h = Math.max(3, Math.round(h * scale));\n\n        const c = document.createElement('canvas');\n        c.width = w;\n        c.height = h;\n        const ctx = c.getContext('2d');\n        ctx.drawImage(img, 0, 0, w, h);\n        const data = ctx.getImageData(0, 0, w, h).data;\n        const arr = new Uint8ClampedArray(w * h);\n\n        for(let i = 0; i < w * h; i++){\n          const r = data[4 * i + 0];\n          const g = data[4 * i + 1];\n          const b = data[4 * i + 2];\n          arr[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);\n        }\n        setGrayImage(arr, w, h);\n      };\n      img.src = reader.result;\n    };\n    reader.readAsDataURL(file);\n  }\n\n  function drawInput(currentX, currentY){\n    inCtx.clearRect(0, 0, inputCanvas.width, inputCanvas.height);\n    inCtx.fillStyle = '#fff';\n    inCtx.fillRect(0, 0, inputCanvas.width, inputCanvas.height);\n    if(!gray) return;\n\n    const img = inCtx.createImageData(inW, inH);\n    for(let i = 0; i < gray.length; i++){\n      const v = gray[i];\n      img.data[4*i+0] = v;\n      img.data[4*i+1] = v;\n      img.data[4*i+2] = v;\n      img.data[4*i+3] = 255;\n    }\n\n    const temp = document.createElement('canvas');\n    temp.width = inW;\n    temp.height = inH;\n    temp.getContext('2d').putImageData(img, 0, 0);\n\n    inCtx.imageSmoothingEnabled = false;\n    inCtx.drawImage(temp, 0, 0, inputCanvas.width, inputCanvas.height);\n\n    if(typeof currentX === 'number' && typeof currentY === 'number'){\n      const cellW = inputCanvas.width / inW;\n      const cellH = inputCanvas.height / inH;\n      inCtx.strokeStyle = '#e11d48';\n      inCtx.lineWidth = 2.5;\n      inCtx.strokeRect(currentX * cellW, currentY * cellH, 3 * cellW, 3 * cellH);\n    }\n  }\n\n  function currentOutputRange(){\n    const vals = outVals.filter(v => v !== null && Number.isFinite(v));\n    if(!vals.length) return null;\n    return {\n      min: Math.min(...vals),\n      max: Math.max(...vals)\n    };\n  }\n\n  function drawOutput(){\n    outCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);\n    outCtx.fillStyle = '#fff';\n    outCtx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);\n\n    if(outW <= 0 || outH <= 0) return;\n\n    const range = currentOutputRange();\n    if(!range){\n      rangeText.textContent = '—';\n      return;\n    }\n    rangeText.textContent = range.min.toFixed(2) + ' to ' + range.max.toFixed(2);\n\n    const temp = document.createElement('canvas');\n    temp.width = outW;\n    temp.height = outH;\n    const tctx = temp.getContext('2d');\n    const img = tctx.createImageData(outW, outH);\n    const span = Math.max(1e-9, range.max - range.min);\n\n    for(let i = 0; i < outVals.length; i++){\n      let v = outVals[i];\n      let g = 235;\n      if(v !== null && Number.isFinite(v)){\n        g = Math.round(255 * (v - range.min) / span);\n      }\n      img.data[4*i+0] = g;\n      img.data[4*i+1] = g;\n      img.data[4*i+2] = g;\n      img.data[4*i+3] = 255;\n    }\n    tctx.putImageData(img, 0, 0);\n\n    outCtx.imageSmoothingEnabled = false;\n    outCtx.drawImage(temp, 0, 0, outputCanvas.width, outputCanvas.height);\n  }\n\n\n  function drawRelu(){\n    reluCtx.clearRect(0, 0, reluCanvas.width, reluCanvas.height);\n    reluCtx.fillStyle = '#fff';\n    reluCtx.fillRect(0, 0, reluCanvas.width, reluCanvas.height);\n\n    if(reluW <= 0 || reluH <= 0 || !reluVals.length){\n      reluSizeText.textContent = '—';\n      reluRangeText.textContent = '—';\n      return;\n    }\n\n    const vals = reluVals.filter(v => Number.isFinite(v));\n    if(!vals.length){\n      reluSizeText.textContent = reluW + ' × ' + reluH;\n      reluRangeText.textContent = '—';\n      return;\n    }\n\n    const minV = Math.min(...vals);\n    const maxV = Math.max(...vals);\n    const span = Math.max(1e-9, maxV - minV);\n\n    const temp = document.createElement('canvas');\n    temp.width = reluW;\n    temp.height = reluH;\n    const tctx = temp.getContext('2d');\n    const img = tctx.createImageData(reluW, reluH);\n\n    for(let i = 0; i < reluVals.length; i++){\n      const v = reluVals[i];\n      const g = span < 1e-9 ? 128 : Math.round(255 * (v - minV) / span);\n      img.data[4*i+0] = g;\n      img.data[4*i+1] = g;\n      img.data[4*i+2] = g;\n      img.data[4*i+3] = 255;\n    }\n\n    tctx.putImageData(img, 0, 0);\n    reluCtx.imageSmoothingEnabled = false;\n    reluCtx.drawImage(temp, 0, 0, reluCanvas.width, reluCanvas.height);\n\n    reluSizeText.textContent = reluW + ' × ' + reluH;\n    reluRangeText.textContent = minV.toFixed(2) + ' to ' + maxV.toFixed(2);\n  }\n\n  function applyBiasRelu(){\n    if(!outVals.length || outVals.some(v => v === null)){\n      setStatus('Finish or step through convolution before applying bias + ReLU.');\n      return;\n    }\n    const b = Number(biasInput.value || 0);\n    reluW = outW;\n    reluH = outH;\n    reluVals = new Array(reluW * reluH);\n    for(let i = 0; i < outVals.length; i++){\n      reluVals[i] = Math.max(0, outVals[i] + b);\n    }\n    drawRelu();\n    setStatus('Applied bias ' + b + ' and ReLU.');\n  }\n\nfunction convAt(x, y){\n    const k = kernelValues();\n    let s = 0;\n    let t = 0;\n    for(let dy = 0; dy < 3; dy++){\n      for(let dx = 0; dx < 3; dx++){\n        s += gray[(y + dy) * inW + (x + dx)] * k[t++];\n      }\n    }\n    return s;\n  }\n\n  function updateProgress(){\n    const total = outW * outH;\n    progressText.textContent = stepIndex + ' / ' + total;\n    const pct = total ? (100 * stepIndex / total) : 0;\n    progressBar.style.width = pct + '%';\n  }\n\n  function doStep(){\n    if(!gray || outW <= 0 || outH <= 0){\n      setStatus('Load an image first.');\n      return;\n    }\n    if(stepIndex >= outW * outH){\n      finished = true;\n      doneText.textContent = 'Yes';\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const x = stepIndex % outW;\n    const y = Math.floor(stepIndex / outW);\n    const v = convAt(x, y);\n    outVals[stepIndex] = v;\n    stepIndex += 1;\n\n    drawInput(x, y);\n    drawOutput();\n    windowText.textContent = '(' + x + ', ' + y + ')';\n    sumText.textContent = v.toFixed(2);\n    updateProgress();\n\n    if(stepIndex >= outW * outH){\n      finished = true;\n      doneText.textContent = 'Yes';\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      doneText.textContent = 'No';\n      setStatus('Running...');\n    }\n  }\n\n  function finishInstantly(){\n    if(!gray || outW <= 0 || outH <= 0){\n      setStatus('Load an image first.');\n      return;\n    }\n    stopTimer();\n    const total = outW * outH;\n    for(let idx = stepIndex; idx < total; idx++){\n      const x = idx % outW;\n      const y = Math.floor(idx / outW);\n      outVals[idx] = convAt(x, y);\n    }\n    stepIndex = total;\n    finished = true;\n    drawInput();\n    drawOutput();\n    windowText.textContent = 'Complete';\n    sumText.textContent = 'All outputs computed';\n    updateProgress();\n    doneText.textContent = 'Yes';\n    setStatus('Finished instantly.');\n  }\n\n  function resetConvolution(){\n    stopTimer();\n    if(!gray) return;\n    outVals = new Array(outW * outH).fill(null);\n    reluVals = [];\n    reluW = 0; reluH = 0;\n    stepIndex = 0;\n    finished = false;\n    doneText.textContent = 'No';\n    windowText.textContent = '—';\n    sumText.textContent = '—';\n    rangeText.textContent = '—';\n    reluSizeText.textContent = '—';\n    reluRangeText.textContent = '—';\n    drawInput();\n    drawOutput();\n    drawRelu();\n    updateProgress();\n    setStatus('Reset.');\n  }\n\n  function play(){\n    if(!gray){\n      setStatus('Load an image first.');\n      return;\n    }\n    stopTimer();\n    const ms = Math.max(0.01, Number(speedRange.value || 10));\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n\n  speedRange.addEventListener('input', () => {\n    speedLabel.textContent = Number(speedRange.value).toFixed(2) + ' ms';\n    if(timer) play();\n  });\n\n  imgFileInput.addEventListener('change', (e) => {\n    const file = e.target.files && e.target.files[0];\n    if(file) loadImageFile(file);\n  });\n\n  sampleBtn.addEventListener('click', defaultSample);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', () => { stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', () => { stopTimer(); doStep(); });\n  instantBtn.addEventListener('click', finishInstantly);\n  resetBtn.addEventListener('click', resetConvolution);\n  reluBtn.addEventListener('click', applyBiasRelu);\n  kernelInputs.forEach(inp => inp.addEventListener('input', () => {\n    refreshKernelPreview();\n    if(gray) resetConvolution();\n  }));\n\n  refreshKernelPreview();\n  drawRelu();\n  defaultSample();\n})();\n<\/script>\n","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Derive the formula with a 1D example first if needed."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Core inductive biases of convolution","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Local connectivity: each output depends only on a small spatial neighborhood.\nUL:Parameter sharing: the same filter is reused at every spatial location.\nUL:Translation equivariance: if the input shifts, the feature map shifts in the same way (ignoring borders/padding details).\nUL: Each convolution layer computes local spatial patterns in previous layer","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}},{"mode":"panel","title":"","content":"If we have a 64x64 image and I use a 3x3 filter, what is the size of the resulting convolution?","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Output size, stride, and padding","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Padding controls whether border information is retained and whether spatial size is preserved. \nUL:Stride controls how far the filter jumps between positions (lower resolution).\nUL:For input size \\(N\\times N\\), filter size \\(K\\times K\\), stride \\(S\\), and padding \\(P\\), the output side length is: \\(~~~~~~\\left\\lfloor \\frac{N+2P-K}{S} \\right\\rfloor + 1\\)","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Derive the formula with a 1D example first if needed."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Interactive demo: single-channel convolution","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .conv-step-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .conv-step-demo *{box-sizing:border-box}\n  .conv-step-demo .toolbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:end;\n    margin-bottom:12px;\n  }\n  .conv-step-demo .control{\n    display:flex;\n    flex-direction:column;\n    gap:4px;\n    min-width:84px;\n  }\n  .conv-step-demo label{\n    font-size:12px;\n    color:#444;\n    font-weight:600;\n  }\n  .conv-step-demo input,\n  .conv-step-demo button,\n  .conv-step-demo select{\n    font:inherit;\n  }\n  .conv-step-demo input[type=\"number\"]{\n    width:84px;\n    padding:6px 8px;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n    background:#fff;\n  }\n  .conv-step-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:8px 10px;\n    cursor:pointer;\n  }\n  .conv-step-demo button:hover{background:#f6f6f6}\n  .conv-step-demo .layout{\n    display:grid;\n    grid-template-columns:1.4fr 1fr 1.15fr;\n    gap:14px;\n    align-items:start;\n  }\n  .conv-step-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    background:#fafafa;\n    border-radius:14px;\n    padding:10px;\n  }\n  .conv-step-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .conv-step-demo .matrix-grid{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .conv-step-demo .matrix-cell{\n    width:32px;\n    height:32px;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:6px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    font-size:12px;\n    background:#fff;\n  }\n  .conv-step-demo .matrix-cell.pad{\n    background:#f2f2f2;\n    color:#666;\n  }\n  .conv-step-demo .matrix-cell.active{\n    background:#ffe4e6;\n    border-color:#fb7185;\n    font-weight:700;\n  }\n  .conv-step-demo .matrix-cell.center{\n    outline:2px solid #ef4444;\n    outline-offset:-2px;\n  }\n  .conv-step-demo .matrix-cell.done{\n    background:#dbeafe;\n    border-color:#60a5fa;\n  }\n  .conv-step-demo .matrix-edit{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .conv-step-demo .matrix-edit input{\n    width:32px;\n    height:32px;\n    padding:2px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.16);\n    border-radius:6px;\n    font-size:12px;\n  }\n  .conv-step-demo .mini-matrix{\n    display:grid;\n    gap:2px;\n    justify-content:start;\n    margin-bottom:8px;\n  }\n  .conv-step-demo .mini-cell{\n    width:38px;\n    height:38px;\n    border:1px solid rgba(0,0,0,.14);\n    border-radius:8px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    background:#fff;\n    font-size:13px;\n  }\n  .conv-step-demo .mini-cell.hit{\n    background:#fee2e2;\n    border-color:#f87171;\n    font-weight:700;\n  }\n  .conv-step-demo .formula{\n    font-size:13px;\n    line-height:1.45;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.10);\n    border-radius:10px;\n    padding:10px;\n    min-height:90px;\n  }\n  .conv-step-demo .stats{\n    display:grid;\n    gap:6px;\n    font-size:13px;\n    color:#444;\n    margin-top:8px;\n  }\n  .conv-step-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .conv-step-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  .conv-step-demo .small{\n    font-size:12px;\n    color:#555;\n  }\n  .conv-step-demo .matrix-caption{\n    font-size:12px;\n    color:#555;\n    margin:6px 0 8px;\n  }\n  .conv-step-demo .output-grid-wrap{\n    overflow:auto;\n  }\n  @media (max-width: 980px){\n    .conv-step-demo .layout{\n      grid-template-columns:1fr;\n    }\n  }\n</style>\n\n<div class=\"conv-step-demo\" id=\"convStepDemoRoot\">\n  <div class=\"toolbar\">\n    <div class=\"control\">\n      <label>Input size</label>\n      <input id=\"matSizeInput\" type=\"number\" min=\"1\" max=\"15\" step=\"1\" value=\"9\">\n    </div>\n    <div class=\"control\">\n      <label>Filter size k</label>\n      <input id=\"kernelSizeInput\" type=\"number\" min=\"1\" max=\"7\" step=\"1\" value=\"3\">\n    </div>\n    <div class=\"control\">\n      <label>Stride</label>\n      <input id=\"strideInput\" type=\"number\" min=\"1\" max=\"5\" step=\"1\" value=\"1\">\n    </div>\n    <div class=\"control\">\n      <label>Padding</label>\n      <input id=\"paddingInput\" type=\"number\" min=\"0\" max=\"5\" step=\"1\" value=\"0\">\n    </div>\n    <div class=\"control\">\n      <label>Speed (ms)</label>\n      <input id=\"speedInput\" type=\"number\" min=\"10\" max=\"2000\" step=\"10\" value=\"350\">\n    </div>\n    <div class=\"control\"><button id=\"rebuildBtn\" type=\"button\">Rebuild</button></div>\n    <div class=\"control\"><button id=\"playBtn\" type=\"button\">Play</button></div>\n    <div class=\"control\"><button id=\"pauseBtn\" type=\"button\">Pause</button></div>\n    <div class=\"control\"><button id=\"stepBtn\" type=\"button\">Step</button></div>\n    <div class=\"control\"><button id=\"instantBtn\" type=\"button\">Instant</button></div>\n    <div class=\"control\"><button id=\"resetBtn\" type=\"button\">Reset</button></div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Editable input matrix</h4>\n      <div class=\"matrix-caption\">Edit the entries directly. The padded matrix below is what convolution actually scans.</div>\n      <div id=\"inputEditGrid\" class=\"matrix-edit\"></div>\n      <div class=\"matrix-caption\" id=\"paddedCaption\">Padded matrix</div>\n      <div id=\"paddedMatrixView\" class=\"matrix-grid\"></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Filter and current computation</h4>\n      <div class=\"matrix-caption\">Edit the filter entries directly.</div>\n      <div id=\"kernelEditGrid\" class=\"matrix-edit\"></div>\n      <div class=\"matrix-caption\">Current input patch</div>\n      <div id=\"patchView\" class=\"mini-matrix\"></div>\n      <div class=\"matrix-caption\">Current elementwise products</div>\n      <div id=\"productView\" class=\"mini-matrix\"></div>\n      <div class=\"formula\" id=\"formulaBox\">Click Play or Step to begin.</div>\n      <div class=\"stats\">\n        <div><strong>Status:</strong> <span id=\"statusText\">Ready.</span></div>\n        <div><strong>Current output position:</strong> <span id=\"positionText\">—</span></div>\n        <div><strong>Output size:</strong> <span id=\"outputSizeText\">—</span></div>\n      </div>\n      <div class=\"progress\"><div id=\"progressBar\"></div></div>\n      <div class=\"small\">Progress: <span id=\"progressText\">0 / 0</span></div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Output matrix</h4>\n      <div class=\"matrix-caption\">The output gets filled in step by step as the filter moves.</div>\n      <div class=\"output-grid-wrap\">\n        <div id=\"outputMatrixView\" class=\"matrix-grid\"></div>\n      </div>\n      <div class=\"stats\">\n        <div><strong>Formula:</strong> <span id=\"sizeFormulaText\">—</span></div>\n        <div><strong>Last computed value:</strong> <span id=\"lastValueText\">—</span></div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('convStepDemoRoot');\n  if(!root) return;\n\n  const matSizeInput = root.querySelector('#matSizeInput');\n  const kernelSizeInput = root.querySelector('#kernelSizeInput');\n  const strideInput = root.querySelector('#strideInput');\n  const paddingInput = root.querySelector('#paddingInput');\n  const speedInput = root.querySelector('#speedInput');\n\n  const rebuildBtn = root.querySelector('#rebuildBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const instantBtn = root.querySelector('#instantBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n\n  const inputEditGrid = root.querySelector('#inputEditGrid');\n  const kernelEditGrid = root.querySelector('#kernelEditGrid');\n  const paddedMatrixView = root.querySelector('#paddedMatrixView');\n  const patchView = root.querySelector('#patchView');\n  const productView = root.querySelector('#productView');\n  const outputMatrixView = root.querySelector('#outputMatrixView');\n\n  const formulaBox = root.querySelector('#formulaBox');\n  const statusText = root.querySelector('#statusText');\n  const positionText = root.querySelector('#positionText');\n  const outputSizeText = root.querySelector('#outputSizeText');\n  const sizeFormulaText = root.querySelector('#sizeFormulaText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const lastValueText = root.querySelector('#lastValueText');\n  const paddedCaption = root.querySelector('#paddedCaption');\n\n  let inputMat = [];\n  let kernelMat = [];\n  let paddedMat = [];\n  let outputMat = [];\n  let outRows = 0, outCols = 0;\n  let stepIndex = 0;\n  let timer = null;\n\n  function clampInt(v, lo, hi){\n    return Math.max(lo, Math.min(hi, Math.floor(Number(v) || 0)));\n  }\n\n  function setStatus(msg){\n    statusText.textContent = msg;\n  }\n\n  function makeDefaultInput(n){\n    const arr = Array.from({length:n}, ()=>Array(n).fill(0));\n    const start = Math.max(1, Math.floor(n * 0.22));\n    const end = Math.min(n - 2, Math.ceil(n * 0.78));\n    for(let r = start; r <= end; r++){\n      for(let c = start; c <= end; c++){\n        if(r === start || r === end || c === start || c === end){\n          arr[r][c] = 1;\n        }\n      }\n    }\n    return arr;\n  }\n\n  function makeDefaultKernel(k){\n    const arr = [];\n    const center = Math.floor(k / 2);\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        if(k === 3){\n          const preset = [[1,0,-1],[1,0,-1],[1,0,-1]];\n          row.push(preset[r][c]);\n        } else {\n          row.push(r === center && c === center ? 1 : 0);\n        }\n      }\n      arr.push(row);\n    }\n    return arr;\n  }\n\n  function renderEditableMatrix(container, mat, onChange){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const inp = document.createElement('input');\n        inp.type = 'number';\n        inp.step = 'any';\n        inp.value = mat[r][c];\n        inp.addEventListener('input', () => {\n          mat[r][c] = Number(inp.value || 0);\n          resetComputation(false);\n          renderAllViews();\n          if(r === 0 && c === 0){/* noop to keep linter calm */}\n          if(typeof onChange === 'function') onChange();\n        });\n        container.appendChild(inp);\n      }\n    }\n  }\n\n  function buildPadded(){\n    const p = clampInt(paddingInput.value, 0, 10);\n    const n = inputMat.length;\n    const m = n + 2 * p;\n    paddedMat = Array.from({length:m}, ()=>Array(m).fill(0));\n    for(let r = 0; r < n; r++){\n      for(let c = 0; c < n; c++){\n        paddedMat[r + p][c + p] = Number(inputMat[r][c] || 0);\n      }\n    }\n    paddedCaption.textContent = `Padded matrix (${m}×${m})`;\n  }\n\n  function computeOutputShape(){\n    const n = inputMat.length;\n    const k = kernelMat.length;\n    const s = clampInt(strideInput.value, 1, 20);\n    const p = clampInt(paddingInput.value, 0, 10);\n    outRows = Math.floor((n + 2*p - k) / s) + 1;\n    outCols = Math.floor((n + 2*p - k) / s) + 1;\n    if(!Number.isFinite(outRows) || outRows < 0) outRows = 0;\n    if(!Number.isFinite(outCols) || outCols < 0) outCols = 0;\n    outputMat = Array.from({length:outRows}, ()=>Array(outCols).fill(null));\n    outputSizeText.textContent = `${outRows} × ${outCols}`;\n    sizeFormulaText.textContent = `⌊(N + 2P - K)/S⌋ + 1 = ⌊(${n} + 2·${p} - ${k})/${s}⌋ + 1 = ${outRows}`;\n  }\n\n  function renderPadded(activeTop, activeLeft){\n    const rows = paddedMat.length;\n    const cols = rows ? paddedMat[0].length : 0;\n    paddedMatrixView.innerHTML = '';\n    paddedMatrixView.style.gridTemplateColumns = `repeat(${cols}, 32px)`;\n    const p = clampInt(paddingInput.value, 0, 10);\n    const origN = inputMat.length;\n\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        const isPad = r < p || c < p || r >= p + origN || c >= p + origN;\n        if(isPad) div.classList.add('pad');\n        if(typeof activeTop === 'number' && typeof activeLeft === 'number'){\n          const k = kernelMat.length;\n          if(r >= activeTop && r < activeTop + k && c >= activeLeft && c < activeLeft + k){\n            div.classList.add('active');\n          }\n        }\n        div.textContent = paddedMat[r][c];\n        paddedMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function renderMiniMatrix(container, mat, classFn){\n    const rows = mat.length;\n    const cols = rows ? mat[0].length : 0;\n    container.innerHTML = '';\n    container.style.gridTemplateColumns = `repeat(${cols}, 38px)`;\n    for(let r = 0; r < rows; r++){\n      for(let c = 0; c < cols; c++){\n        const div = document.createElement('div');\n        div.className = 'mini-cell';\n        if(classFn) {\n          const extra = classFn(r, c, mat[r][c]);\n          if(extra) div.classList.add(extra);\n        }\n        div.textContent = Number.isFinite(mat[r][c]) ? round2(mat[r][c]) : mat[r][c];\n        container.appendChild(div);\n      }\n    }\n  }\n\n  function renderOutput(currentRow, currentCol){\n    outputMatrixView.innerHTML = '';\n    outputMatrixView.style.gridTemplateColumns = `repeat(${Math.max(1, outCols)}, 32px)`;\n    for(let r = 0; r < outRows; r++){\n      for(let c = 0; c < outCols; c++){\n        const div = document.createElement('div');\n        div.className = 'matrix-cell';\n        if(outputMat[r][c] !== null) div.classList.add('done');\n        if(r === currentRow && c === currentCol) div.classList.add('center');\n        div.textContent = outputMat[r][c] === null ? '·' : round2(outputMat[r][c]);\n        outputMatrixView.appendChild(div);\n      }\n    }\n  }\n\n  function round2(x){\n    const n = Number(x);\n    if(!Number.isFinite(n)) return x;\n    return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(2);\n  }\n\n  function getPatch(top, left){\n    const k = kernelMat.length;\n    const patch = [];\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        row.push(paddedMat[top + r][left + c]);\n      }\n      patch.push(row);\n    }\n    return patch;\n  }\n\n  function multiplyPatch(patch, kernel){\n    const k = kernel.length;\n    const prod = [];\n    let sum = 0;\n    const terms = [];\n    for(let r = 0; r < k; r++){\n      const row = [];\n      for(let c = 0; c < k; c++){\n        const v = patch[r][c] * kernel[r][c];\n        row.push(v);\n        sum += v;\n        terms.push(`${round2(patch[r][c])}×${round2(kernel[r][c])}`);\n      }\n      prod.push(row);\n    }\n    return {prod, sum, terms};\n  }\n\n  function currentOutputCoord(index){\n    if(outRows === 0 || outCols === 0) return null;\n    const r = Math.floor(index / outCols);\n    const c = index % outCols;\n    return {r, c};\n  }\n\n  function updateProgress(){\n    const total = outRows * outCols;\n    progressText.textContent = `${Math.min(stepIndex, total)} / ${total}`;\n    progressBar.style.width = total ? `${100 * Math.min(stepIndex, total) / total}%` : '0%';\n  }\n\n  function doStep(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n      return;\n    }\n\n    const coord = currentOutputCoord(stepIndex);\n    const s = clampInt(strideInput.value, 1, 20);\n    const top = coord.r * s;\n    const left = coord.c * s;\n\n    const patch = getPatch(top, left);\n    const result = multiplyPatch(patch, kernelMat);\n    outputMat[coord.r][coord.c] = result.sum;\n\n    renderPadded(top, left);\n    renderMiniMatrix(patchView, patch, ()=> 'hit');\n    renderMiniMatrix(productView, result.prod, ()=> 'hit');\n    renderOutput(coord.r, coord.c);\n\n    formulaBox.innerHTML = `\n      <div><strong>Output(${coord.r}, ${coord.c})</strong> uses the patch whose top-left corner is at padded input position (${top}, ${left}).</div>\n      <div style=\"margin-top:6px;\"><strong>Computation:</strong> ${result.terms.join(' + ')}</div>\n      <div style=\"margin-top:6px;\"><strong>Sum:</strong> ${round2(result.sum)}</div>\n    `;\n    positionText.textContent = `(${coord.r}, ${coord.c})`;\n    lastValueText.textContent = round2(result.sum);\n\n    stepIndex += 1;\n    updateProgress();\n\n    if(stepIndex >= total){\n      setStatus('Finished.');\n      stopTimer();\n    } else {\n      setStatus('Running...');\n    }\n  }\n\n  function finishInstant(){\n    const total = outRows * outCols;\n    if(total <= 0){\n      setStatus('Output size is empty. Check k, stride, and padding.');\n      return;\n    }\n    stopTimer();\n    while(stepIndex < total){\n      doStep();\n    }\n    setStatus('Finished instantly.');\n  }\n\n  function stopTimer(){\n    if(timer){\n      clearInterval(timer);\n      timer = null;\n    }\n  }\n\n  function play(){\n    const ms = Math.max(10, Number(speedInput.value || 350));\n    stopTimer();\n    timer = setInterval(doStep, ms);\n    setStatus('Running...');\n  }\n\n  function resetComputation(render = true){\n    stopTimer();\n    buildPadded();\n    computeOutputShape();\n    stepIndex = 0;\n    formulaBox.textContent = 'Click Play or Step to begin.';\n    positionText.textContent = '—';\n    lastValueText.textContent = '—';\n    updateProgress();\n    if(render) renderAllViews();\n    setStatus('Ready.');\n  }\n\n  function renderAllViews(){\n    renderPadded();\n    renderMiniMatrix(patchView, kernelMat.map(row=>row.map(()=> '·')));\n    renderMiniMatrix(productView, kernelMat.map(row=>row.map(()=> '·')));\n    renderOutput(-1, -1);\n  }\n\n  function rebuildStructures(){\n    const n = clampInt(matSizeInput.value, 1, 15);\n    const k = clampInt(kernelSizeInput.value, 1, 7);\n    matSizeInput.value = n;\n    kernelSizeInput.value = k;\n\n    inputMat = makeDefaultInput(n);\n    kernelMat = makeDefaultKernel(k);\n\n    renderEditableMatrix(inputEditGrid, inputMat, () => {});\n    renderEditableMatrix(kernelEditGrid, kernelMat, () => {});\n    resetComputation(true);\n  }\n\n  rebuildBtn.addEventListener('click', rebuildStructures);\n  playBtn.addEventListener('click', play);\n  pauseBtn.addEventListener('click', ()=>{ stopTimer(); setStatus('Paused.'); });\n  stepBtn.addEventListener('click', ()=>{ stopTimer(); doStep(); });\n  instantBtn.addEventListener('click', finishInstant);\n  resetBtn.addEventListener('click', ()=>resetComputation(true));\n\n  strideInput.addEventListener('input', ()=>resetComputation(true));\n  paddingInput.addEventListener('input', ()=>resetComputation(true));\n  speedInput.addEventListener('input', ()=>{ if(timer) play(); });\n  matSizeInput.addEventListener('change', rebuildStructures);\n  kernelSizeInput.addEventListener('change', rebuildStructures);\n\n  rebuildStructures();\n})();\n<\/script>\n","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Use this to explain the mechanics of the sliding window, output size, and the sum at each location."},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"From one channel to many channels","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Real images have multiple input channels, e.g. RGB.\nUL:A filter now has shape \\(k\\times k\\times C_{\\text{in}}\\).\nUL:For each output channel, convolve each input channel with its own slice of the filter, sum across channels, add bias, then apply ReLU.\nUL:Thus channels are mixed only after spatial dot products are computed on each channel.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}},{"mode":"panel","title":"","content":"EQ: \\(z_o(i,j)=\\sum_{c=1}^{C_{\\text{in}}} (K_{o,c} * X_c)(i,j) + b_o\\)\nEQ: \\(a_o(i,j)=\\max(0,z_o(i,j))\\)","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Interactive demo: multi-channel convolution + bias + ReLU","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<style>\n  .mcnn-demo{\n    font-family: Inter, Arial, sans-serif;\n    color:#111;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:18px;\n    padding:14px;\n  }\n  .mcnn-demo *{box-sizing:border-box}\n  .mcnn-demo .toolbar{\n    display:flex;\n    flex-wrap:wrap;\n    gap:10px 14px;\n    align-items:end;\n    margin-bottom:12px;\n  }\n  .mcnn-demo .control{\n    display:flex;\n    flex-direction:column;\n    gap:4px;\n    min-width:84px;\n  }\n  .mcnn-demo label{\n    font-size:12px;\n    color:#444;\n    font-weight:600;\n  }\n  .mcnn-demo input, .mcnn-demo button{\n    font:inherit;\n  }\n  .mcnn-demo input[type=\"number\"]{\n    width:88px;\n    padding:6px 8px;\n    border:1px solid rgba(0,0,0,.18);\n    border-radius:8px;\n    background:#fff;\n  }\n  .mcnn-demo button{\n    border:1px solid rgba(0,0,0,.16);\n    background:#fff;\n    border-radius:10px;\n    padding:8px 10px;\n    cursor:pointer;\n  }\n  .mcnn-demo button:hover{background:#f6f6f6}\n  .mcnn-demo .layout{\n    display:grid;\n    grid-template-columns:1.1fr 1.25fr 1fr;\n    gap:14px;\n    align-items:start;\n  }\n  .mcnn-demo .panel{\n    border:1px solid rgba(0,0,0,.12);\n    background:#fafafa;\n    border-radius:14px;\n    padding:10px;\n  }\n  .mcnn-demo .panel h4{\n    margin:0 0 8px 0;\n    font-size:15px;\n  }\n  .mcnn-demo .tabs{\n    display:flex;\n    flex-wrap:wrap;\n    gap:6px;\n    margin-bottom:8px;\n  }\n  .mcnn-demo .tab{\n    border:1px solid rgba(0,0,0,.14);\n    background:#fff;\n    border-radius:999px;\n    padding:4px 10px;\n    font-size:12px;\n    cursor:pointer;\n  }\n  .mcnn-demo .tab.active{\n    background:#dbeafe;\n    border-color:#60a5fa;\n    font-weight:700;\n  }\n  .mcnn-demo .matrix-edit,\n  .mcnn-demo .matrix-grid{\n    display:grid;\n    gap:2px;\n    align-content:start;\n    justify-content:start;\n  }\n  .mcnn-demo .matrix-edit input{\n    width:30px;\n    height:30px;\n    padding:2px;\n    text-align:center;\n    border:1px solid rgba(0,0,0,.16);\n    border-radius:6px;\n    font-size:12px;\n  }\n  .mcnn-demo .matrix-cell{\n    width:30px;\n    height:30px;\n    border:1px solid rgba(0,0,0,.12);\n    border-radius:6px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    font-size:11px;\n    background:#fff;\n  }\n  .mcnn-demo .matrix-cell.pad{\n    background:#f2f2f2;\n    color:#666;\n  }\n  .mcnn-demo .matrix-cell.active{\n    background:#fee2e2;\n    border-color:#f87171;\n    font-weight:700;\n  }\n  .mcnn-demo .matrix-cell.done{\n    background:#dbeafe;\n    border-color:#60a5fa;\n  }\n  .mcnn-demo .matrix-cell.center{\n    outline:2px solid #ef4444;\n    outline-offset:-2px;\n  }\n  .mcnn-demo .matrix-caption{\n    font-size:12px;\n    color:#555;\n    margin:6px 0 8px;\n  }\n  .mcnn-demo .small{\n    font-size:12px;\n    color:#555;\n  }\n  .mcnn-demo .stats{\n    display:grid;\n    gap:6px;\n    font-size:13px;\n    color:#444;\n    margin-top:8px;\n  }\n  .mcnn-demo .progress{\n    height:10px;\n    border-radius:999px;\n    background:#ececec;\n    overflow:hidden;\n    margin-top:8px;\n  }\n  .mcnn-demo .progress > div{\n    height:100%;\n    width:0%;\n    background:#4b89ff;\n    transition:width .12s linear;\n  }\n  .mcnn-demo .section{\n    border-top:1px solid rgba(0,0,0,.08);\n    padding-top:8px;\n    margin-top:8px;\n  }\n  .mcnn-demo .channel-block{\n    margin-bottom:10px;\n  }\n  .mcnn-demo .channel-title{\n    font-size:12px;\n    font-weight:700;\n    color:#333;\n    margin:0 0 4px;\n  }\n  .mcnn-demo .patch-grid{\n    display:grid;\n    gap:10px;\n  }\n  .mcnn-demo .mini-grid{\n    display:grid;\n    gap:2px;\n    justify-content:start;\n    margin:4px 0;\n  }\n  .mcnn-demo .mini-cell{\n    width:34px;\n    height:34px;\n    border:1px solid rgba(0,0,0,.14);\n    border-radius:8px;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    background:#fff;\n    font-size:12px;\n  }\n  .mcnn-demo .mini-cell.best{\n    background:#dcfce7;\n    border-color:#22c55e;\n    font-weight:700;\n  }\n  .mcnn-demo .formula{\n    font-size:13px;\n    line-height:1.45;\n    background:#fff;\n    border:1px solid rgba(0,0,0,.10);\n    border-radius:10px;\n    padding:10px;\n    min-height:110px;\n    white-space:normal;\n  }\n  .mcnn-demo .output-stack{\n    display:grid;\n    gap:10px;\n  }\n  .mcnn-demo .bias-row{\n    display:flex;\n    flex-wrap:wrap;\n    gap:8px;\n    align-items:center;\n  }\n  .mcnn-demo .bias-row .control{\n    min-width:auto;\n  }\n  .mcnn-demo .bias-row input{\n    width:70px;\n  }\n  @media (max-width: 1100px){\n    .mcnn-demo .layout{grid-template-columns:1fr}\n  }\n</style>\n\n<div class=\"mcnn-demo\" id=\"mcnnDemoRoot\">\n  <div class=\"toolbar\">\n    <div class=\"control\">\n      <label>Input size N</label>\n      <input id=\"matSizeInput\" type=\"number\" min=\"1\" max=\"15\" step=\"1\" value=\"9\">\n    </div>\n    <div class=\"control\">\n      <label>Filter size k</label>\n      <input id=\"kernelSizeInput\" type=\"number\" min=\"1\" max=\"7\" step=\"1\" value=\"3\">\n    </div>\n    <div class=\"control\">\n      <label>Stride</label>\n      <input id=\"strideInput\" type=\"number\" min=\"1\" max=\"5\" step=\"1\" value=\"1\">\n    </div>\n    <div class=\"control\">\n      <label>Padding</label>\n      <input id=\"paddingInput\" type=\"number\" min=\"0\" max=\"5\" step=\"1\" value=\"0\">\n    </div>\n    <div class=\"control\">\n      <label>Input channels</label>\n      <input id=\"inChannelsInput\" type=\"number\" min=\"1\" max=\"4\" step=\"1\" value=\"3\">\n    </div>\n    <div class=\"control\">\n      <label>Output channels</label>\n      <input id=\"outChannelsInput\" type=\"number\" min=\"1\" max=\"4\" step=\"1\" value=\"2\">\n    </div>\n    <div class=\"control\">\n      <label>Speed (ms)</label>\n      <input id=\"speedInput\" type=\"number\" min=\"10\" max=\"2000\" step=\"10\" value=\"350\">\n    </div>\n    <div class=\"control\"><button id=\"rebuildBtn\" type=\"button\">Rebuild</button></div>\n    <div class=\"control\"><button id=\"playBtn\" type=\"button\">Play</button></div>\n    <div class=\"control\"><button id=\"pauseBtn\" type=\"button\">Pause</button></div>\n    <div class=\"control\"><button id=\"stepBtn\" type=\"button\">Step</button></div>\n    <div class=\"control\"><button id=\"instantBtn\" type=\"button\">Instant</button></div>\n    <div class=\"control\"><button id=\"resetBtn\" type=\"button\">Reset</button></div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"panel\">\n      <h4>Input channels</h4>\n      <div class=\"tabs\" id=\"inputTabs\"></div>\n      <div class=\"matrix-caption\">Edit the selected input channel directly. Defaults are visually distinct: hollow square, vertical bar, and horizontal bar.</div>\n      <div id=\"inputEditGrid\" class=\"matrix-edit\"></div>\n\n      <div class=\"section\">\n        <div class=\"matrix-caption\">Current highlighted padded inputs for all channels</div>\n        <div id=\"inputViewsStack\"></div>\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Filters, bias, and current computation</h4>\n      <div class=\"tabs\" id=\"outputTabs\"></div>\n      <div class=\"matrix-caption\">Edit filters feeding into the selected output channel.</div>\n      <div class=\"bias-row\" id=\"biasRow\"></div>\n      <div id=\"filterEditorStack\"></div>\n\n      <div class=\"section\">\n        <div class=\"matrix-caption\">Current patches and per-channel contributions</div>\n        <div id=\"patchStack\" class=\"patch-grid\"></div>\n        <div class=\"formula\" id=\"formulaBox\">Click Play or Step to begin.</div>\n        <div class=\"stats\">\n          <div><strong>Status:</strong> <span id=\"statusText\">Ready.</span></div>\n          <div><strong>Current output channel:</strong> <span id=\"outChannelText\">—</span></div>\n          <div><strong>Current output position:</strong> <span id=\"positionText\">—</span></div>\n          <div><strong>Output size:</strong> <span id=\"outputSizeText\">—</span></div>\n        </div>\n        <div class=\"progress\"><div id=\"progressBar\"></div></div>\n        <div class=\"small\">Progress: <span id=\"progressText\">0 / 0</span></div>\n      </div>\n    </div>\n\n    <div class=\"panel\">\n      <h4>Output channels after bias + ReLU</h4>\n      <div class=\"matrix-caption\">Each output entry is computed by summing over all input-channel convolutions, then adding bias and applying ReLU.</div>\n      <div id=\"outputStack\" class=\"output-stack\"></div>\n      <div class=\"stats\">\n        <div><strong>Formula:</strong> <span id=\"sizeFormulaText\">—</span></div>\n        <div><strong>Last pre-activation \\(z\\):</strong> <span id=\"lastZText\">—</span></div>\n        <div><strong>Last activation \\(a=\\max(0,z)\\):</strong> <span id=\"lastAText\">—</span></div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n(function(){\n  const root = document.getElementById('mcnnDemoRoot');\n  if(!root) return;\n\n  const matSizeInput = root.querySelector('#matSizeInput');\n  const kernelSizeInput = root.querySelector('#kernelSizeInput');\n  const strideInput = root.querySelector('#strideInput');\n  const paddingInput = root.querySelector('#paddingInput');\n  const inChannelsInput = root.querySelector('#inChannelsInput');\n  const outChannelsInput = root.querySelector('#outChannelsInput');\n  const speedInput = root.querySelector('#speedInput');\n\n  const rebuildBtn = root.querySelector('#rebuildBtn');\n  const playBtn = root.querySelector('#playBtn');\n  const pauseBtn = root.querySelector('#pauseBtn');\n  const stepBtn = root.querySelector('#stepBtn');\n  const instantBtn = root.querySelector('#instantBtn');\n  const resetBtn = root.querySelector('#resetBtn');\n\n  const inputTabs = root.querySelector('#inputTabs');\n  const outputTabs = root.querySelector('#outputTabs');\n  const inputEditGrid = root.querySelector('#inputEditGrid');\n  const inputViewsStack = root.querySelector('#inputViewsStack');\n  const filterEditorStack = root.querySelector('#filterEditorStack');\n  const biasRow = root.querySelector('#biasRow');\n  const patchStack = root.querySelector('#patchStack');\n  const outputStack = root.querySelector('#outputStack');\n\n  const formulaBox = root.querySelector('#formulaBox');\n  const statusText = root.querySelector('#statusText');\n  const outChannelText = root.querySelector('#outChannelText');\n  const positionText = root.querySelector('#positionText');\n  const outputSizeText = root.querySelector('#outputSizeText');\n  const progressText = root.querySelector('#progressText');\n  const progressBar = root.querySelector('#progressBar');\n  const sizeFormulaText = root.querySelector('#sizeFormulaText');\n  const lastZText = root.querySelector('#lastZText');\n  const lastAText = root.querySelector('#lastAText');\n\n  let inputMats = [];   // [cin][r][c]\n  let filters = [];     // [cout][cin][kr][kc]\n  let biases = [];      // [cout]\n  let outputs = [];     // [cout][or][oc], stores post-ReLU outputs\n  let outRows = 0, outCols = 0;\n  let stepIndex = 0;\n  let timer = null;\n  let selectedInputChannel = 0;\n  let selectedOutputChannel = 0;\n\n  function clampInt(v, lo, hi){\n    return Math.max(lo, Math.min(hi, Math.floor(Number(v) || 0)));\n  }\n  function round2(x){\n    const n = Number(x);\n    if(!Number.isFinite(n)) return x;\n    return Math.abs(n - Math.round(n)) < 1e-9 ? String(Math.round(n)) : n.toFixed(2);\n  }\n  function setStatus(msg){ statusText.textContent = msg; }\n\n  function makeSquarePattern(n, shift){\n    const arr = Array.from({length:n}, ()=>Array(n).fill(0));\n    const start = Math.max(1, Math.floor(n * 0.22) + shift);\n    const end = Math.min(n - 2, Math.ceil(n * 0.78) + shift);\n    for(let r = Math.max(0, start); r <= Math.min(n - 1, end); r++){\n      for(let c = Math.max(0, start); c <= Math.min(n - 1, end); c++){\n        if(r === start || r === end || c === start || c === end) arr[r][c] = 1;\n      }\n    }\n    return arr;\n  }\n\n  function makeDefaultInput(n, cin){\n    const mats = [];\n    const a = Math.max(1, Math.floor(n * 0.22));\n    const b = Math.min(n - 2, Math.ceil(n * 0.78));\n    const mid = Math.floor((a + b) / 2);\n\n    for(let ch = 0; ch < cin; ch++){\n      const arr = Array.from({length:n}, ()=>Array(n).fill(0));\n\n      if(ch % 3 === 0){\n        // Hollow square\n        for(let r = a; r <= b; r++){\n          for(let c = a; c <= b; c++){\n            if(r === a || r === b || c === a || c === b) arr[r][c] = 1;\n          }\n        }\n      } else if(ch % 3 === 1){\n        // Vertical bar\n        for(let r = a; r <= b; r++){\n          arr[r][mid] = 1;\n          if(mid + 1 < n) arr[r][mid + 1] = 1;\n        }\n      } else {\n        // Horizontal bar\n        for(let c = a; c <= b; c++){\n          arr[mid][c] = 1;\n          if(mid + 1 < n) arr[mid + 1][c] = 1;\n        }\n      }\n\n      mats.push(arr);\n    }\n    return mats;\n  }\n\n  function makeDefaultFilters(k, cin, cout){\n    const outs = [];\n    const vertical = [[1,0,-1],[1,0,-1],[1,0,-1]];\n    const horizontal = [[1,1,1],[0,0,0],[-1,-1,-1]];\n    const identity = [[0,0,0],[0,1,0],[0,0,0]];\n\n    for(let oc = 0; oc < cout; oc++){\n      const perIn = [];\n      for(let ic = 0; ic < cin; ic++){\n        const mat = Array.from({length:k}, ()=>Array(k).fill(0));\n        if(k === 3){\n          const bank = oc % 2 === 0 ? [vertical, identity, horizontal] : [horizontal, identity, vertical];\n          const chosen = bank[ic % 3] || identity;\n          for(let r = 0; r < 3; r++){\n            for(let c = 0; c < 3; c++){\n              mat[r][c] = chosen[r][c];\n            }\n          }\n        } else {\n          const center = Math.floor(k / 2);\n          mat[center][center] = 1;\n        }\n        perIn.push(mat);\n      }\n      outs.push(perIn);\n    }\n    return outs;\n  }\n\n  function rebuildStructures(){\n    const n = clampInt(matSizeInput.value, 1, 15);\n    const k = clampInt(kernelSizeInput.value, 1, 7);\n    const cin = clampInt(inChannelsInput.value, 1, 4);\n    const cout = clampInt(outChannelsInput.value, 1, 4);\n    matSizeInput.value = n;\n    kernelSizeInput.value = k;\n    inChannelsInput.value = cin;\n    outChannelsInput.value = cout;\n\n    inputMats = makeDefaultInput(n, cin);\n    filters = makeDefaultFilters(k, cin, cout);\n    biases = Array.from({length:cout}, (_, oc)=> oc % 2 === 0 ? 0 : 0.5);\n    selectedInputChannel = 0;\n    selectedOutputChannel = 0;\n    resetComputation(true);\n  }\n\n  function paddedInput(ch){\n    const mat = inputMats[ch];\n    const p = clampInt(paddingInput.value, 0, 10);\n    const n = mat.length;\n    const m = n + 2 * p;\n    const out = Array.from({length:m}, ()=>Array(m).fill(0));\n    for(let r = 0; r < n; r++){\n      for(let c = 0; c < n; c++){\n        out[r + p][c + p] = Number(mat[r][c] || 0);\n      }\n    }\n    return out;\n  }\n\n  function computeOutputShape(){\n    const n = inputMats.length ? inputMats[0].length : 0;\n    const k = kernelSizeInput.value|0;\n    const s = clampInt(strideInput.value, 1, 20);\n    const p = clampInt(paddingInput.value, 0, 10);\n    outRows =
