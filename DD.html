olor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Self-Attention: queries, keys, values","kicker":"Cornell Bowers CIS","lede":"","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Input and projections","content":"\\begin{itemize}\n\\item Input: sequence of vectors X\n\\item Create Queries Q, Keys K, and Values V\n\\item Learn linear projections W_q, W_k, W_v\n\\end{itemize}\n\\begin{equation}\nq_i &= W_q x_i\\\\\nk_i &= W_k x_i\\\\\nv_i &= W_v x_i\n\\end{equation}\n","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"QKV projection visual","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:350px;border:4px solid #b31b1b;padding:14px;font-family:Arial;'><svg viewBox='0 0 600 300' width='100%' height='300'><defs><marker id='a' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><path d='M0,0 L8,4 L0,8 Z' fill='#111'/></marker></defs><g text-anchor='middle' font-size='17'><rect x='235' y='220' width='130' height='45' fill='#fff' stroke='#111' stroke-dasharray='6 5'/><text x='300' y='248'>Input X</text><polygon points='100,130 150,70 200,130' fill='#e2cfe8' stroke='#8b6b99'/><text x='150' y='114'>Wq</text><polygon points='250,130 300,70 350,130' fill='#fff3cd' stroke='#b99b2f'/><text x='300' y='114'>Wk</text><polygon points='400,130 450,70 500,130' fill='#cfe8c8' stroke='#4c9f50'/><text x='450' y='114'>Wv</text><rect x='95' y='25' width='110' height='32' fill='#f4e8f8' stroke='#111' stroke-dasharray='6 5'/><text x='150' y='47'>Queries Q</text><rect x='245' y='25' width='110' height='32' fill='#fff1b8' stroke='#111' stroke-dasharray='6 5'/><text x='300' y='47'>Keys K</text><rect x='395' y='25' width='110' height='32' fill='#e4f4df' stroke='#111' stroke-dasharray='6 5'/><text x='450' y='47'>Values V</text><path d='M300 220 L150 130' stroke='#111' marker-end='url(#a)'/><path d='M300 220 V130' stroke='#111' marker-end='url(#a)'/><path d='M300 220 L450 130' stroke='#111' marker-end='url(#a)'/><path d='M150 70 V57 M300 70 V57 M450 70 V57' stroke='#111' marker-end='url(#a)'/></g></svg></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"QKV setup","notesBody":"Explain the roles: query asks, key is compared against, value is the information to aggregate."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Self-Attention: scores → weights → output","kicker":"Cornell Bowers CIS","lede":"Scaled dot-product attention compares queries with keys, normalizes scores, then combines values.","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"custom","title":"Interactive self-attention demo","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:430px;border:4px solid #b31b1b;padding:16px;font-family:Arial;'><style>.tok{display:inline-block;padding:8px 12px;margin:4px;border:1px solid #111;border-radius:8px;background:#fff}.heat td{width:36px;height:30px;text-align:center;border:1px solid #ddd;font-size:12px}.btn{padding:8px 12px;border:1px solid #111;border-radius:8px;background:#f7f7f7;cursor:pointer}</style><div style='font-weight:bold;color:#b31b1b;margin-bottom:8px;'>Click a query token</div><div id='tokens'><span class='tok' data-i='0'>I</span><span class='tok' data-i='1'>like</span><span class='tok' data-i='2'>black</span><span class='tok' data-i='3'>coffee</span></div><div style='display:flex;gap:26px;align-items:center;margin-top:22px;'><table class='heat' id='mat'></table><svg id='attnsvg' width='430' height='190'></svg></div><div id='caption' style='font-size:18px;margin-top:12px;color:#333;'></div><script>(function(){var W=[[.15,.50,.15,.20],[.35,.20,.20,.25],[.05,.15,.30,.50],[.10,.20,.45,.25]],words=['I','like','black','coffee'],sel=1;function color(v){var r=255,g=Math.round(245-120*v),b=Math.round(245-180*v);return 'rgb('+r+','+g+','+b+')'}function draw(){document.querySelectorAll('.tok').forEach(function(t,i){t.style.background=i===sel?'#fff1b8':'#fff'});var m=document.getElementById('mat');m.innerHTML='';for(var i=0;i<4;i++){var tr=document.createElement('tr');for(var j=0;j<4;j++){var td=document.createElement('td');td.style.background=color(W[i][j]);td.textContent=W[i][j].toFixed(2);if(i===sel)td.style.outline='3px solid #b31b1b';tr.appendChild(td)}m.appendChild(tr)}var s=document.getElementById('attnsvg');s.innerHTML='';for(var j=0;j<4;j++){s.innerHTML+='<text x=\"330\" y=\"'+(35+j*40)+'\" font-size=\"18\">'+words[j]+'</text><line x1=\"120\" y1=\"90\" x2=\"315\" y2=\"'+(30+j*40)+'\" stroke=\"#b31b1b\" stroke-width=\"'+(1+10*W[sel][j])+'\" opacity=\".75\"/>'}s.innerHTML+='<text x=\"20\" y=\"96\" font-size=\"22\" font-weight=\"bold\">query: '+words[sel]+'</text>';document.getElementById('caption').textContent='Output vector for '+words[sel]+' = weighted sum of value vectors using this row of attention weights.'}document.querySelectorAll('.tok').forEach(function(t){t.onclick=function(){sel=+t.dataset.i;draw()}});draw();})();<\/script></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Self-attention demo","notesBody":"Use the demo to show that each output vector corresponds to one row of the attention matrix. Each row is a distribution over value vectors."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Discuss: self-attention shapes","kicker":"Cornell Bowers CIS","lede":"","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Questions","content":"\\begin{itemize}\n\\item Q, K, V are all n × d matrices\n\\item If input has shape b × n × d, what is the shape of QK^T?\n\\item What does this matrix represent?\n\\item What is the shape of the final output?\n\\item What does the final output represent?\n\\end{itemize}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"Formula and shape visual","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:330px;border:4px solid #b31b1b;padding:18px;font-family:Arial;'><svg viewBox='0 0 620 260' width='100%' height='260'><g font-size='22' text-anchor='middle'><text x='310' y='45' font-size='30'>Attention(Q,K,V) = softmax(QKᵀ / √dₖ)V</text><rect x='45' y='100' width='115' height='80' fill='#f4e8f8' stroke='#111'/><text x='102' y='145'>Q</text><text x='102' y='205'>b×n×d</text><rect x='205' y='100' width='115' height='80' fill='#fff1b8' stroke='#111'/><text x='262' y='145'>Kᵀ</text><text x='262' y='205'>b×d×n</text><text x='182' y='150'>×</text><rect x='365' y='100' width='115' height='80' fill='#f6dada' stroke='#111'/><text x='422' y='135'>scores</text><text x='422' y='160'>n×n</text><text x='342' y='150'>=</text><rect x='515' y='100' width='70' height='80' fill='#e4f4df' stroke='#111'/><text x='550' y='145'>V</text><text x='550' y='205'>b×n×d</text><text x='310' y='238' fill='#b31b1b'>final output: b × n × d contextual vectors</text></g></svg></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Shape check","notesBody":"Expected answers: QK^T has shape b × n × n; it represents token-token attention scores. After softmax and multiplication by V, the output has shape b × n × d."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Multi-Head Attention","kicker":"Cornell Bowers CIS","lede":"","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Why multiple heads?","content":"\\begin{itemize}\n\\item We may want to attend to different things at the same time\n\\item Content-based: “dog, Clifford”\n\\item Description-based: “big red dog”\n\\item Reference-based: “Clifford” refers to the dog\n\\item What is useful depends on the task\n\\end{itemize}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"Multi-head visual","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:350px;border:4px solid #b31b1b;padding:14px;font-family:Arial;'><svg viewBox='0 0 620 300' width='100%' height='300'><defs><marker id='a' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><path d='M0,0 L8,4 L0,8 Z' fill='#111'/></marker></defs><g font-size='18'><text x='30' y='45' fill='#b31b1b'>Content-based</text><text x='210' y='45'>This is my big red dog, Clifford.</text><text x='30' y='90' fill='#2f6fed'>Description-based</text><text x='210' y='90'>This is my big red dog, Clifford.</text><text x='30' y='135' fill='#4c9f50'>Reference-based</text><text x='210' y='135'>This is my big red dog, Clifford.</text><g transform='translate(80,185)'><rect width='50' height='75' fill='#fff1b8' stroke='#111'/><rect x='60' width='50' height='75' fill='#ffd24d' stroke='#111'/><rect x='120' width='50' height='75' fill='#cc9900' stroke='#111'/><rect x='180' width='50' height='75' fill='#8a6a00' stroke='#111'/><text x='25' y='100'>head₁</text><text x='85' y='100'>head₂</text><text x='145' y='100'>head₃</text><text x='205' y='100'>head₄</text></g><path d='M330 220 H410' stroke='#111' marker-end='url(#a)'/><rect x='420' y='198' width='140' height='44' fill='#eee' stroke='#111'/><text x='490' y='226' text-anchor='middle'>Wₒ projection</text></g></svg></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Multi-head attention","notesBody":"Connect this slide to the original Clifford example. Each head can learn a different relation or subspace."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Transformer block: attention, FFN, layer norm","kicker":"Cornell Bowers CIS","lede":"","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Inside one block","content":"\\begin{itemize}\n\\item Multi-head attention\n\\item Add & norm\n\\item Point-wise feed-forward network\n\\item Add & norm\n\\item Same MLP applied to every token vector\n\\end{itemize}\n\\begin{card}{FFN}FFN(x)=max(0,xW_1+b_1)W_2+b_2\\end{card}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"Transformer block visual","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:350px;border:4px solid #b31b1b;padding:14px;font-family:Arial;'><svg viewBox='0 0 600 300' width='100%' height='300'><defs><marker id='a' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><path d='M0,0 L8,4 L0,8 Z' fill='#111'/></marker></defs><g text-anchor='middle' font-size='17'><rect x='190' y='220' width='220' height='40' fill='#fff' stroke='#111'/><text x='300' y='246'>input token vectors</text><rect x='190' y='160' width='220' height='42' fill='#ffe5cc' stroke='#111'/><text x='300' y='187'>Multi-head attention</text><rect x='190' y='110' width='220' height='32' fill='#e7efff' stroke='#111'/><text x='300' y='132'>Add & Norm</text><rect x='190' y='55' width='220' height='38' fill='#d7ecff' stroke='#111'/><text x='300' y='80'>Feed Forward</text><rect x='190' y='12' width='220' height='28' fill='#e7efff' stroke='#111'/><text x='300' y='32'>Add & Norm</text><path d='M300 220 V202 M300 160 V142 M300 110 V93 M300 55 V40' stroke='#111' marker-end='url(#a)'/><path d='M410 181 C480 181 480 126 410 126' fill='none' stroke='#777' stroke-width='2' marker-end='url(#a)'/><path d='M410 74 C480 74 480 26 410 26' fill='none' stroke='#777' stroke-width='2' marker-end='url(#a)'/><text x='500' y='150' fill='#777'>residual</text><text x='130' y='132' fill='#b31b1b'>LayerNorm</text></g></svg></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Block anatomy","notesBody":"Use this slide to introduce add-and-norm and FFN as the components around attention. Layer norm normalizes each word vector independently."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Self-Attention vs. Masked Self-Attention","kicker":"Cornell Bowers CIS","lede":"Encoder self-attention can look everywhere; decoder masked self-attention cannot look ahead.","leftBlocks":[{"mode":"custom","title":"Interactive masked attention demo","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:430px;border:4px solid #b31b1b;padding:16px;font-family:Arial;'><style>.mcell{width:34px;height:34px;border:1px solid #ccc;display:inline-block;margin:1px}.allowed{background:#111}.future{background:#eee}.row{height:37px}.ctrl{padding:8px 12px;border:1px solid #111;border-radius:8px;background:#fff;cursor:pointer;margin-right:8px}</style><div style='margin-bottom:14px;'><button class='ctrl' id='prev'>previous</button><button class='ctrl' id='next'>next</button><span id='step' style='font-weight:bold;color:#b31b1b'></span></div><div style='display:flex;gap:70px;align-items:flex-start;'><div><div style='font-size:22px;margin-bottom:10px;'>Full self-attention</div><div id='full'></div></div><div><div style='font-size:22px;margin-bottom:10px;'>Masked self-attention</div><div id='mask'></div></div><svg id='tri' width='330' height='230'></svg></div><script>(function(){var n=5,t=0;function grid(id,masked){var el=document.getElementById(id);el.innerHTML='';for(var i=0;i<n;i++){var r=document.createElement('div');r.className='row';for(var j=0;j<n;j++){var c=document.createElement('span');c.className='mcell '+((!masked||j<=i&&i<=t)?'allowed':'future');if(masked&&i>t)c.style.opacity=.25;r.appendChild(c)}el.appendChild(r)}}function draw(){grid('full',false);grid('mask',true);document.getElementById('step').textContent='decoder token t = '+(t+1)+' attends only to positions ≤ t';var s=document.getElementById('tri');s.innerHTML='';for(var i=0;i<=t;i++){for(var j=0;j<=i;j++){s.innerHTML+='<line x1=\"'+(45+j*45)+'\" y1=\"190\" x2=\"'+(45+i*45)+'\" y2=\"55\" stroke=\"#b31b1b\" stroke-width=\"2\"/>'}}for(var k=0;k<n;k++){s.innerHTML+='<rect x=\"'+(30+k*45)+'\" y=\"30\" width=\"30\" height=\"45\" fill=\"#fff\" stroke=\"#111\"/><rect x=\"'+(30+k*45)+'\" y=\"170\" width=\"30\" height=\"45\" fill=\"#fff\" stroke=\"#111\"/>'}}document.getElementById('next').onclick=function(){t=Math.min(n-1,t+1);draw()};document.getElementById('prev').onclick=function(){t=Math.max(0,t-1);draw()};draw();})();<\/script></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Masked attention","notesBody":"Advance the demo to recreate the original build slides. Masking prevents the decoder from using future target tokens during autoregressive generation.","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Decoder block and cross-attention","kicker":"Cornell Bowers CIS","lede":"","leftBlocks":[{"mode":"panel","title":"Decoder attention types","content":"\\begin{itemize}\n\\item Masked self-attention: target prefix attends only to earlier target tokens\n\\item Cross-attention: decoder queries attend to encoder keys and values\n\\item Allows target-side generation to use source-side context\n\\item Used in encoder-decoder transformers for sequence-to-sequence tasks\n\\end{itemize}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"Cross-attention Q/K/V visual","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:350px;border:4px solid #b31b1b;padding:14px;font-family:Arial;'><svg viewBox='0 0 620 300' width='100%' height='300'><defs><marker id='a' markerWidth='8' markerHeight='8' refX='7' refY='4' orient='auto'><path d='M0,0 L8,4 L0,8 Z' fill='#111'/></marker></defs><g text-anchor='middle' font-size='17'><polygon points='55,90 235,90 255,190 35,190' fill='#cfe8c8' stroke='#111'/><tex ingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Positional Encoding: binary idea","kicker":"Cornell Bowers CIS","lede":"","leftBlocks":[{"mode":"panel","title":"Naive high-dimensional positions","content":"\\begin{itemize}\n\\item Neural networks are not good with single-dimensional values\n\\item Higher dimensions are better suited for internal hyper-plane classifiers\n\\item Naive idea: use binary encoding\n\\item Problem: abrupt changes between nearby positions\n\\end{itemize}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"Binary position table","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:340px;border:4px solid #b31b1b;padding:16px;font-family:Arial;'><svg viewBox='0 0 620 290' width='100%' height='290'><g text-anchor='middle' font-size='18'><text x='330' y='32' font-weight='bold'>Token position</text><g stroke='#111' fill='#fff'><rect x='70' y='60' width='480' height='160'/><line x1='150' y1='60' x2='150' y2='220'/><line x1='70' y1='100' x2='550' y2='100'/><line x1='70' y1='140' x2='550' y2='140'/><line x1='70' y1='180' x2='550' y2='180'/></g><text x='110' y='86' font-weight='bold'>integer</text><text x='110' y='126' font-weight='bold'>bit 2</text><text x='110' y='166' font-weight='bold'>bit 1</text><text x='110' y='206' font-weight='bold'>bit 0</text><script xmlns='http://www.w3.org/2000/svg'><\/script><g id='nums'><text x='180' y='86'>0</text><text x='230' y='86'>1</text><text x='280' y='86'>2</text><text x='330' y='86'>3</text><text x='380' y='86'>4</text><text x='430' y='86'>5</text><text x='480' y='86'>6</text><text x='530' y='86'>7</text><text x='180' y='126'>0</text><text x='230' y='126'>0</text><text x='280' y='126'>0</text><text x='330' y='126'>0</text><text x='380' y='126'>1</text><text x='430' y='126'>1</text><text x='480' y='126'>1</text><text x='530' y='126'>1</text><text x='180' y='166'>0</text><text x='230' y='166'>0</text><text x='280' y='166'>1</text><text x='330' y='166'>1</text><text x='380' y='166'>0</text><text x='430' y='166'>0</text><text x='480' y='166'>1</text><text x='530' y='166'>1</text><text x='180' y='206'>0</text><text x='230' y='206'>1</text><text x='280' y='206'>0</text><text x='330' y='206'>1</text><text x='380' y='206'>0</text><text x='430' y='206'>1</text><text x='480' y='206'>0</text><text x='530' y='206'>1</text></g><path d='M360 55 V225' stroke='#b31b1b' stroke-width='4'/><text x='310' y='260' fill='#b31b1b'>3 → 4 flips many bits</text></g></svg></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Binary positions","notesBody":"Use the jump from 3 to 4 to show why binary codes can be discontinuous for nearby positions.","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Positional Encoding: sine / cosine embeddings","kicker":"Cornell Bowers CIS","lede":"Better idea: Fourier features give smooth positional structure across dimensions.","leftBlocks":[{"mode":"custom","title":"Interactive sinusoidal position encoding","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:430px;border:4px solid #b31b1b;padding:14px;font-family:Arial;'><style>.pctrl{margin:4px}.peCell{display:inline-block;width:8px;height:8px;margin:0}.peRow{height:8px}.formula{font-size:18px;color:#333}</style><div class='formula'>PE(pos,2i)=sin(pos / 10000^(2i/d_model)) &nbsp;&nbsp; PE(pos,2i+1)=cos(pos / 10000^(2i/d_model))</div><div style='display:flex;gap:28px;margin-top:16px;align-items:flex-start;'><svg id='waves' width='460' height='250'></svg><div><div style='font-weight:bold;margin-bottom:8px;'>Example heatmap</div><div id='heat'></div></div></div><script>(function(){var d=32,n=32;function pe(pos,i){var div=Math.pow(10000,2*Math.floor(i/2)/d);return i%2===0?Math.sin(pos/div):Math.cos(pos/div)}var s=document.getElementById('waves'),w=440,h=230;for(var k=0;k<6;k++){var path='';for(var x=0;x<w;x++){var pos=x/w*32,y=h/2-80*pe(pos,k*2);path+=(x?'L':'M')+x+' '+y}var col=['#b31b1b','#2f6fed','#4c9f50','#d6a447','#777','#9c6aa5'][k];s.innerHTML+='<path d=\"'+path+'\" fill=\"none\" stroke=\"'+col+'\" stroke-width=\"2\" opacity=\".85\"/>'}s.innerHTML+='<line x1=\"0\" y1=\"115\" x2=\"440\" y2=\"115\" stroke=\"#ddd\"/><text x=\"10\" y=\"20\" font-size=\"18\">different frequencies</text>';var heat=document.getElementById('heat');for(var r=0;r<n;r++){var row=document.createElement('div');row.className='peRow';for(var c=0;c<d;c++){var v=pe(r,c),red=Math.round(240*(v>0?v:0)),blue=Math.round(240*(-v>0?-v:0));var cell=document.createElement('span');cell.className='peCell';cell.style.background='rgb('+red+',60,'+blue+')';row.appendChild(cell)}heat.appendChild(row)}})();<\/script></div></body></html>","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Sinusoidal encoding","notesBody":"The original slides move from binary to sinusoidal/Fourier features and then to a heatmap. This demo combines those visuals.","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Summary: attention cost","kicker":"Cornell Bowers CIS","lede":"","titleStyle":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Discussion","content":"\\begin{itemize}\n\\item How does the transformer scale with sequence length?\n\\item What operation becomes expensive?\n\\item Attention forms an n × n matrix of pairwise token interactions\n\\item Parallelism improves throughput, but memory/compute grow with sequence length\n\\end{itemize}","style":{"fontScale":1,"fontSize":"","fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"custom","title":"n by n attention matrix","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div style='height:330px;border:4px solid #b31b1b;padding:16px;font-family:Arial;'><svg viewBox='0 0 520 260' width='100%' height='260'><g text-anchor='middle' font-size='18'><text x='260' y='35' font-size='24'>Attention matrix</text><rect x='120' y='65' width='180' height='180' fill='#fff' stroke='#111' stroke-width='2'/><g stroke='#ddd'><line x1='165' y1='65' x     const fragments=collectAnimationFragments(target, stepMode);

    } else {

    }

function advanceSlideAnimation(slideEl){
  if(!slideEl || !Array.isArray(slideEl.__animSteps)) return false;

  }else if(step.phase==='out'){
    const frags=collectAnimationFragments(step.target, step.target.dataset.stepMode || 'all');
    frags.forEach(f=>setAnimHidden(f, true));
  }

}
function activeSlideHasPendingAnimations(){
  const slide=slideEls[active];
  return !!(slide && Array.isArray(slide.__animSteps) && slide.__animIndex < slide.__animSteps.length);
}

function slidePoint(evt, svg){const pt=svg.createSVGPoint();pt.x=evt.clientX;pt.y=evt.clientY;const m=svg.getScreenCTM();return m?pt.matrixTransform(m.inverse()):{x:0,y:0};}
function beginShape(evt){if(!drawingMode || drawingSlideIndex!==active) return;const svg=getDrawSurface(active); if(!svg) return;const tool=drawTool.value;if(tool==='erase'){const hit=evt.target.closest('[data-draw-shape]');if(hit && svg.contains(hit)){ hit.remove(); saveSurface(active); }return;}evt.preventDefault();const p=slidePoint(evt, svg);drawingState.tool=tool; drawingState.drawing=true; drawingState.start=p; drawingState.el=null;let el=null;if(tool==='pen'){el=document.createElementNS('http://www.w3.org/2000/svg','polyline');el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);el.setAttribute('stroke-linecap','round');el.setAttribute('stroke-linejoin','round');el.setAttribute('points',p.x+','+p.y);}else if(tool==='line'){el=document.createElementNS('http://www.w3.org/2000/svg','line');el.setAttribute('x1',p.x);el.setAttribute('y1',p.y);el.setAttribute('x2',p.x);el.setAttribute('y2',p.y);el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);el.setAttribute('stroke-linecap','round');}else if(tool==='rect'){el=document.createElementNS('http://www.w3.org/2000/svg','rect');el.setAttribute('x',p.x);el.setAttribute('y',p.y);el.setAttribute('width',1);el.setAttribute('height',1);el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);}else if(tool==='ellipse'){el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');el.setAttribute('cx',p.x);el.setAttribute('cy',p.y);el.setAttribute('rx',1);el.setAttribute('ry',1);el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);}if(!el) return;el.setAttribute('data-draw-shape','1');svg.appendChild(el);drawingState.el=el;}
function updateShape(evt){if(!drawingState.drawing || drawingSlideIndex!==active) return;const svg=getDrawSurface(active); if(!svg || !drawingState.el) return;const p=slidePoint(evt, svg);const el=drawingState.el;if(drawingState.tool==='pen'){el.setAttribute('points',(el.getAttribute('points')||'')+' '+p.x+','+p.y);}else if(drawingState.tool==='line'){el.setAttribute('x2',p.x);el.setAttribute('y2',p.y);}else if(drawingState.tool==='rect'){const x=Math.min(drawingState.start.x,p.x),y=Math.min(drawingState.start.y,p.y),w=Math.abs(p.x-drawingState.start.x),h=Math.abs(p.y-drawingState.start.y);el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('width',w);el.setAttribute('height',h);}else if(drawingState.tool==='ellipse'){el.setAttribute('cx',(drawingState.start.x+p.x)/2);el.setAttribute('cy',(drawingState.start.y+p.y)/2);el.setAttribute('rx',Math.abs(p.x-drawingState.start.x)/2);el.setAttribute('ry',Math.abs(p.y-drawingState.start.y)/2);}saveSurface(active);}
function endShape(){if(!drawingState.drawing) return; drawingState.drawing=false; drawingState.start=null; drawingState.el=null; saveSurface(active);}
function enterDrawingMode(slideIndex){if(!liveDrawEnabled) return; drawingMode=true; drawingSlideIndex=slideIndex; if(drawSessionToolbar) drawSessionToolbar.hidden=false; render(); hideLaserPointer();}
function exitDrawingMode(){drawingMode=false; drawingSlideIndex=-1; drawingState.drawing=false; drawingState.start=null; drawingState.el=null; if(drawSessionToolbar) drawSessionToolbar.hidden=true; render();}

function slideHasCustomHtml(slide){
  const s = normalizeSlide(slide);
  const all = [].concat(s.leftBlocks || [], s.rightBlocks || []);
  return all.some(block => String((block && block.mode) || 'panel') === 'custom');
}
function getEligiblePdfSlideIndices(){
  return (deckPayload.slides || []).map((slide, idx) => slideHasCustomHtml(slide) ? null : idx).filter(idx => idx !== null);
}
function getPdfLayout(slidesPerPage){
  const n = Number(slidesPerPage) || 1;
  if(n === 2) return { rows: 1, cols: 2 };
  if(n === 4) return { rows: 2, cols: 2 };
  if(n === 6) return { rows: 2, cols: 3 };
  return { rows: 1, cols: 1 };
}
function setPdfStatus(msg){ if(pdfStatus) pdfStatus.textContent = msg; }
function openPdfModal(){ if(pdfModal){ setPdfStatus('Ready.'); pdfModal.hidden = false; } }
function closePdfModal(){ if(pdfModal){ pdfModal.hidden = true; setPdfStatus('Ready.'); } }
async function ensurePdfLibraries(){
  const start = Date.now();
  while(Date.now() - start < 8000){
    if(window.html2canvas && window.jspdf && window.jspdf.jsPDF) return true;
    await new Promise(r => setTimeout(r, 100));
  }
  return false;
}
async function generatePdfFromSlides(slidesPerPage){
  if(drawingMode) exitDrawingMode();
  closePdfModal();
  const ok = await ensurePdfLibraries();
  if(!ok){ alert('PDF libraries did not load. Check your internet connection and try again.'); return; }

  const eligible = getEligiblePdfSlideIndices();
  if(!eligible.length){ alert('No slides are eligible for PDF export. Slides with custom HTML blocks are skipped.'); return; }

  renderLiveDrawAnnotations();
  if(window.MathJax && typeof window.MathJax.typesetPromise === 'function'){
    try{
      if(typeof window.MathJax.typesetClear === 'function') window.MathJax.typesetClear(slideEls);
      await window.MathJax.typesetPromise(slideEls);
    }catch(err){ console.error(err); }
  }

  const stage = document.createElement('div');
  stage.style.position = 'fixed';
  stage.style.left = '-20000px';
  stage.style.top = '0';
  stage.style.width = '1600px';
  stage.style.pointerEvents = 'none';
  stage.style.zIndex = '-1';
  document.body.appendChild(stage);

  const canvases = [];
  try{
    for(let i = 0; i < eligible.length; i += 1){
      const slideIndex = eligible[i];
      setPdfStatus('Rendering slide ' + (i + 1) + ' of ' + eligible.length + '…');
      const clone = slideEls[slideIndex].cloneNode(true);
      clone.classList.add('active');
      clone.style.display = 'block';
      clone.style.position = 'relative';
      clone.style.inset = 'auto';
      clone.style.width = '1600px';
      clone.style.height = '900px';
      clone.style.minHeight = '900px';
      clone.style.overflow = 'hidden';
      clone.querySelectorAll('.slide-actions,.slide-map,.deck-toolbar,.laser-pointer,.draw-session-toolbar,.pdf-modal').forEach(el => el.remove());
      clone.querySelectorAll('.slide-draw-surface').forEach(el => el.classList.remove('active'));
      stage.innerHTML = '';
      stage.appendChild(clone);
      if(window.MathJax && typeof window.MathJax.typesetPromise === 'function'){
        try{
          if(typeof window.MathJax.typesetClear === 'function') window.MathJax.typesetClear([clone]);
          await window.MathJax.typesetPromise([clone]);
        }catch(err){ console.error(err); }
      }
      const canvas = await window.html2canvas(clone, {backgroundColor:'#ffffff', scale:2, useCORS:true});
      canvases.push(canvas);
    }
  } finally {
    stage.remove();
  }

  setPdfStatus('Building PDF…');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter', compress:true });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 18;
  const gap = 12;
  const layout = getPdfLayout(slidesPerPage);
  const cellW = (pageW - 2 * margin - (layout.cols - 1) * gap) / layout.cols;
  const cellH = (pageH - 2 * margin - (layout.rows - 1) * gap) / layout.rows;

  canvases.forEach((canvas, idx) => {
    if(idx > 0 && idx % (Number(slidesPerPage) || 1) === 0) doc.addPage('letter', 'landscape');
    const slot = idx % (Number(slidesPerPage) || 1);
    const row = Math.floor(slot / layout.cols);
    const col = slot % layout.cols;
    let drawW = cellW;
    let drawH = drawW * 9 / 16;
    if(drawH > cellH){
      drawH = cellH;
      drawW = drawH * 16 / 9;
    }
    const x = margin + col * (cellW + gap) + (cellW - drawW) / 2;
    const y = margin + row * (cellH + gap) + (cellH - drawH) / 2;
    doc.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', x, y, drawW, drawH, undefined, 'FAST');
  });

  const filename = ((deckPayload.deckTitle || 'presentation').replace(/[^w-]+/g,'_') || 'presentation') + '_' + String(slidesPerPage || 1) + 'up.pdf';
  doc.save(filename);
}
async function downloadAnnotatedSlides(){
  const payload=JSON.parse(document.getElementById('deck-source').textContent);
  payload.presentationOptions=payload.presentationOptions||{};
  payload.presentationOptions.exportControls=Object.assign({}, exportControls, { exportAnnotated:true });
  payload.presentationOptions.enableLiveDraw=!!(payload.presentationOptions.exportControls.draw||payload.presentationOptions.exportControls.exportAnnotated);
  payload.presentationOptions.seedAnnotations=JSON.parse(JSON.stringify(liveDrawAnnotations||{}));

  const escapedJson=JSON.stringify(payload).replace(/<\/script>/gi,'<\/script>');

  const clone=document.documentElement.cloneNode(true);
  const sourceNode=clone.querySelector('#deck-source');
  if(sourceNode) sourceNode.textContent=escapedJson;

  const liveToolbar=clone.querySelector('#drawSessionToolbar');
  if(liveToolbar) liveToolbar.hidden=true;

  clone.querySelectorAll('.slide-draw-surface').forEach((svg, idx)=>{
    const key=String(idx);
    const markup=(liveDrawAnnotations && (liveDrawAnnotations[key] ?? liveDrawAnnotations[idx])) || '';
    svg.innerHTML=String(markup || '');
    svg.classList.remove('active');
  });

  const text='<!DOCTYPE html>\n'+clone.outerHTML;
  const blob=new Blob([text],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=((payload.deckTitle||'annotated_presentation').replace(/[^w-]+/g,'_')||'annotated_presentation')+'_annotated.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function hideLaserPointer(){if(laserPointer)laserPointer.style.display='none';slideEls.forEach(el=>el.classList.remove('laser-active'));}
function updateLaserPointer(evt){if(!laserPointer || !slideEls[active] || laserPointerMode==='none'){ hideLaserPointer(); return; }const slide = slideEls[active];const mapOpen = !!(slideMap && slideMap.classList.contains('open'));if(drawingMode || mapOpen){ hideLaserPointer(); return; }const r = slide.getBoundingClientRect();const inside = evt.clientX >= r.left && evt.clientX <= r.right && evt.clientY >= r.top && evt.clientY <= r.bottom;if(!inside){ hideLaserPointer(); return; }slide.classList.add('laser-active');laserPointer.style.display='block';laserPointer.style.transform='translate('+evt.clientX+'px,'+evt.clientY+'px)';}
function setVisibleSlideState(){
  if(!slideEls.length) return;
  active=Math.max(0,Math.min(slideEls.length-1,Number(active)||0));
  slideEls.forEach((el,i)=>{
    const isActive=i===active;
    el.classList.toggle('active',isActive);
    el.hidden=!isActive;
    el.setAttribute('aria-hidden',isActive?'false':'true');
    el.style.display=isActive?'block':'none';
    if(!isActive) el.classList.remove('laser-active');
  });
  document.querySelectorAll('[data-go]').forEach(btn=>btn.classList.toggle('active',Number(btn.dataset.go)===active));
}
function render(){setVisibleSlideState();renderLiveDrawAnnotations();const initActive=()=>{initializeSlideAnimations(slideEls[active]);hideLaserPointer();fitFiguresIn(slideEls[active]||document);};if(window.MathJax&&typeof window.MathJax.typesetPromise==='function'){if(typeof window.MathJax.typesetClear==='function')window.MathJax.typesetClear(slideEls);window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).then(initActive).catch(initActive);}else{initActive();}}
function go(i){const target=Number(i);if(!Number.isFinite(target)||target<0||target>=slideEls.length)return;active=target;if(drawingMode) drawingSlideIndex=active;render();if(slideEls[active]){try{slideEls[active].scrollTop=0;}catch(_){}}if(slideMap)slideMap.classList.remove('open');}
function advanceOrGoNext(){ if(activeSlideHasPendingAnimations()){ advanceSlideAnimation(slideEls[active]); return; } go(active+1); }
window.LuminaStandaloneDeckGo=go;
document.getElementById('prevBtn').addEventListener('click',()=>go(active-1));
document.getElementById('nextBtn').addEventListener('click',()=>advanceOrGoNext());
document.getElementById('fullscreenBtn').addEventListener('click',()=>{schedulePresentationControlsFade();togglePresentationFullscreen();});
document.getElementById('closeMapBtn').addEventListener('click',()=>{slideMap.classList.remove('open');schedulePresentationControlsFade();});
document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click',()=>{slideMap.classList.add('open');holdPresentationControlsVisible();}));
if(exportControls.draw){
  document.querySelectorAll('.draw-button').forEach(btn=>btn.addEventListener('click',()=>{ if(drawingMode && drawingSlideIndex===active) exitDrawingMode(); else { enterDrawingMode(active); } }));
}
if(exportControls.exportAnnotated){
  document.querySelectorAll('.export-annotated-button').forEach(btn=>btn.addEventListener('click',downloadAnnotatedSlides));
}
document.querySelectorAll('.pdf-button').forEach(btn=>btn.addEventListener('click',openPdfModal));
if(pdfCancelBtn) pdfCancelBtn.addEventListener('click',closePdfModal);
if(pdfGenerateBtn) pdfGenerateBtn.addEventListener('click',()=>generatePdfFromSlides(Number(pdfSlidesPerPage && pdfSlidesPerPage.value || 4)));
document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click',()=>go(Number(btn.dataset.go))));
if(slideMapList){slideMapList.addEventListener('click',evt=>{const btn=evt.target&&evt.target.closest?evt.target.closest('[data-go]'):null;if(btn){evt.preventDefault();go(Number(btn.dataset.go));}});}
if(drawClearBtn) drawClearBtn.addEventListener('click',()=>{ const svg=getDrawSurface(active); if(svg){ svg.innerHTML=''; saveSurface(active); } });
if(drawExitBtn) drawExitBtn.addEventListener('click',()=>exitDrawingMode());
const touchAdvanceTap={time:0,x:0,y:0,slide:-1};
function isTouchSlideAdvanceEvent(evt){
  if(!evt) return false;
  if(evt.pointerType==='touch' || evt.pointerType==='pen') return true;
  if(evt.pointerType==='mouse') return false;

function maybeAdvanceFromSlidePointer(evt, activeSlide){
  if(!activeSlide || !activeSlide.contains(evt.target)) return;
  if(isTouchSlideAdvanceEvent(evt)){
    evt.preventDefault();
    updateLaserPointer(evt);
    const now=Date.now();
    const dx=evt.clientX-touchAdvanceTap.x;
    const dy=evt.clientY-touchAdvanceTap.y;
    const isDoubleTap=touchAdvanceTap.slide===active && (now-touchAdvanceTap.time)<520 && Math.sqrt(dx*dx+dy*dy)<48;
    touchAdvanceTap.time=now;
    touchAdvanceTap.x=evt.clientX;
    touchAdvanceTap.y=evt.clientY;
    touchAdvanceTap.slide=active;
    if(isDoubleTap){ touchAdvanceTap.time=0; advanceOrGoNext(); }
    return;
  }
  advanceOrGoNext();
}
deck.addEventListener('pointerdown',evt=>{
  schedulePresentationControlsFade();
  if(pdfModal && !pdfModal.hidden && evt.target===pdfModal) closePdfModal();
  if(drawingMode){
    const svg=getDrawSurface(active);
    if(!svg) return;
    const hitShape=evt.target.closest('[data-draw-shape]');
    if(drawTool.value==='erase' && hitShape){ beginShape(evt); return; }
    if(evt.target===svg) beginShape(evt);
    return;
  }
  if(slideMap.classList.contains('open')) return;
  if(evt.target.closest('.slide-actions') || evt.target.closest('.deck-toolbar') || evt.target.closest('.pdf-modal')) return;

});
window.addEventListener('pointermove',evt=>{ notePointerControlsActivity(evt); if(drawingMode && drawingState.drawing){ updateShape(evt); return; } updateLaserPointer(evt); });
window.addEventListener('pointerup',()=>endShape());
window.addEventListener('pointercancel',()=>endShape());
window.addEventListener('mousemove', evt=>{ notePointerControlsActivity(evt); updateLaserPointer(evt); });
window.addEventListener('mouseleave', hideLaserPointer);

document.querySelectorAll('.deck-slide').forEach(slide=>slide.addEventListener('mouseleave', ()=>{ if(!drawingMode) hideLaserPointer(); }));
