<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Decision Tree Classifier Demo</title>
<style>
  :root{
    --bg:#f4f7fb; --card:#fff; --ink:#162033; --muted:#647089; --border:#d7deea;
    --red:#d95c5c; --blue:#4d7fff; --shadow:0 10px 28px rgba(24,39,75,.08)
  }
  *{box-sizing:border-box}
  body{margin:0;padding:18px;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  h1,h2,p{margin:0}
  .page{display:grid;gap:16px}
  .top{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:16px;display:grid;gap:12px}
  .controls{display:grid;gap:12px}
  .control{display:grid;gap:6px}
  label{font-weight:700;font-size:.95rem}
  select,input[type=range],button{font:inherit}
  select,button{border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:#fff;color:var(--ink)}
  input[type=range]{width:100%}
  .chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef3fb;border:1px solid #dbe4f5;font-size:.88rem;font-weight:700}
  canvas{display:block;border:1px solid var(--border);border-radius:16px;background:#fff;width:100%;max-width:100%;height:auto}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .stat{padding:12px;border-radius:14px;background:#f8faff;border:1px solid #e4eaf5}
  .stat strong{display:block;font-size:1.05rem}
  .rules{display:grid;gap:8px;font-size:.95rem}
  .rule{padding:10px 12px;border-radius:12px;background:#f8faff;border:1px solid #e4eaf5}
  .legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:.92rem}
  .dot{width:12px;height:12px;border-radius:999px;display:inline-block;vertical-align:middle;margin-right:6px}
  .note{color:var(--muted);font-size:.94rem}
  @media (max-width: 900px){ .top{grid-template-columns:1fr} .stats{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <section class="card">
      <h2>Basic decision tree demo</h2>
      <p class="note">A simple axis-aligned classifier trained with greedy binary splits.</p>

      <div class="controls">
        <div class="control">
          <label for="preset">Dataset</label>
          <select id="preset">
            <option value="gaussian">Two Gaussian blobs</option>
            <option value="xor">XOR</option>
            <option value="stripes">Vertical stripes</option>
          </select>
        </div>
        <div class="control">
          <label for="criterion">Criterion</label>
          <select id="criterion">
            <option value="gini">Gini impurity</option>
            <option value="entropy">Entropy</option>
          </select>
        </div>
        <div class="control">
          <label for="depth">Max depth</label>
          <input id="depth" type="range" min="0" max="5" step="1" value="2"/>
          <span id="depthVal" class="chip"></span>
        </div>
        <div class="control">
          <label for="leaf">Min leaf size</label>
          <input id="leaf" type="range" min="1" max="12" step="1" value="3"/>
          <span id="leafVal" class="chip"></span>
        </div>
        <div class="control">
          <label for="n">Points per class / pattern</label>
          <input id="n" type="range" min="12" max="80" step="2" value="34"/>
          <span id="nVal" class="chip"></span>
        </div>
        <button id="regen">Regenerate data</button>
      </div>

      <div class="legend">
        <span><span class="dot" style="background:#d95c5c"></span> red class</span>
        <span><span class="dot" style="background:#4d7fff"></span> blue class</span>
        <span>background shading = predicted region</span>
      </div>
    </section>

    <section class="card">
      <canvas id="canvas" width="700" height="520"></canvas>
      <div class="stats">
        <div class="stat"><strong id="nodeCount">0</strong><span class="note">nodes</span></div>
        <div class="stat"><strong id="leafCount">0</strong><span class="note">leaves</span></div>
        <div class="stat"><strong id="trainAcc">0%</strong><span class="note">training accuracy</span></div>
        <div class="stat"><strong id="depthUsed">0</strong><span class="note">depth used</span></div>
      </div>
      <div>
        <h2 style="margin-bottom:8px">Tree rules</h2>
        <div id="rules" class="rules"></div>
      </div>
    </section>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const controls = {
  preset: document.getElementById('preset'),
  criterion: document.getElementById('criterion'),
  depth: document.getElementById('depth'),
  leaf: document.getElementById('leaf'),
  n: document.getElementById('n'),
  regen: document.getElementById('regen')
};
const values = {
  depth: document.getElementById('depthVal'),
  leaf: document.getElementById('leafVal'),
  n: document.getElementById('nVal')
};
const outputs = {
  nodeCount: document.getElementById('nodeCount'),
  leafCount: document.getElementById('leafCount'),
  trainAcc: document.getElementById('trainAcc'),
  depthUsed: document.getElementById('depthUsed'),
  rules: document.getElementById('rules')
};

let state = { pts: [], seed: 1, tree: null };

function mulberry32(a){ return function(){ a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function randn(rng){
  let u=0,v=0; while(!u)u=rng(); while(!v)v=rng();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function pointToCanvas(p){
  return { x: (p.x + 1) * 0.5 * canvas.width, y: (1 - (p.y + 1) * 0.5) * canvas.height };
}
function canvasToPoint(px, py){
  return { x: px / canvas.width * 2 - 1, y: (1 - py / canvas.height) * 2 - 1 };
}
function impurity(points, criterion){
  if (!points.length) return 0;
  let pos = 0;
  for (const p of points) if (p.label === 1) pos++;
  const p1 = pos / points.length;
  const p0 = 1 - p1;
  if (criterion === 'entropy') {
    let h = 0;
    if (p1 > 0) h -= p1 * Math.log2(p1);
    if (p0 > 0) h -= p0 * Math.log2(p0);
    return h;
  }
  return p1 * (1 - p1) + p0 * (1 - p0);
}
function majorityLabel(points){
  let s = 0;
  for (const p of points) s += p.label;
  return s >= 0 ? 1 : -1;
}
function allSameLabel(points){
  if (!points.length) return true;
  const y = points[0].label;
  for (const p of points) if (p.label !== y) return false;
  return true;
}
function candidateThresholds(points, axis){
  const vals = [...new Set(points.map(p => axis === 0 ? p.x : p.y).sort((a,b)=>a-b))];
  const thresholds = [];
  for (let i = 0; i < vals.length - 1; i++) thresholds.push((vals[i] + vals[i+1]) / 2);
  return thresholds;
}
function splitPoints(points, axis, thr){
  const left = [], right = [];
  for (const p of points) ((axis === 0 ? p.x : p.y) <= thr ? left : right).push(p);
  return {left, right};
}
function buildTree(points, depth, maxDepth, minLeaf, criterion){
  const node = {
    points, depth, prediction: majorityLabel(points), splitAxis: null, splitValue: null,
    left: null, right: null
  };
  if (depth >= maxDepth || points.length <= minLeaf * 2 || allSameLabel(points)) return node;
  let best = null;
  const parentImp = impurity(points, criterion);
  for (const axis of [0,1]){
    const thresholds = candidateThresholds(points, axis);
    for (const thr of thresholds){
      const {left, right} = splitPoints(points, axis, thr);
      if (left.length < minLeaf || right.length < minLeaf) continue;
      const score = (left.length / points.length) * impurity(left, criterion) + (right.length / points.length) * impurity(right, criterion);
      const gain = parentImp - score;
      if (!best || score < best.score || (Math.abs(score - best.score) < 1e-9 && gain > best.gain)) {
        best = {axis, thr, left, right, score, gain};
      }
    }
  }
  if (!best) return node;
  node.splitAxis = best.axis;
  node.splitValue = best.thr;
  node.left = buildTree(best.left, depth + 1, maxDepth, minLeaf, criterion);
  node.right = buildTree(best.right, depth + 1, maxDepth, minLeaf, criterion);
  return node;
}
function predict(node, p){
  let cur = node;
  while (cur.left && cur.right){
    const val = cur.splitAxis === 0 ? p.x : p.y;
    cur = val <= cur.splitValue ? cur.left : cur.right;
  }
  return cur.prediction;
}
function countNodes(node){
  if (!node) return {nodes:0, leaves:0, maxDepth:0};
  if (!node.left || !node.right) return {nodes:1, leaves:1, maxDepth:node.depth};
  const a = countNodes(node.left), b = countNodes(node.right);
  return {nodes:1+a.nodes+b.nodes, leaves:a.leaves+b.leaves, maxDepth:Math.max(node.depth,a.maxDepth,b.maxDepth)};
}
function rulesText(node, lines=[]){
  function rec(n, prefix){
    if (!n.left || !n.right){
      const cls = n.prediction === 1 ? 'blue' : 'red';
      lines.push(`${prefix}leaf → predict ${cls} (${n.points.length} points)`);
      return;
    }
    const axis = n.splitAxis === 0 ? 'x₁' : 'x₂';
    lines.push(`${prefix}if ${axis} ≤ ${n.splitValue.toFixed(2)}`);
    rec(n.left, prefix + '  ');
    lines.push(`${prefix}else`);
    rec(n.right, prefix + '  ');
  }
  rec(node,'');
  return lines;
}
function drawAxes(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#edf1f8';
  ctx.lineWidth = 1;
  for (let g=1; g<4; g++){
    const x = g/4 * canvas.width, y = g/4 * canvas.height;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.strokeStyle = '#aeb8cc';
  ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke();
}
function drawBackground(tree){
  if (!tree) return;
  const gs = 48, cellW = canvas.width / gs, cellH = canvas.height / gs;
  for (let gy=0; gy<gs; gy++){
    for (let gx=0; gx<gs; gx++){
      const p = canvasToPoint((gx+.5)*cellW, (gy+.5)*cellH);
      const pred = predict(tree,p);
      ctx.fillStyle = pred === 1 ? 'rgba(132,165,255,.22)' : 'rgba(255,164,164,.24)';
      ctx.fillRect(gx*cellW, gy*cellH, cellW+1, cellH+1);
    }
  }
}
function drawPoints(points){
  for (const p of points){
    const q = pointToCanvas(p);
    ctx.beginPath();
    ctx.arc(q.x,q.y,5.6,0,Math.PI*2);
    ctx.fillStyle = p.label === 1 ? '#4d7fff' : '#d95c5c';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.24)';
    ctx.stroke();
  }
}
function generateData(){
  const n = +controls.n.value;
  state.seed = (state.seed * 1664525 + 1013904223) >>> 0;
  const rng = mulberry32(state.seed || 1);
  const pts = [];
  if (controls.preset.value === 'gaussian'){
    for (let i=0;i<n;i++){
      pts.push({x: clamp(-0.4 + 0.24*randn(rng), -1,1), y: clamp(-0.1 + 0.28*randn(rng), -1,1), label:-1});
      pts.push({x: clamp(0.45 + 0.24*randn(rng), -1,1), y: clamp(0.12 + 0.28*randn(rng), -1,1), label:1});
    }
  } else if (controls.preset.value === 'xor'){
    const corners = [[-0.55,-0.55,-1],[0.55,0.55,-1],[-0.55,0.55,1],[0.55,-0.55,1]];
    for (const [cx,cy,lab] of corners){
      for (let i=0;i<n/2;i++){
        pts.push({x: clamp(cx + 0.18*randn(rng), -1,1), y: clamp(cy + 0.18*randn(rng), -1,1), label:lab});
      }
    }
  } else {
    for (let i=0;i<2*n;i++){
      const x = -0.95 + 1.9 * rng();
      const y = -0.9 + 1.8 * rng();
      const band = Math.floor((x + 1) / 0.5);
      const label = band % 2 === 0 ? -1 : 1;
      pts.push({x,y,label});
    }
  }
  state.pts = pts;
}
function fitAndDraw(){
  values.depth.textContent = controls.depth.value;
  values.leaf.textContent = controls.leaf.value;
  values.n.textContent = controls.n.value;
  state.tree = buildTree(state.pts, 0, +controls.depth.value, +controls.leaf.value, controls.criterion.value);
  drawAxes();
  drawBackground(state.tree);
  drawAxes();
  drawPoints(state.pts);

  const counts = countNodes(state.tree);
  let correct = 0;
  for (const p of state.pts) if (predict(state.tree,p) === p.label) correct++;
  outputs.nodeCount.textContent = counts.nodes;
  outputs.leafCount.textContent = counts.leaves;
  outputs.depthUsed.textContent = counts.maxDepth;
  outputs.trainAcc.textContent = (100 * correct / Math.max(1, state.pts.length)).toFixed(1) + '%';
  outputs.rules.innerHTML = '';
  for (const line of rulesText(state.tree, [])){
    const div = document.createElement('div');
    div.className = 'rule';
    div.textContent = line;
    outputs.rules.appendChild(div);
  }
}

for (const el of [controls.preset, controls.criterion, controls.depth, controls.leaf, controls.n]){
  el.addEventListener('input', ()=>{
    if (el === controls.preset || el === controls.n) generateData();
    fitAndDraw();
  });
  el.addEventListener('change', ()=>{
    if (el === controls.preset || el === controls.n) generateData();
    fitAndDraw();
  });
}
controls.regen.addEventListener('click', ()=>{ generateData(); fitAndDraw(); });

generateData();
fitAndDraw();
</script>
</body>
</html>
