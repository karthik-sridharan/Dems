<script id="deck-source" type="application/json">{"deckTitle":"My HTML Presentation","theme":{"name":"Default theme","bgColor":"#ffffff","fontColor":"#111111","accentColor":"#2f6fed","panelRadius":22,"titleScale":1,"beamerStyle":"classic","chromeColor":"#17365d","chromeTextColor":"#ffffff","sidebarWidth":118,"titleCaps":"0"},"presentationOptions":{"enableLiveDraw":false,"exportControls":{"slides":true,"draw":false,"exportAnnotated":false,"pointerMenu":true,"generatePdf":true}},"slides":[{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Concept slide","kicker":"","lede":"Introduce the main idea in one short sentence.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Main points","content":"\\paragraph{Core idea}\n\n\\begin{itemize}\n\\item First point\n\\item Second point\n\\item Third point\n\\end{itemize}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"title-center","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Principal Component Analysis (PCA)","kicker":"Dimensionality reduction by finding directions of maximum variance","lede":"A visual, geometric, and hands-on introduction for teaching PCA.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[],"rightBlocks":[],"notesTitle":"Opening","notesBody":"Frame PCA as a tool for summarizing high-dimensional data. Emphasize that the deck will move from intuition to geometry, then to a simple interactive demo."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Why PCA? Find the most informative view","kicker":"Motivation","lede":"PCA rotates the coordinate system so that the first new axis captures as much variation as possible.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"placeholder","title":"Scatter cloud intuition","content":"Image requested but automatic generation failed. Prompt: Clean lecture-style illustration of a 2D scatter plot: many blue points form an elongated oval cloud slanting upward from left to right, with a bold arrow along the long direction labeled PC1 and a shorter perpendicular arrow labeled PC2; white background, minimal axes, modern educational style. Reason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"panel","title":"Core intuition","content":"\\paragraph{The question PCA asks}\n\\begin{itemize}\n\\item Which direction shows the greatest spread in the data?\n\\item Can we describe each observation using fewer coordinates?\n\\item What structure remains after we remove the dominant direction?\n\\end{itemize}\n\\begin{card}{Key idea}PCA is not looking for a target label. It is an unsupervised method for summarizing variation.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching guidance","notesBody":"Use the picture first. Ask students: if you had to draw one line that best summarizes the cloud, where would it go? Then name that line PC1. Explain that PC2 is perpendicular and captures the next largest remaining spread."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"The geometry: project data onto new axes","kicker":"Projection view","lede":"A principal component is a direction vector; PCA scores are the coordinates of points after projection onto that direction.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Projection vocabulary","content":"\\paragraph{Three objects to distinguish}\n\\begin{itemize}\n\\item \\textbf{Loadings}: the direction of a principal component.\n\\item \\textbf{Scores}: each observation's coordinate on that component.\n\\item \\textbf{Reconstruction}: an approximation made from selected components.\n\\end{itemize}\n\\begin{card}{Center first}PCA is normally performed after subtracting each feature mean, so the cloud is centered at the origin.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Projection diagram","content":"Image requested but automatic generation failed. Prompt: Educational diagram of PCA projection: centered x-y axes, a diagonal line through the origin labeled candidate direction u, several blue data points, gray dashed perpendicular lines from points to the diagonal, and small projected points on the line; include label score = projection length; clean white background.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching guidance","notesBody":"Stress that PCA changes the coordinate system, not the observations themselves. The score is a coordinate in the new basis. If we keep only PC1, we replace each point by its shadow on the PC1 line."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"The PCA algorithm in four steps","kicker":"Computation","lede":"For a data matrix, PCA can be computed from the covariance matrix or by singular value decomposition.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"pseudocode-latex","title":"PCA steps","content":"Input: data matrix X with n observations and p features\n\n1. Center each feature:\n   X_c = X - \\bar{X}\n\n2. Estimate covariance:\n   S = \\frac{1}{n-1} X_c^T X_c\n\n3. Find eigenvectors and eigenvalues:\n   S v_j = \\lambda_j v_j\n\n4. Sort by decreasing \\lambda_j:\n   PC1, PC2, \\dots\n\nScores:\n   Z = X_c V","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"panel","title":"What the math means","content":"\\paragraph{Interpretation}\n\\begin{itemize}\n\\item Eigenvectors give principal component directions.\n\\item Eigenvalues measure variance along those directions.\n\\item Explained variance ratio is \\(\\lambda_j / \\sum_k \\lambda_k\\).\n\\end{itemize}\n\\begin{card}{Practical note}If features have very different units, standardize them before PCA so one scale does not dominate.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching guidance","notesBody":"Keep the algorithm high-level. The important conceptual bridge is: covariance describes how features vary together; eigenvectors of covariance identify the directions where that variation is most organized."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"HTML demo: rotate a component and watch variance","kicker":"Interactive intuition","lede":"Move the slider to compare candidate projection directions. PCA chooses the angle with the largest projected variance.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"custom","title":"Interactive PCA projection demo","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div id=\"pca-demo\" style=\"font-family: system-ui, -apple-system, Segoe UI, sans-serif; width: 100%; max-width: 980px; margin: 0 auto; border: 1px solid #d8deea; border-radius: 18px; padding: 18px; background: #ffffff; box-shadow: 0 8px 24px rgba(17,17,17,0.06);\">\n  <div style=\"display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap;\">\n    <svg id=\"pca-svg\" viewBox=\"0 0 560 360\" style=\"flex: 1 1 560px; min-width: 420px; border-radius: 14px; background: linear-gradient(180deg,#fbfdff,#f5f8ff); border: 1px solid #e5eaf4;\"></svg>\n    <div style=\"flex: 0 0 260px; min-width: 240px;\">\n      <div style=\"font-weight: 800; font-size: 18px; margin-bottom: 8px; color: #111111;\">Candidate component</div>\n      <label for=\"pca-angle\" style=\"display: block; color: #4b5563; font-size: 14px; margin-bottom: 6px;\">Angle: <span id=\"pca-angle-label\">32°</span></label>\n      <input id=\"pca-angle\" type=\"range\" min=\"-90\" max=\"90\" value=\"32\" step=\"1\" style=\"width: 100%; accent-color: #2f6fed;\" />\n      <div style=\"margin-top: 16px; padding: 14px; border-radius: 14px; background: #f1f6ff; border: 1px solid #d9e7ff;\">\n        <div style=\"font-size: 13px; color: #4b5563;\">Projected variance</div>\n        <div id=\"pca-var\" style=\"font-size: 30px; font-weight: 850; color: #2f6fed; line-height: 1.1;\">--</div>\n        <div id=\"pca-best\" style=\"font-size: 13px; color: #374151; margin-top: 8px;\">PCA selects the maximum.</div>\n      </div>\n      <div style=\"margin-top: 12px; font-size: 13px; color: #4b5563; line-height: 1.45;\">Gray segments show projection onto the candidate line. The best direction follows the long axis of the cloud.</div>\n    </div>\n  </div>\n</div>\n<script>\n(function(){\n  const svg = document.getElementById('pca-svg');\n  const slider = document.getElementById('pca-angle');\n  const angleLabel = document.getElementById('pca-angle-label');\n  const varLabel = document.getElementById('pca-var');\n  const bestLabel = document.getElementById('pca-best');\n  if(!svg || !slider) return;\n  const W = 560, H = 360, cx = 280, cy = 180, scale = 42;\n  const pts = [];\n  for(let i=0;i<48;i++){\n    const t = (i - 23.5) / 9;\n    const noise = Math.sin(i*2.17)*0.42 + Math.cos(i*0.73)*0.18;\n    const x = 1.45*t + 0.18*Math.sin(i);\n    const y = 0.82*t + noise;\n    pts.push([x,y]);\n  }\n  function screen(p){ return [cx + p[0]*scale, cy - p[1]*scale]; }\n  function add(tag, attrs){ const el = document.createElementNS('http://www.w3.org/2000/svg', tag); for(const k in attrs) el.setAttribute(k, attrs[k]); svg.appendChild(el); return el; }\n  function varianceAt(deg){\n    const a = deg*Math.PI/180, ux = Math.cos(a), uy = Math.sin(a);\n    const scores = pts.map(p => p[0]*ux + p[1]*uy);\n    const m = scores.reduce((s,v)=>s+v,0)/scores.length;\n    return scores.reduce((s,v)=>s+(v-m)*(v-m),0)/(scores.length-1);\n  }\n  let bestDeg = -90, bestVar = -Infinity;\n  for(let d=-90; d<=90; d+=1){ const v = varianceAt(d); if(v>bestVar){ bestVar=v; bestDeg=d; } }\n  function draw(){\n    const deg = Number(slider.value), a = deg*Math.PI/180, ux = Math.cos(a), uy = Math.sin(a);\n    svg.innerHTML = '';\n    add('line',{x1:40,y1:cy,x2:520,y2:cy,stroke:'#cbd5e1','stroke-width':1});\n    add('line',{x1:cx,y1:28,x2:cx,y2:332,stroke:'#cbd5e1','stroke-width':1});\n    const bx = Math.cos(bestDeg*Math.PI/180), by = Math.sin(bestDeg*Math.PI/180);\n    add('line',{x1:cx-bx*210,y1:cy+by*210,x2:cx+bx*210,y2:cy-by*210,stroke:'#a7f3d0','stroke-width':7,'stroke-linecap':'round',opacity:0.75});\n    add('line',{x1:cx-ux*220,y1:cy+uy*220,x2:cx+ux*220,y2:cy-uy*220,stroke:'#2f6fed','stroke-width':4,'stroke-linecap':'round'});\n    pts.forEach(p => {\n      const score = p[0]*ux + p[1]*uy;\n      const q = [score*ux, score*uy];\n      const sp = screen(p), sq = screen(q);\n      add('line',{x1:sp[0],y1:sp[1],x2:sq[0],y2:sq[1],stroke:'#94a3b8','stroke-width':1.2,opacity:0.55,'stroke-dasharray':'4 4'});\n      add('circle',{cx:sq[0],cy:sq[1],r:2.8,fill:'#2f6fed',opacity:0.75});\n    });\n    pts.forEach(p => { const sp = screen(p); add('circle',{cx:sp[0],cy:sp[1],r:5,fill:'#111827',opacity:0.82}); });\n    add('text',{x:cx+ux*175+8,y:cy-uy*175-8,fill:'#2f6fed','font-size':15,'font-weight':800}).textContent='candidate PC';\n    add('text',{x:cx+bx*142+8,y:cy-by*142+20,fill:'#047857','font-size':13,'font-weight':800}).textContent='true max direction';\n    const v = varianceAt(deg);\n    angleLabel.textContent = deg + '°';\n    varLabel.textContent = v.toFixed(2);\n    const diff = Math.abs(deg-bestDeg);\n    bestLabel.textContent = diff <= 3 ? 'This is essentially PC1: maximum variance.' : 'Try moving toward ' + bestDeg + '° for PC1.';\n  }\n  slider.addEventListener('input', draw);\n  draw();\n})();\n<\/script></body></html>","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Demo guidance","notesBody":"Invite students to predict which angle will maximize projected variance before moving the slider. Point out that projected variance is small when the line cuts across the narrow part of the cloud and large when it follows the long axis."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Reading PCA results: scree plots, loadings, and cautions","kicker":"Interpretation","lede":"PCA is useful when we interpret components carefully and remember what information may be lost.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"placeholder","title":"Scree and biplot visual","content":"Image requested but automatic generation failed. Prompt: Clean educational composite figure for PCA interpretation: left side a scree plot with bars decreasing from PC1 to PC5 and a cumulative explained variance line; right side a simple loading biplot with arrows labeled feature A, feature B, feature C pointing in different directions; white background, blue accent color, lecture slide style.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"panel","title":"Takeaways and pitfalls","content":"\\paragraph{How to interpret PCA}\n\\begin{itemize}\n\\item Use explained variance to decide how much structure is retained.\n\\item Inspect loadings to understand which features define each component.\n\\item Remember that component signs can flip without changing the model.\n\\end{itemize}\n\\begin{card}{Common pitfalls}Do not treat PCA components as causal factors. PCA finds directions of variance, not necessarily meaningful mechanisms.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Closing","notesBody":"End by connecting back to the first scatter plot: PCA is a systematic way to choose the most informative axes. Mention that in higher dimensions the same idea applies, even when we cannot draw the full cloud."},{"slideType":"title-center","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Principal Component Analysis","kicker":"Dimensionality reduction by finding directions of maximum variance","lede":"A visual, lecture-style introduction to PCA with pictures and an interactive HTML demo.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[],"rightBlocks":[],"notesTitle":"Opening","notesBody":"Frame PCA as a way to rotate the coordinate system so that the most informative directions come first. Emphasize that today’s goal is intuition before heavy algebra."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Why PCA? Compress the View Without Losing the Pattern","kicker":"Motivation","lede":"PCA helps us summarize high-dimensional data using fewer, more informative axes.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"placeholder","title":"Dimensionality reduction picture","content":"Image requested but automatic generation failed. Prompt: Clean lecture-style illustration of a 3D point cloud projected onto a 2D plane, with translucent projection lines, blue accent color, white background, minimal labels reading original data and lower-dimensional view, educational and crisp.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"panel","title":"Motivation bullets","content":"\\paragraph{Core idea}\n\\begin{itemize}\n\\item Many datasets have correlated features: height and weight, pixels, sensor readings, gene expression.\n\\item PCA finds new axes that capture the strongest variation in the data.\n\\item Keeping the first few axes gives a compact summary, useful for visualization, compression, and preprocessing.\n\\end{itemize}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Speaker notes","notesBody":"Start with a practical question: if a dataset has many columns, can we draw or store it with fewer coordinates? PCA answers by finding the directions where the data varies most."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Geometric Intuition: Rotate the Axes","kicker":"What PCA is doing visually","lede":"PCA does not change the data cloud first; it changes the coordinate axes used to describe it.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Geometry explanation","content":"\\paragraph{Think of PCA as a rotation}\n\\begin{itemize}\n\\item Start with ordinary x and y axes.\n\\item Find the longest direction through the data cloud: this is principal component 1.\n\\item Find the next perpendicular direction: this is principal component 2.\n\\item Projecting onto PC1 gives the best one-dimensional summary in the least-squares sense.\n\\end{itemize}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Principal component axes","content":"Image requested but automatic generation failed. Prompt: Educational scatterplot of an elongated oval point cloud with two bold arrows overlaid: a long blue arrow labeled PC1 along the major axis and a shorter gray arrow labeled PC2 perpendicular to it, white background, clean lecture slide style.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Speaker notes","notesBody":"Use the picture to reinforce that PC1 points along the widest spread of the cloud. PC2 must be perpendicular to PC1 and captures the remaining variation."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"The PCA Recipe","kicker":"Algorithm","lede":"In practice, PCA is a short sequence: center, measure covariance, find directions, then project.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"PCA steps","content":"\\paragraph{Procedure}\n\\begin{itemize}\n\\item Center each feature by subtracting its mean.\n\\item Compute the covariance matrix to measure how features vary together.\n\\item Find eigenvectors and eigenvalues of the covariance matrix.\n\\item Sort eigenvectors by eigenvalue from largest to smallest.\n\\item Project the data onto the first k eigenvectors.\n\\end{itemize}\n\n\\begin{card}{Key interpretation}Eigenvectors are the new axes. Eigenvalues tell us how much variance each axis explains.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Keep the math light here. The covariance matrix is the object that tells PCA where the cloud is stretched. Eigenvectors give the directions of stretch, and eigenvalues give the amount of stretch."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"HTML Demo: Explore PCA on a Point Cloud","kicker":"Interactive classroom activity","lede":"Use the buttons to generate, rotate, and project a correlated 2D dataset.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"custom","title":"Interactive PCA demo","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div id=\"pca-demo\" style=\"font-family:system-ui, -apple-system, Segoe UI, sans-serif; border:1px solid #d9e2f2; border-radius:18px; padding:16px; background:#fbfdff;\">\n  <div style=\"display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:10px;\">\n    <button id=\"pca-new\" style=\"padding:8px 12px; border-radius:10px; border:1px solid #2f6fed; background:#2f6fed; color:white; font-weight:700;\">New cloud</button>\n    <button id=\"pca-rotate\" style=\"padding:8px 12px; border-radius:10px; border:1px solid #b8c7e6; background:white; color:#17365d; font-weight:700;\">Rotate data</button>\n    <button id=\"pca-proj\" style=\"padding:8px 12px; border-radius:10px; border:1px solid #b8c7e6; background:white; color:#17365d; font-weight:700;\">Toggle projections</button>\n    <span id=\"pca-readout\" style=\"font-size:14px; color:#334; margin-left:auto;\"></span>\n  </div>\n  <svg id=\"pca-svg\" viewBox=\"0 0 760 430\" style=\"width:100%; height:390px; background:white; border-radius:14px; border:1px solid #edf1f7;\"></svg>\n  <div style=\"font-size:13px; color:#445; margin-top:8px;\">Blue axis = PC1, gray axis = PC2. Thin blue lines show projection onto PC1.</div>\n</div>\n<script>\n(function(){\n  const svg = document.getElementById('pca-svg');\n  const readout = document.getElementById('pca-readout');\n  let angle = 0.55, showProj = true, pts = [];\n  function randn(){ let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }\n  function gen(){ pts=[]; for(let i=0;i<90;i++){ const u=randn()*1.45, v=randn()*0.38; const x=Math.cos(angle)*u-Math.sin(angle)*v; const y=Math.sin(angle)*u+Math.cos(angle)*v; pts.push([x,y]); } draw(); }\n  function stats(){ const mx=pts.reduce((s,p)=>s+p[0],0)/pts.length, my=pts.reduce((s,p)=>s+p[1],0)/pts.length; let sxx=0, syy=0, sxy=0; pts.forEach(p=>{ const x=p[0]-mx, y=p[1]-my; sxx+=x*x; syy+=y*y; sxy+=x*y; }); sxx/=pts.length-1; syy/=pts.length-1; sxy/=pts.length-1; const theta=0.5*Math.atan2(2*sxy, sxx-syy); const tr=sxx+syy, det=sxx*syy-sxy*sxy; const disc=Math.sqrt(Math.max(0,tr*tr/4-det)); return {mx,my,theta,l1:tr/2+disc,l2:tr/2-disc}; }\n  function sx(x){return 380+x*95;} function sy(y){return 215-y*95;}\n  function line(x1,y1,x2,y2,color,w,dash){ return '<line x1=\"'+sx(x1)+'\" y1=\"'+sy(y1)+'\" x2=\"'+sx(x2)+'\" y2=\"'+sy(y2)+'\" stroke=\"'+color+'\" stroke-width=\"'+w+'\" '+(dash?'stroke-dasharray=\"5 5\"':'')+' stroke-linecap=\"round\"/>'; }\n  function draw(){ const st=stats(), c=Math.cos(st.theta), s=Math.sin(st.theta), L1=2.8*Math.sqrt(st.l1), L2=2.8*Math.sqrt(st.l2); let h=''; h+='<line x1=\"40\" y1=\"215\" x2=\"720\" y2=\"215\" stroke=\"#edf1f7\"/><line x1=\"380\" y1=\"25\" x2=\"380\" y2=\"405\" stroke=\"#edf1f7\"/>'; if(showProj){ pts.forEach(p=>{ const x=p[0]-st.mx, y=p[1]-st.my, d=x*c+y*s, qx=st.mx+d*c, qy=st.my+d*s; h+=line(p[0],p[1],qx,qy,'#b8d0ff',1,true); h+='<circle cx=\"'+sx(qx)+'\" cy=\"'+sy(qy)+'\" r=\"2.5\" fill=\"#2f6fed\" opacity=\"0.55\"/>'; }); } pts.forEach(p=>{ h+='<circle cx=\"'+sx(p[0])+'\" cy=\"'+sy(p[1])+'\" r=\"4\" fill=\"#17365d\" opacity=\"0.72\"/>'; }); h+=line(st.mx-L1*c,st.my-L1*s,st.mx+L1*c,st.my+L1*s,'#2f6fed',5,false); h+=line(st.mx-L2*(-s),st.my-L2*c,st.mx+L2*(-s),st.my+L2*c,'#7c8798',4,false); h+='<text x=\"'+sx(st.mx+L1*c+0.15)+'\" y=\"'+sy(st.my+L1*s)+'\" fill=\"#2f6fed\" font-size=\"18\" font-weight=\"700\">PC1</text>'; h+='<text x=\"'+sx(st.mx+L2*(-s)+0.1)+'\" y=\"'+sy(st.my+L2*c)+'\" fill=\"#7c8798\" font-size=\"18\" font-weight=\"700\">PC2</text>'; svg.innerHTML=h; const pct=Math.round(100*st.l1/(st.l1+st.l2)); readout.textContent='PC1 explains about '+pct+'% of variance'; }\n  document.getElementById('pca-new').addEventListener('click', gen);\n  document.getElementById('pca-rotate').addEventListener('click', function(){ angle += 0.35; gen(); });\n  document.getElementById('pca-proj').addEventListener('click', function(){ showProj=!showProj; draw(); });\n  gen();\n})();\n<\/script></body></html>","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":"Demonstrate three ideas: PC1 follows the long direction of the cloud; rotating the data rotates the principal components; projecting onto PC1 collapses the cloud to a one-dimensional summary. Ask students what information is preserved and what is lost."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"What Students Should Remember","kicker":"Wrap-up","lede":"PCA is most useful when the important structure of the data lies near a lower-dimensional subspace.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"placeholder","title":"PCA summary visual","content":"Image requested but automatic generation failed. Prompt: Clean educational before-and-after diagram for PCA: left side shows a scattered 2D elliptical cloud with x and y axes; right side shows the same points collapsed onto a single blue line labeled PC1, with a small note 'keep the main variation', white background, modern lecture slide style.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"panel","title":"Takeaways","content":"\\paragraph{Three takeaways}\n\\begin{itemize}\n\\item PCA finds uncorrelated directions ordered by explained variance.\n\\item The first component is the best single linear direction for preserving variance.\n\\item Dimensionality reduction is a tradeoff: simpler representation, but some information is discarded.\n\\end{itemize}\n\n\\begin{card}{Classroom check}If PC1 explains 95% of the variance, what might be gained by using only PC1? What might be lost?\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Speaker notes","notesBody":"End with a quick conceptual check. Make sure students can say what PC1, PC2, eigenvalues, and projection mean in plain language before moving to calculations or software."},{"slideType":"title-center","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Principal Component Analysis (PCA)","kicker":"Dimensionality reduction by finding directions of maximum variance","lede":"PCA turns many correlated measurements into a smaller set of informative axes.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[],"rightBlocks":[],"notesTitle":"Opening","notesBody":"Frame PCA as a geometric method: it rotates the coordinate system so that the first new axis captures the largest spread in the data. Emphasize that PCA is unsupervised: it does not use class labels or outcomes."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Why use PCA?","kicker":"Motivation","lede":"When variables move together, PCA compresses redundant information.","leftBlocks":[{"mode":"panel","title":"Motivation points","content":"\\paragraph{Common reasons}\n\\begin{itemize}\n\\item Visualize high-dimensional data in 2D or 3D\n\\item Reduce noise by keeping the strongest patterns\n\\item Remove multicollinearity before modeling\n\\item Speed up downstream algorithms with fewer features\n\\end{itemize}\n\n\\begin{card}{Key tradeoff}Use fewer dimensions while preserving as much variance as possible.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Dimensionality reduction picture","content":"Image requested but automatic generation failed. Prompt: Conceptual educational illustration of many-dimensional data represented as a complex cluster of points on the left, smoothly projected onto a simple 2D plane on the right, with blue arrows indicating compression, white background, clean lecture slide style, no dense labels.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching emphasis","notesBody":"Use examples students know: image pixels, gene expression, survey items, or sensor readings. Stress that PCA is most useful when many variables are correlated, because the same underlying pattern appears repeatedly across columns.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Step 1: Center the data","kicker":"Preprocessing","lede":"PCA starts by moving the origin to the center of the data cloud.","leftBlocks":[{"mode":"panel","title":"Centering explanation","content":"\\paragraph{Mean centering}\n\\begin{itemize}\n\\item Compute the mean of each feature column\n\\item Subtract that mean from every observation\n\\item The centered data cloud has mean zero\n\\end{itemize}\n\n\\begin{card}{Why it matters}PCA measures spread around the center, not distance from the original coordinate origin.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Centering diagram","content":"Image requested but automatic generation failed. Prompt: Side-by-side educational diagram: left panel shows a 2D scatter plot offset away from the origin with a red mean point; right panel shows the same scatter plot shifted so the red mean point is at the origin, blue coordinate axes, white background, clear lecture style, minimal labels: Before centering, After centering, Mean.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching emphasis","notesBody":"Clarify that centering changes the coordinate reference point but does not change the shape of the cloud. If variables are measured on very different scales, mention that standardization is often used before PCA.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Step 2: Find directions of maximum variance","kicker":"Principal components","lede":"The first principal component is the line along which the centered data varies most.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"panel","title":"Principal axis ideas","content":"\\paragraph{What PCA solves}\n\\begin{itemize}\n\\item PC1: direction with the greatest variance\n\\item PC2: next greatest variance, constrained to be perpendicular to PC1\n\\item Later PCs continue this pattern\n\\end{itemize}\n\n\\begin{card}{Geometric view}PCA rotates the axes; it does not bend or warp the data.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}},{"mode":"pseudocode-latex","title":"Compact math","content":"\\text{Choose } w_1 \\text{ to maximize } \\operatorname{Var}(Xw_1) \\quad \\text{subject to } \\lVert w_1 \\rVert = 1.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Principal axes illustration","content":"Image requested but automatic generation failed. Prompt: Clean 2D scatter plot of an elongated oval cloud of points, with a thick blue arrow running through the long axis labeled PC1 and a shorter gray perpendicular arrow labeled PC2, centered at the mean, white background, lecture-style graphic.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Teaching emphasis","notesBody":"Point out that variance is a measure of spread. If the data cloud looks like a tilted ellipse, PCA finds the ellipse's long and short axes. The components are ordered: PC1 captures the most variance, PC2 captures the most remaining variance, and so on."},{"slideType":"single","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Interactive demo: rotate a projection axis","kicker":"HTML demo","lede":"Drag the slider: the best PCA direction is the one with the largest projected variance.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0},"leftBlocks":[{"mode":"custom","title":"PCA projection demo","content":"<!DOCTYPE html><html lang=\"en\"><head><meta charset=\"UTF-8\" /><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" /><style>html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Inter,Arial,sans-serif}*{box-sizing:border-box}body{min-height:100vh}</style></head><body><div class='pca-demo' style='font-family:system-ui,Segoe UI,sans-serif;border:1px solid #d9dfe8;border-radius:18px;padding:18px;background:#fbfcff;box-shadow:0 8px 24px rgba(20,40,80,0.08);'>\n  <div style='display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;'>\n    <svg id='pcaSvg' viewBox='0 0 640 360' style='flex:1 1 520px;min-width:420px;max-width:100%;background:white;border-radius:14px;border:1px solid #e5e8ef;'>\n      <line x1='40' y1='180' x2='600' y2='180' stroke='#d0d5dd'/>\n      <line x1='320' y1='320' x2='320' y2='40' stroke='#d0d5dd'/>\n      <g id='projectionLines'></g>\n      <line id='axisLine' x1='0' y1='0' x2='0' y2='0' stroke='#2f6fed' stroke-width='5' stroke-linecap='round'/>\n      <g id='points'></g>\n      <circle cx='320' cy='180' r='5' fill='#111111'/>\n      <text x='332' y='174' font-size='14' fill='#111111'>mean</text>\n    </svg>\n    <div style='flex:0 1 260px;padding:8px 4px;'>\n      <label style='font-weight:700;color:#111111;'>Projection angle: <span id='angleOut'>32°</span></label>\n      <input id='angleSlider' type='range' min='0' max='180' value='32' style='width:100%;margin:14px 0;accent-color:#2f6fed;'>\n      <div style='font-size:14px;color:#475467;line-height:1.45;'>Each gray segment drops a data point onto the chosen axis. PCA chooses the angle where the projected points are most spread out.</div>\n      <div id='varianceOut' style='margin-top:16px;padding:12px;border-radius:12px;background:#eef4ff;color:#17365d;font-weight:700;'>Projected variance: --</div>\n    </div>\n  </div>\n</div>\n<script>\n(function(){\n  const root = document.currentScript.previousElementSibling;\n  const svg = root.querySelector('#pcaSvg');\n  const ptsG = root.querySelector('#points');\n  const projG = root.querySelector('#projectionLines');\n  const axisLine = root.querySelector('#axisLine');\n  const slider = root.querySelector('#angleSlider');\n  const angleOut = root.querySelector('#angleOut');\n  const varianceOut = root.querySelector('#varianceOut');\n  const ns = 'http://www.w3.org/2000/svg';\n  const data = [[-2.8,-1.9],[-2.2,-1.2],[-1.8,-1.5],[-1.5,-0.6],[-1.1,-0.8],[-0.7,-0.1],[-0.2,-0.4],[0.1,0.2],[0.4,0.0],[0.8,0.7],[1.0,0.4],[1.4,1.1],[1.7,0.9],[2.0,1.6],[2.4,1.3],[2.7,2.0]];\n  function sx(x){return 320 + x*82;}\n  function sy(y){return 180 - y*82;}\n  function el(name, attrs){const e=document.createElementNS(ns,name); Object.keys(attrs).forEach(k=>e.setAttribute(k,attrs[k])); return e;}\n  data.forEach(p=>ptsG.appendChild(el('circle',{cx:sx(p[0]),cy:sy(p[1]),r:6,fill:'#2f6fed',opacity:0.9})));\n  function draw(){\n    const deg = Number(slider.value); const rad = deg*Math.PI/180; const u=[Math.cos(rad),Math.sin(rad)];\n    angleOut.textContent = deg + '°';\n    axisLine.setAttribute('x1', sx(-3.3*u[0])); axisLine.setAttribute('y1', sy(-3.3*u[1]));\n    axisLine.setAttribute('x2', sx(3.3*u[0])); axisLine.setAttribute('y2', sy(3.3*u[1]));\n    projG.innerHTML='';\n    const scores = data.map(p=>p[0]*u[0]+p[1]*u[1]);\n    const mean = scores.reduce((a,b)=>a+b,0)/scores.length;\n    const variance = scores.reduce((a,b)=>a+(b-mean)*(b-mean),0)/(scores.length-1);\n    data.forEach((p,i)=>{const t=scores[i]; const q=[t*u[0],t*u[1]]; projG.appendChild(el('line',{x1:sx(p[0]),y1:sy(p[1]),x2:sx(q[0]),y2:sy(q[1]),stroke:'#98a2b3','stroke-width':1.5,'stroke-dasharray':'4 4'})); projG.appendChild(el('circle',{cx:sx(q[0]),cy:sy(q[1]),r:4,fill:'#17365d',opacity:0.85}));});\n    varianceOut.textContent = 'Projected variance: ' + variance.toFixed(2);\n  }\n  slider.addEventListener('input', draw); draw();\n})();\n<\/script></body></html>","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[],"notesTitle":"Demo guidance","notesBody":"Ask students to predict what happens when the axis is nearly horizontal, vertical, or aligned with the diagonal cloud. The projected points spread out most when the axis matches the long direction of the data. That angle is the first principal component."},{"slideType":"two-col","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","inheritTheme":true,"title":"Using PCA in practice","kicker":"Interpretation and workflow","lede":"After fitting PCA, decide how many components to keep and interpret what they represent.","leftBlocks":[{"mode":"panel","title":"Practical workflow","content":"\\paragraph{A typical PCA workflow}\n\\begin{itemize}\n\\item Center, and often standardize, the feature matrix\n\\item Fit PCA and inspect explained variance\n\\item Choose enough components for the task\n\\item Project observations into the selected component space\n\\end{itemize}\n\n\\begin{card}{Rule of thumb}Keep components that explain useful structure, not necessarily every small source of variation.\\end{card}","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"rightBlocks":[{"mode":"placeholder","title":"Explained variance picture","content":"Image requested but automatic generation failed. Prompt: Educational slide graphic with a scree plot: descending blue bars labeled PC1, PC2, PC3, PC4, PC5 and a smooth elbow curve, plus a small inset 2D PCA projection scatter plot, white background, clean lecture style, minimal labels: Explained variance and PCA projection.\nReason: Unknown parameter: 'response_format'.","style":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"animation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}],"notesTitle":"Wrap-up","notesBody":"End by connecting the geometry to the workflow: PCA finds new axes, ranks them by variance, and lets us keep the first few. Mention limitations: components are linear combinations, can be hard to interpret, and may miss nonlinear structure.","titleStyle":{"fontScale":1,"fontFamily":"inherit","fontColor":"#111111","bulletType":"disc"},"titleAnimation":{"buildIn":"none","buildOut":"none","stepMode":"all","order":0}}]}</script>
<style>
:root{--deck-bg:#060a16;--deck-panel:rgba(10,16,32,.82);--deck-text:#eef3ff}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,#17214a 0%,var(--deck-bg) 45%,#070b17 100%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
body{color:var(--deck-text);overflow:hidden}
.deck{position:relative;width:100vw;height:100svh}
.deck-slide{display:none;position:absolute;inset:0;overflow:auto;padding:3.2rem 3.5rem 5rem;background:#fff;color:#111}
.deck-slide.active{display:block}
.deck-slide h1,.deck-slide h2{margin:0;line-height:1.05}
.deck-slide h1{font-size:calc(3.4rem * var(--title-scale,1));max-width:15ch}.deck-slide h2{font-size:calc(2.3rem * var(--title-scale,1));}
.kicker{margin-top:.8rem;color:rgba(17,17,17,.72);font-size:1.05rem;line-height:1.45;max-width:70ch}
.lede{margin-top:.9rem;color:rgba(17,17,17,.72);font-size:1.18rem;line-height:1.5;max-width:70ch}
.slide-body{margin-top:1.35rem}.deck-slide.single .slide-body{display:block}.deck-slide.two-col .slide-body{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:1.35rem;align-items:start}
.col{min-width:0}.col-stack{display:grid;gap:1rem}
.rich{display:grid;gap:1rem}
.rich p,.rich ul,.rich ol,.rich h3,.display-math,.bullet-card,.placeholder,.diag,.pseudo-block,.pseudo-latex-block,.custom-frame-wrap{margin:0;border:1px solid rgba(17,17,17,.12);border-radius:var(--radius,22px);background:rgba(127,127,127,.045);box-shadow:0 8px 24px rgba(0,0,0,.04)}
.rich p{color:rgba(17,17,17,.85);font-size:1.26rem;line-height:1.62;padding:1rem 1.15rem}
.rich ul,.rich ol{color:rgba(17,17,17,.85);font-size:1.22rem;line-height:1.58;padding:1rem 1.2rem 1rem 2.3rem}
.rich li{margin:.5rem 0;color:rgba(17,17,17,.85);font-size:1.22rem;line-height:1.58}
.rich h3{font-size:1.3rem;color:inherit;padding:.95rem 1.15rem}
.display-math{font-size:1.2rem;padding:1rem 1.15rem;overflow-x:auto}

function saveSurface(slideIndex){const svg=getDrawSurface(slideIndex);if(!svg)return;liveDrawAnnotations[slideIndex]=svg.innerHTML||'';persistLiveDrawAnnotations();}function collectAnimationFragments(target, stepMode){
  if(stepMode!=='by-item') return [target];
  const items=Array.from(target.querySelectorAll('.rich li, .rich p, .rich h3, .bullet-card, .display-math, .pseudo-block, .pseudo-latex-block, .placeholder'));
  return items.length ? items : [target];
}
function setAnimHidden(el, hidden){
  if(!el) return;
  el.classList.add('anim-frag');
  el.classList.toggle('anim-hidden', !!hidden);
}
function initializeSlideAnimations(slideEl){
  if(!slideEl) return;
  const targets=Array.from(slideEl.querySelectorAll('.preview-title, .preview-block, .figure-box, .figure-embed figure[data-figure-kind="image"]')).filter(el=>{
    const buildIn=el.dataset.buildIn || 'none';
    const buildOut=el.dataset.buildOut || 'none';
    const stepMode=el.dataset.stepMode || 'all';
    return buildIn !== 'none' || buildOut !== 'none' || stepMode === 'by-item';
  });
  const steps=[];
  targets.forEach((target, idx)=>{
    const buildIn=target.dataset.buildIn || 'none';
    const buildOut=target.dataset.buildOut || 'none';
    const stepMode=target.dataset.stepMode || 'all';
    const order=Number(target.dataset.animOrder || '0') || 0;
    const fragments=collectAnimationFragments(target, stepMode);
    if(stepMode==='by-item' || buildIn !== 'none'){
      fragments.forEach(f=>setAnimHidden(f, true));
      fragments.forEach((fragment, fragIdx)=>{
        steps.push({phase:'in', order, dom:idx, frag:fragIdx, target, fragment, kind:buildIn || 'appear'});
      });
    } else {
      fragments.forEach(f=>setAnimHidden(f, false));
    }
    if(buildOut !== 'none'){
      steps.push({phase:'out', order, dom:idx, frag:9999, target, kind:buildOut});
    }
  });
  steps.sort((a,b)=> (a.order-b.order) || ((a.phase==='in'?0:1)-(b.phase==='in'?0:1)) || (a.dom-b.dom) || (a.frag-b.frag));
  slideEl.__animSteps=steps;
  slideEl.__animIndex=0;
}
function advanceSlideAnimation(slideEl){
  if(!slideEl || !Array.isArray(slideEl.__animSteps)) return false;
  if(slideEl.__animIndex >= slideEl.__animSteps.length) return false;
  const step=slideEl.__animSteps[slideEl.__animIndex++];
  if(step.phase==='in'){
    setAnimHidden(step.fragment, false);
  }else if(step.phase==='out'){
    const frags=collectAnimationFragments(step.target, step.target.dataset.stepMode || 'all');
    frags.forEach(f=>setAnimHidden(f, true));
  }
  return true;
}
function activeSlideHasPendingAnimations(){
  const slide=slideEls[active];
  return !!(slide && Array.isArray(slide.__animSteps) && slide.__animIndex < slide.__animSteps.length);
}

function slidePoint(evt, svg){const pt=svg.createSVGPoint();pt.x=evt.clientX;pt.y=evt.clientY;const m=svg.getScreenCTM();return m?pt.matrixTransform(m.inverse()):{x:0,y:0};}
function beginShape(evt){if(!drawingMode || drawingSlideIndex!==active) return;const svg=getDrawSurface(active); if(!svg) return;const tool=drawTool.value;if(tool==='erase'){const hit=evt.target.closest('[data-draw-shape]');if(hit && svg.contains(hit)){ hit.remove(); saveSurface(active); }return;}evt.preventDefault();const p=slidePoint(evt, svg);drawingState.tool=tool; drawingState.drawing=true; drawingState.start=p; drawingState.el=null;let el=null;if(tool==='pen'){el=document.createElementNS('http://www.w3.org/2000/svg','polyline');el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);el.setAttribute('stroke-linecap','round');el.setAttribute('stroke-linejoin','round');el.setAttribute('points',p.x+','+p.y);}else if(tool==='line'){el=document.createElementNS('http://www.w3.org/2000/svg','line');el.setAttribute('x1',p.x);el.setAttribute('y1',p.y);el.setAttribute('x2',p.x);el.setAttribute('y2',p.y);el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);el.setAttribute('stroke-linecap','round');}else if(tool==='rect'){el=document.createElementNS('http://www.w3.org/2000/svg','rect');el.setAttribute('x',p.x);el.setAttribute('y',p.y);el.setAttribute('width',1);el.setAttribute('height',1);el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);}else if(tool==='ellipse'){el=document.createElementNS('http://www.w3.org/2000/svg','ellipse');el.setAttribute('cx',p.x);el.setAttribute('cy',p.y);el.setAttribute('rx',1);el.setAttribute('ry',1);el.setAttribute('fill','none');el.setAttribute('stroke',drawColor.value);el.setAttribute('stroke-width',drawWidth.value);}if(!el) return;el.setAttribute('data-draw-shape','1');svg.appendChild(el);drawingState.el=el;}
function updateShape(evt){if(!drawingState.drawing || drawingSlideIndex!==active) return;const svg=getDrawSurface(active); if(!svg || !drawingState.el) return;const p=slidePoint(evt, svg);const el=drawingState.el;if(drawingState.tool==='pen'){el.setAttribute('points',(el.getAttribute('points')||'')+' '+p.x+','+p.y);}else if(drawingState.tool==='line'){el.setAttribute('x2',p.x);el.setAttribute('y2',p.y);}else if(drawingState.tool==='rect'){const x=Math.min(drawingState.start.x,p.x),y=Math.min(drawingState.start.y,p.y),w=Math.abs(p.x-drawingState.start.x),h=Math.abs(p.y-drawingState.start.y);el.setAttribute('x',x);el.setAttribute('y',y);el.setAttribute('width',w);el.setAttribute('height',h);}else if(drawingState.tool==='ellipse'){el.setAttribute('cx',(drawingState.start.x+p.x)/2);el.setAttribute('cy',(drawingState.start.y+p.y)/2);el.setAttribute('rx',Math.abs(p.x-drawingState.start.x)/2);el.setAttribute('ry',Math.abs(p.y-drawingState.start.y)/2);}saveSurface(active);}
function endShape(){if(!drawingState.drawing) return; drawingState.drawing=false; drawingState.start=null; drawingState.el=null; saveSurface(active);}
function enterDrawingMode(slideIndex){if(!liveDrawEnabled) return; drawingMode=true; drawingSlideIndex=slideIndex; if(drawSessionToolbar) drawSessionToolbar.hidden=false; render(); hideLaserPointer();}
function exitDrawingMode(){drawingMode=false; drawingSlideIndex=-1; drawingState.drawing=false; drawingState.start=null; drawingState.el=null; if(drawSessionToolbar) drawSessionToolbar.hidden=true; render();}

function slideHasCustomHtml(slide){
  const s = normalizeSlide(slide);
  const all = [].concat(s.leftBlocks || [], s.rightBlocks || []);
  return all.some(block => String((block && block.mode) || 'panel') === 'custom');
}
function getEligiblePdfSlideIndices(){
  return (deckPayload.slides || []).map((slide, idx) => slideHasCustomHtml(slide) ? null : idx).filter(idx => idx !== null);
}
function getPdfLayout(slidesPerPage){
  const n = Number(slidesPerPage) || 1;
  if(n === 2) return { rows: 1, cols: 2 };
  if(n === 4) return { rows: 2, cols: 2 };
  if(n === 6) return { rows: 2, cols: 3 };
  return { rows: 1, cols: 1 };
}
function setPdfStatus(msg){ if(pdfStatus) pdfStatus.textContent = msg; }
function openPdfModal(){ if(pdfModal){ setPdfStatus('Ready.'); pdfModal.hidden = false; } }
function closePdfModal(){ if(pdfModal){ pdfModal.hidden = true; setPdfStatus('Ready.'); } }
async function ensurePdfLibraries(){
  const start = Date.now();
  while(Date.now() - start < 8000){
    if(window.html2canvas && window.jspdf && window.jspdf.jsPDF) return true;
    await new Promise(r => setTimeout(r, 100));
  }
  return false;
}
async function generatePdfFromSlides(slidesPerPage){
  if(drawingMode) exitDrawingMode();
  closePdfModal();
  const ok = await ensurePdfLibraries();
  if(!ok){ alert('PDF libraries did not load. Check your internet connection and try again.'); return; }

  const eligible = getEligiblePdfSlideIndices();
  if(!eligible.length){ alert('No slides are eligible for PDF export. Slides with custom HTML blocks are skipped.'); return; }

  renderLiveDrawAnnotations();
  if(window.MathJax && typeof window.MathJax.typesetPromise === 'function'){
    try{
      if(typeof window.MathJax.typesetClear === 'function') window.MathJax.typesetClear(slideEls);
      await window.MathJax.typesetPromise(slideEls);
    }catch(err){ console.error(err); }
  }

  const stage = document.createElement('div');
  stage.style.position = 'fixed';
  stage.style.left = '-20000px';
  stage.style.top = '0';
  stage.style.width = '1600px';
  stage.style.pointerEvents = 'none';
  stage.style.zIndex = '-1';
  document.body.appendChild(stage);

  const canvases = [];
  try{
    for(let i = 0; i < eligible.length; i += 1){
      const slideIndex = eligible[i];
      setPdfStatus('Rendering slide ' + (i + 1) + ' of ' + eligible.length + '…');
      const clone = slideEls[slideIndex].cloneNode(true);
      clone.classList.add('active');
      clone.style.display = 'block';
      clone.style.position = 'relative';
      clone.style.inset = 'auto';
      clone.style.width = '1600px';
      clone.style.height = '900px';
      clone.style.minHeight = '900px';
      clone.style.overflow = 'hidden';
      clone.querySelectorAll('.slide-actions,.slide-map,.deck-toolbar,.laser-pointer,.draw-session-toolbar,.pdf-modal').forEach(el => el.remove());
      clone.querySelectorAll('.slide-draw-surface').forEach(el => el.classList.remove('active'));
      stage.innerHTML = '';
      stage.appendChild(clone);
      if(window.MathJax && typeof window.MathJax.typesetPromise === 'function'){
        try{
          if(typeof window.MathJax.typesetClear === 'function') window.MathJax.typesetClear([clone]);
          await window.MathJax.typesetPromise([clone]);
        }catch(err){ console.error(err); }
      }
      const canvas = await window.html2canvas(clone, {backgroundColor:'#ffffff', scale:2, useCORS:true});
      canvases.push(canvas);
    }
  } finally {
    stage.remove();
  }

  setPdfStatus('Building PDF…');
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'pt', format:'letter', compress:true });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 18;
  const gap = 12;
  const layout = getPdfLayout(slidesPerPage);
  const cellW = (pageW - 2 * margin - (layout.cols - 1) * gap) / layout.cols;
  const cellH = (pageH - 2 * margin - (layout.rows - 1) * gap) / layout.rows;

  canvases.forEach((canvas, idx) => {
    if(idx > 0 && idx % (Number(slidesPerPage) || 1) === 0) doc.addPage('letter', 'landscape');
    const slot = idx % (Number(slidesPerPage) || 1);
    const row = Math.floor(slot / layout.cols);
    const col = slot % layout.cols;
    let drawW = cellW;
    let drawH = drawW * 9 / 16;
    if(drawH > cellH){
      drawH = cellH;
      drawW = drawH * 16 / 9;
    }
    const x = margin + col * (cellW + gap) + (cellW - drawW) / 2;
    const y = margin + row * (cellH + gap) + (cellH - drawH) / 2;
    doc.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', x, y, drawW, drawH, undefined, 'FAST');
  });

  const filename = ((deckPayload.deckTitle || 'presentation').replace(/[^w-]+/g,'_') || 'presentation') + '_' + String(slidesPerPage || 1) + 'up.pdf';
  doc.save(filename);
}
async function downloadAnnotatedSlides(){
  const payload=JSON.parse(document.getElementById('deck-source').textContent);
  payload.presentationOptions=payload.presentationOptions||{};
  payload.presentationOptions.exportControls=Object.assign({}, exportControls, { exportAnnotated:true });
  payload.presentationOptions.enableLiveDraw=!!(payload.presentationOptions.exportControls.draw||payload.presentationOptions.exportControls.exportAnnotated);
  payload.presentationOptions.seedAnnotations=JSON.parse(JSON.stringify(liveDrawAnnotations||{}));

  const escapedJson=JSON.stringify(payload).replace(/<\/script>/gi,'<\/script>');

  const clone=document.documentElement.cloneNode(true);
  const sourceNode=clone.querySelector('#deck-source');
  if(sourceNode) sourceNode.textContent=escapedJson;

  const liveToolbar=clone.querySelector('#drawSessionToolbar');
  if(liveToolbar) liveToolbar.hidden=true;

  clone.querySelectorAll('.slide-draw-surface').forEach((svg, idx)=>{
    const key=String(idx);
    const markup=(liveDrawAnnotations && (liveDrawAnnotations[key] ?? liveDrawAnnotations[idx])) || '';
    svg.innerHTML=String(markup || '');
    svg.classList.remove('active');
  });

  const text='<!DOCTYPE html>\n'+clone.outerHTML;
  const blob=new Blob([text],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=((payload.deckTitle||'annotated_presentation').replace(/[^w-]+/g,'_')||'annotated_presentation')+'_annotated.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function hideLaserPointer(){if(laserPointer)laserPointer.style.display='none';slideEls.forEach(el=>el.classList.remove('laser-active'));}
function updateLaserPointer(evt){if(!laserPointer || !slideEls[active] || laserPointerMode==='none'){ hideLaserPointer(); return; }const slide = slideEls[active];const mapOpen = !!(slideMap && slideMap.classList.contains('open'));if(drawingMode || mapOpen){ hideLaserPointer(); return; }const r = slide.getBoundingClientRect();const inside = evt.clientX >= r.left && evt.clientX <= r.right && evt.clientY >= r.top && evt.clientY <= r.bottom;if(!inside){ hideLaserPointer(); return; }slide.classList.add('laser-active');laserPointer.style.display='block';laserPointer.style.transform='translate('+evt.clientX+'px,'+evt.clientY+'px)';}
function render(){slideEls.forEach((el,i)=>{el.classList.toggle('active',i===active);if(i!==active) el.classList.remove('laser-active');});renderLiveDrawAnnotations();const initActive=()=>{initializeSlideAnimations(slideEls[active]);hideLaserPointer();fitFiguresIn(document);};if(window.MathJax&&typeof window.MathJax.typesetPromise==='function'){if(typeof window.MathJax.typesetClear==='function')window.MathJax.typesetClear(slideEls);window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).then(initActive).catch(initActive);}else{initActive();}}
function go(i){if(i<0||i>=slideEls.length)return;active=i;if(drawingMode) drawingSlideIndex=active;render();slideMap.classList.remove('open');}
function advanceOrGoNext(){ if(activeSlideHasPendingAnimations()){ advanceSlideAnimation(slideEls[active]); return; } go(active+1); }
document.getElementById('prevBtn').addEventListener('click',()=>go(active-1));
document.getElementById('nextBtn').addEventListener('click',()=>advanceOrGoNext());
document.getElementById('fullscreenBtn').addEventListener('click',()=>{schedulePresentationControlsFade();togglePresentationFullscreen();});
document.getElementById('closeMapBtn').addEventListener('click',()=>{slideMap.classList.remove('open');schedulePresentationControlsFade();});
document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click',()=>{slideMap.classList.add('open');holdPresentationControlsVisible();}));
if(exportControls.draw){
  document.querySelectorAll('.draw-button').forEach(btn=>btn.addEventListener('click',()=>{ if(drawingMode && drawingSlideIndex===active) exitDrawingMode(); else { enterDrawingMode(active); } }));
}
if(exportControls.exportAnnotated){
  document.querySelectorAll('.export-annotated-button').forEach(btn=>btn.addEventListener('click',downloadAnnotatedSlides));
}
document.querySelectorAll('.pdf-button').forEach(btn=>btn.addEventListener('click',openPdfModal));
if(pdfCancelBtn) pdfCancelBtn.addEventListener('click',closePdfModal);
if(pdfGenerateBtn) pdfGenerateBtn.addEventListener('click',()=>generatePdfFromSlides(Number(pdfSlidesPerPage && pdfSlidesPerPage.value || 4)));
document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click',()=>go(Number(btn.dataset.go))));
if(drawClearBtn) drawClearBtn.addEventListener('click',()=>{ const svg=getDrawSurface(active); if(svg){ svg.innerHTML=''; saveSurface(active); } });
if(drawExitBtn) drawExitBtn.addEventListener('click',()=>exitDrawingMode());
const touchAdvanceTap={time:0,x:0,y:0,slide:-1};
function isTouchSlideAdvanceEvent(evt){
  if(!evt) return false;
  if(evt.pointerType==='touch' || evt.pointerType==='pen') return true;
  if(evt.pointerType==='mouse') return false;
  return !!(navigator.maxTouchPoints>0 && window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
}
function maybeAdvanceFromSlidePointer(evt, activeSlide){
  if(!activeSlide || !activeSlide.contains(evt.target)) return;
  if(isTouchSlideAdvanceEvent(evt)){
    evt.preventDefault();
    updateLaserPointer(evt);
    const now=Date.now();
    const dx=evt.clientX-touchAdvanceTap.x;
    const dy=evt.clientY-touchAdvanceTap.y;
    const isDoubleTap=touchAdvanceTap.slide===active && (now-touchAdvanceTap.time)<520 && Math.sqrt(dx*dx+dy*dy)<48;
    touchAdvanceTap.time=now;
    touchAdvanceTap.x=evt.clientX;
    touchAdvanceTap.y=evt.clientY;
    touchAdvanceTap.slide=active;
    if(isDoubleTap){ touchAdvanceTap.time=0; advanceOrGoNext(); }
    return;
  }
  advanceOrGoNext();
}
deck.addEventListener('pointerdown',evt=>{
  schedulePresentationControlsFade();
  if(pdfModal && !pdfModal.hidden && evt.target===pdfModal) closePdfModal();
  if(drawingMode){
    const svg=getDrawSurface(active);
    if(!svg) return;
    const hitShape=evt.target.closest('[data-draw-shape]');
    if(drawTool.value==='erase' && hitShape){ beginShape(evt); return; }
    if(evt.target===svg) beginShape(evt);
    return;
  }
  if(slideMap.classList.contains('open')) return;
  if(evt.target.closest('.slide-actions') || evt.target.closest('.deck-toolbar') || evt.target.closest('.pdf-modal')) return;
  maybeAdvanceFromSlidePointer(evt, slideEls[active]);
});
window.addEventListener('pointermove',evt=>{ notePointerControlsActivity(evt); if(drawingMode && drawingState.drawing){ updateShape(evt); return; } updateLaserPointer(evt); });
window.addEventListener('pointerup',()=>endShape());
window.addEventListener('pointercancel',()=>endShape());
window.addEventListener('mousemove', evt=>{ notePointerControlsActivity(evt); updateLaserPointer(evt); });
window.addEventListener('mouseleave', hideLaserPointer);
window.addEventListener('blur', ()=>{ endShape(); hideLaserPointer(); });
slideMap.addEventListener('mouseenter', hideLaserPointer);
document.querySelectorAll('.deck-slide').forEach(slide=>slide.addEventListener('mouseleave', ()=>{ if(!drawingMode) hideLaserPointer(); }));
window.addEventListener('keydown',e=>{schedulePresentationControlsFade();if(isFullscreenShortcut(e)){e.preventDefault();togglePresentationFullscreen();return;}if(e.key==='Escape' && drawingMode){ e.preventDefault(); exitDrawingMode(); return; }if(e.key==='Escape' && pdfModal && !pdfModal.hidden){ e.preventDefault(); closePdfModal(); return; }if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();advanceOrGoNext();}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(active-1);}if(e.key==='Escape'){ slideMap.classList.remove('open');releasePresentationControls();}});['.deck-toolbar','.slide-actions','.draw-session-toolbar'].forEach(sel=>{const el=document.querySelector(sel);if(!el)return;el.addEventListener('mouseenter',holdPresentationControlsVisible);el.addEventListener('mouseleave',releasePresentationControls);el.addEventListener('focusin',holdPresentationControlsVisible);el.addEventListener('focusout',releasePresentationControls);});render();schedulePresentationControlsFade();
