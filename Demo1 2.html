<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minute Timer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .controls {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      font-size: 1.4rem;
      padding: 10px 14px;
      width: 120px;
      text-align: center;
      border: 1px solid #bbb;
      border-radius: 10px;
    }

    button {
      font-size: 1.05rem;
      padding: 10px 16px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    #timer {
      font-size: 24vw;
      font-weight: bold;
      line-height: 0.9;
      user-select: none;
    }

    #label {
      font-size: 2rem;
      margin-top: 12px;
      text-align: center;
    }

    @media (max-width: 700px) {
      #label {
        font-size: 1.4rem;
      }

      input {
        width: 95px;
        font-size: 1.1rem;
      }

      button {
        font-size: 0.95rem;
        padding: 9px 13px;
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <input id="minutesInput" type="number" min="1" step="1" value="5" />
    <button id="startBtn">Start</button>
    <button id="pauseBtn" disabled>Pause</button>
    <button id="resumeBtn" disabled>Resume</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="timer">5</div>
  <div id="label">minutes left</div>

  <script>
    const inputEl = document.getElementById("minutesInput");
    const timerEl = document.getElementById("timer");
    const labelEl = document.getElementById("label");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const resetBtn = document.getElementById("resetBtn");

    let interval = null;
    let endTime = null;
    let remainingMs = 0;
    let originalMinutes = parseInt(inputEl.value, 10) || 5;
    let isRunning = false;
    let isPaused = false;

    function setButtons() {
      startBtn.disabled = isRunning;
      pauseBtn.disabled = !isRunning;
      resumeBtn.disabled = !isPaused;
    }

    function updateDisplay(msLeft) {
      const minutesLeft = Math.max(0, Math.ceil(msLeft / 60000));
      timerEl.textContent = minutesLeft;
      labelEl.textContent = minutesLeft === 1 ? "minute left" : "minutes left";
    }

    function startTimer() {
      const minutes = parseInt(inputEl.value, 10);
      if (isNaN(minutes) || minutes <= 0) {
        alert("Please enter a valid number of minutes.");
        return;
      }

      clearInterval(interval);

      originalMinutes = minutes;
      remainingMs = minutes * 60000;
      endTime = Date.now() + remainingMs;
      isRunning = true;
      isPaused = false;
      setButtons();
      updateDisplay(remainingMs);

      interval = setInterval(() => {
        remainingMs = endTime - Date.now();

        if (remainingMs <= 0) {
          clearInterval(interval);
          interval = null;
          remainingMs = 0;
          isRunning = false;
          isPaused = false;
          timerEl.textContent = "0";
          labelEl.textContent = "Time is up!";
          setButtons();
          return;
        }

        updateDisplay(remainingMs);
      }, 250);
    }

    function pauseTimer() {
      if (!isRunning) return;

      clearInterval(interval);
      interval = null;
      remainingMs = Math.max(0, endTime - Date.now());
      isRunning = false;
      isPaused = true;
      labelEl.textContent = "Paused";
      setButtons();
    }

    function resumeTimer() {
      if (!isPaused || remainingMs <= 0) return;

      endTime = Date.now() + remainingMs;
      isRunning = true;
      isPaused = false;
      setButtons();
      updateDisplay(remainingMs);

      interval = setInterval(() => {
        remainingMs = endTime - Date.now();

        if (remainingMs <= 0) {
          clearInterval(interval);
          interval = null;
          remainingMs = 0;
          isRunning = false;
          isPaused = false;
          timerEl.textContent = "0";
          labelEl.textContent = "Time is up!";
          setButtons();
          return;
        }

        updateDisplay(remainingMs);
      }, 250);
    }

    function resetTimer() {
      clearInterval(interval);
      interval = null;
      isRunning = false;
      isPaused = false;

      const minutes = parseInt(inputEl.value, 10);
      originalMinutes = (!isNaN(minutes) && minutes > 0) ? minutes : originalMinutes;
      remainingMs = originalMinutes * 60000;

      updateDisplay(remainingMs);
      setButtons();
    }

    inputEl.addEventListener("input", () => {
      if (!isRunning && !isPaused) {
        const minutes = parseInt(inputEl.value, 10);
        if (!isNaN(minutes) && minutes > 0) {
          originalMinutes = minutes;
          updateDisplay(minutes * 60000);
        }
      }
    });

    startBtn.addEventListener("click", startTimer);
    pauseBtn.addEventListener("click", pauseTimer);
    resumeBtn.addEventListener("click", resumeTimer);
    resetBtn.addEventListener("click", resetTimer);

    updateDisplay(originalMinutes * 60000);
    setButtons();
  </script>
</body>
</html>
