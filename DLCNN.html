<script id="deck-source" type="application/json">{"deckTitle":"Deep Learning 2","slides":[{"slideType":"title-center","headingLevel":"h2","bgColor":"#ffffff","fontColor":"#111111","title":"Deep Learning: Backprop","kicker":"","lede":"Depth Helps","leftBlocks":[{"mode":"panel","title":"","content":"UL: A wide enough single hidden layer Neural Network can approximate almost any function from input to output\nUL: But depth can exponentially reduce required depth \n"},{"mode":"pseudocode-latex","title":"","content":"                       Demo"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Deep Learning","kicker":"","lede":"Depth Helps","leftBlocks":[{"mode":"panel","title":"","content":"UL: A wide enough single hidden layer Neural Network can approximate almost any function from input to output\nUL: But depth can exponentially reduce required depth \n"},{"mode":"pseudocode-latex","title":"","content":"                       Demo"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Stochastic Gradient Descent","kicker":"","lede":"","leftBlocks":[{"mode":"pseudocode-latex","title":"","content":"Input: dataset \\(D = \\{(x_i,y_i)\\}_{i=1}^n\\), batch size \\(B\\), epochs \\(E\\), step size \\(\\eta\\)\nParameters: \\(\\theta = [W^1, b^1, \\ldots, W^T,b^T]\\)\n\nfor \\(e = 1\\) to \\(E\\) do\n  randomly shuffle the dataset\n  split the shuffled data into \\(n/B\\) mini-batches \\(\\mathcal{D}_1, \\dots, \\mathcal{D}_{n/B}\\)\n\n  for \\(j = 1\\) to \\(n/B\\) do\n    \\(g \\leftarrow \\frac{1}{B}\\sum_{(x,y)\\in\\mathcal{D}_j}\\nabla_\\theta \\ell(h_\\theta(x), y)\\)\n    \\(\\theta \\leftarrow \\theta - \\eta g\\)\n  end\nend\n\nreturn \\(\\theta\\)"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":" Backpropagation","kicker":"","lede":"","leftBlocks":[{"mode":"custom","title":"","content":"<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>Backpropagation on a 2×3×1 Network</title>\n\n  <script>\n    window.MathJax = {\n      tex: {\n        inlineMath: [['\\\\(','\\\\)'], ['$', '$']],\n        displayMath: [['\\\\[','\\\\]']]\n      },\n      options: {\n        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'svg', 'text']\n      },\n      chtml: {\n        scale: 0.95\n      }\n    };\n  <\/script>\n  <script defer src=\"https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js\"><\/script>\n\n  <style>\n    :root{\n      --edge:#777777;\n      --forward:#2f6fed;\n      --backward:#d97706;\n      --loss:#cc0033;\n      --linear:#1f8f46;\n    }\n    *{box-sizing:border-box}\n    body{\n      margin:0;\n      font-family: Arial, Helvetica, sans-serif;\n      background:#ffffff;\n      color:#000000;\n    }\n    .wrap{\n      max-width:1500px;\n      margin:0 auto;\n      padding:22px;\n    }\n    .top{\n      display:flex;\n      align-items:center;\n      justify-content:space-between;\n      gap:16px;\n      flex-wrap:wrap;\n      margin-bottom:16px;\n    }\n    .controls{\n      display:flex;\n      gap:10px;\n      flex-wrap:wrap;\n      align-items:center;\n    }\n    button{\n      border:1.5px solid #000000;\n      border-radius:10px;\n      padding:10px 16px;\n      cursor:pointer;\n      color:#000000;\n      background:#ffffff;\n      font-size:15px;\n      transition:transform .15s ease, opacity .15s ease, background .2s ease;\n    }\n    button:hover{transform:translateY(-1px); background:#f3f3f3;}\n    button:active{transform:translateY(1px)}\n    .badge{\n      padding:8px 12px;\n      border-radius:999px;\n      background:#ffffff;\n      border:1.5px solid #000000;\n      font-weight:700;\n      color:#000000;\n    }\n    .layout{\n      display:grid;\n      grid-template-columns:1.55fr 1fr;\n      gap:18px;\n    }\n    .card{\n      background:#ffffff;\n      border:1.5px solid #000000;\n      border-radius:16px;\n      padding:16px;\n      box-shadow:none;\n    }\n    #networkCard{min-height:720px}\n    svg{width:100%; height:690px; display:block; background:#ffffff;}\n    .node circle{\n      fill:#ffffff;\n      stroke:#000000;\n      stroke-width:2.2;\n      transition:all .25s ease;\n    }\n    .node .title{\n      fill:#000000;\n      font-size:28px;\n      font-weight:700;\n      text-anchor:middle;\n      dominant-baseline:middle;\n      font-family: Arial, Helvetica, sans-serif;\n    }\n    .node.forward circle{\n      stroke:var(--forward);\n      stroke-width:4;\n    }\n    .node.backward circle{\n      stroke:var(--backward);\n      stroke-width:4;\n    }\n    .node.linear circle{\n      stroke:var(--linear);\n      stroke-width:4;\n    }\n    .node.loss circle{\n      stroke:var(--loss);\n      stroke-width:4;\n    }\n    .edge{\n      stroke:var(--edge);\n      stroke-width:3;\n      opacity:.9;\n      transition:all .25s ease;\n    }\n    .edge.forward{\n      stroke:var(--forward);\n      stroke-width:5;\n      opacity:1;\n    }\n    .edge.backward{\n      stroke:var(--backward);\n      stroke-width:5;\n      opacity:1;\n    }\n    .label{\n      fill:#000000;\n      font-size:22px;\n      text-anchor:middle;\n      font-family: Arial, Helvetica, sans-serif;\n    }\n    .grad{\n      display:none;\n    }\n    .grad.show{display:none;}\n    .panelTitle{\n      margin:0 0 8px;\n      font-size:24px;\n      color:#000000;\n    }\n    .explain{\n      line-height:1.6;\n      font-size:16px;\n      color:#000000;\n    }\n    .formula{\n      margin-top:12px;\n      padding:14px 16px;\n      border-radius:12px;\n      background:#ffffff;\n      border:1.5px solid #000000;\n      line-height:1.7;\n      min-height:260px;\n      color:#000000;\n      overflow-x:auto;\n      font-size:18px;\n    }\n    .note{\n      margin-top:12px;\n      padding:11px 12px;\n      border-radius:12px;\n      background:#ffffff;\n      border:1.5px solid #000000;\n      color:#000000;\n      line-height:1.5;\n      font-size:14px;\n    }\n    .legend{\n      display:flex;\n      flex-wrap:wrap;\n      gap:14px 18px;\n      margin-top:0px;\n      color:#000000;\n      font-size:14px;\n    }\n    .matrixFigure{\n      margin-top:10px;\n      padding:12px;\n      border:1.5px solid #000000;\n      border-radius:12px;\n      background:#ffffff;\n      display:flex;\n      align-items:center;\n      justify-content:center;\n      gap:10px;\n      flex-wrap:nowrap;\n      white-space:nowrap;\n      overflow-x:auto;\n    }\n    .matrixNode{\n      min-width:auto;\n      padding:10px 14px;\n      border:1.5px solid #000000;\n      border-radius:14px;\n      background:#ffffff;\n      text-align:center;\n      font-size:17px;\n      line-height:1.25;\n      flex:0 0 auto;\n    }\n    .matrixArrow{\n      font-size:24px;\n      font-weight:700;\n      line-height:1;\n      flex:0 0 auto;\n    }\n    .equationBox{\n      margin-top:16px;\n      padding:16px 18px;\n      border:1.5px solid #000000;\n      border-radius:12px;\n      background:#ffffff;\n      min-height:110px;\n      display:flex;\n      align-items:center;\n      justify-content:center;\n      overflow-x:auto;\n    }\n    .matrixFigure mjx-container,\n    .equationBox mjx-container{\n      font-size: 110% !important;\n    }\n    .equationBox mjx-container[display=\"true\"]{\n      margin:0 !important;\n    }\n    .legendItem{display:flex; align-items:center; gap:8px;}\n    .dot{\n      width:12px;height:12px;border-radius:999px;display:inline-block;\n    }\n    .tiny{font-size:15px;color:#000000}\n\n    mjx-container { font-size: 100% !important; }\n    .formula mjx-container[display=\"true\"] { margin: 0.5em 0 !important; }\n    .explain mjx-container, .note mjx-container {\n      font-size: 1em !important;\n    }\n\n    @media (max-width:1100px){\n      .layout{grid-template-columns:1fr}\n      svg{height:660px}\n      .matrixFigure{\n        justify-content:flex-start;\n      }\n    }\n  </style>\n</head>\n<body>\n<div class=\"wrap\">\n  <div class=\"top\">\n    <div class=\"controls\">\n      <button id=\"prevBtn\">◀ Prev</button>\n      <button id=\"nextBtn\">Next ▶</button>\n      <button id=\"resetBtn\">Reset</button>\n      <span class=\"badge\" id=\"stepBadge\">Step 1 / 12</span>\n    </div>\n    <div class=\"tiny\">Keyboard shortcuts: ← →</div>\n  </div>\n\n  <div class=\"layout\">\n    <div class=\"card\" id=\"networkCard\">\n      <svg viewBox=\"0 0 1100 690\">\n        <text x=\"90\" y=\"40\" fill=\"#000000\" font-size=\"26\" font-weight=\"700\">Inputs</text>\n        <text x=\"420\" y=\"40\" fill=\"#000000\" font-size=\"26\" font-weight=\"700\" text-anchor=\"middle\">Hidden linear nodes</text>\n        <text x=\"650\" y=\"40\" fill=\"#000000\" font-size=\"26\" font-weight=\"700\" text-anchor=\"middle\">Hidden activations</text>\n        <text x=\"895\" y=\"40\" fill=\"#000000\" font-size=\"26\" font-weight=\"700\" text-anchor=\"middle\">Output</text>\n\n        <line id=\"e_x1_z1\" class=\"edge\" x1=\"120\" y1=\"170\" x2=\"360\" y2=\"120\"></line>\n        <line id=\"e_x1_z2\" class=\"edge\" x1=\"120\" y1=\"170\" x2=\"360\" y2=\"280\"></line>\n        <line id=\"e_x1_z3\" class=\"edge\" x1=\"120\" y1=\"170\" x2=\"360\" y2=\"440\"></line>\n        <line id=\"e_x2_z1\" class=\"edge\" x1=\"120\" y1=\"340\" x2=\"360\" y2=\"120\"></line>\n        <line id=\"e_x2_z2\" class=\"edge\" x1=\"120\" y1=\"340\" x2=\"360\" y2=\"280\"></line>\n        <line id=\"e_x2_z3\" class=\"edge\" x1=\"120\" y1=\"340\" x2=\"360\" y2=\"440\"></line>\n\n        <line id=\"e_z1_a1\" class=\"edge\" x1=\"420\" y1=\"120\" x2=\"590\" y2=\"120\"></line>\n        <line id=\"e_z2_a2\" class=\"edge\" x1=\"420\" y1=\"280\" x2=\"590\" y2=\"280\"></line>\n        <line id=\"e_z3_a3\" class=\"edge\" x1=\"420\" y1=\"440\" x2=\"590\" y2=\"440\"></line>\n\n        <line id=\"e_a1_z2out\" class=\"edge\" x1=\"650\" y1=\"120\" x2=\"857.4\" y2=\"227.9\"></line>\n        <line id=\"e_a2_z2out\" class=\"edge\" x1=\"650\" y1=\"280\" x2=\"852.3\" y2=\"255.7\"></line>\n        <line id=\"e_a3_z2out\" class=\"edge\" x1=\"650\" y1=\"440\" x2=\"861.8\" y2=\"279.0\"></line>\n\n        <line id=\"e_z2out_yhat\" class=\"edge\" x1=\"900\" y1=\"250\" x2=\"900\" y2=\"390\"></line>\n        <text class=\"label\" x=\"940\" y=\"330\">σ</text>\n        <line id=\"e_yhat_L\" class=\"edge\" x1=\"900\" y1=\"450\" x2=\"900\" y2=\"590\"></line>\n\n        <text class=\"label\" x=\"240\" y=\"118\">W¹₁,₁</text>\n        <text class=\"label\" x=\"245\" y=\"210\">W¹₁,₂</text>\n        <text class=\"label\" x=\"245\" y=\"304\">W¹₁,₃</text>\n        <text class=\"label\" x=\"245\" y=\"205\">W¹₂,₁</text>\n        <text class=\"label\" x=\"245\" y=\"330\">W¹₂,₂</text>\n        <text class=\"label\" x=\"245\" y=\"408\">W¹₂,₃</text>\n\n        <text class=\"label\" x=\"505\" y=\"105\">σ</text>\n        <text class=\"label\" x=\"505\" y=\"265\">σ</text>\n        <text class=\"label\" x=\"505\" y=\"425\">σ</text>\n\n        <text class=\"label\" x=\"745\" y=\"148\">W²₁</text>\n        <text class=\"label\" x=\"740\" y=\"268\">W²₂</text>\n        <text class=\"label\" x=\"745\" y=\"420\">W²₃</text>\n\n        <text class=\"label\" x=\"390\" y=\"65\">+ b¹₁</text>\n        <text class=\"label\" x=\"390\" y=\"225\">+ b¹₂</text>\n        <text class=\"label\" x=\"390\" y=\"385\">+ b¹₃</text>\n        <text class=\"label\" x=\"955\" y=\"245\">+ b²</text>\n        <text class=\"label\" x=\"965\" y=\"522\">y</text>\n\n        <text id=\"g_yhat_L\" class=\"grad\" x=\"980\" y=\"520\"></text>\n        <text id=\"g_z2out_yhat\" class=\"grad\" x=\"980\" y=\"335\"></text>\n\n        <text id=\"g_a1_z2out\" class=\"grad\" x=\"765\" y=\"120\"></text>\n        <text id=\"g_a2_z2out\" class=\"grad\" x=\"750\" y=\"250\"></text>\n        <text id=\"g_a3_z2out\" class=\"grad\" x=\"765\" y=\"452\"></text>\n\n        <text id=\"g_z1_a1\" class=\"grad\" x=\"505\" y=\"98\"></text>\n        <text id=\"g_z2_a2\" class=\"grad\" x=\"505\" y=\"258\"></text>\n        <text id=\"g_z3_a3\" class=\"grad\" x=\"505\" y=\"418\"></text>\n\n        <text id=\"g_x1_z1\" class=\"grad\" x=\"255\" y=\"96\"></text>\n        <text id=\"g_x2_z1\" class=\"grad\" x=\"250\" y=\"170\"></text>\n        <text id=\"g_x1_z2\" class=\"grad\" x=\"260\" y=\"242\"></text>\n        <text id=\"g_x2_z2\" class=\"grad\" x=\"255\" y=\"315\"></text>\n        <text id=\"g_x1_z3\" class=\"grad\" x=\"260\" y=\"398\"></text>\n        <text id=\"g_x2_z3\" class=\"grad\" x=\"255\" y=\"468\"></text>\n\n        <g id=\"x1\" class=\"node\">\n          <circle cx=\"80\" cy=\"170\" r=\"42\"></circle>\n          <text class=\"title\" x=\"80\" y=\"170\">x₁</text>\n        </g>\n        <g id=\"x2\" class=\"node\">\n          <circle cx=\"80\" cy=\"340\" r=\"42\"></circle>\n          <text class=\"title\" x=\"80\" y=\"340\">x₂</text>\n        </g>\n        <g id=\"z1\" class=\"node\">\n          <circle cx=\"390\" cy=\"120\" r=\"40\"></circle>\n          <text class=\"title\" x=\"390\" y=\"120\">z¹₁</text>\n        </g>\n        <g id=\"z2\" class=\"node\">\n          <circle cx=\"390\" cy=\"280\" r=\"40\"></circle>\n          <text class=\"title\" x=\"390\" y=\"280\">z¹₂</text>\n        </g>\n        <g id=\"z3\" class=\"node\">\n          <circle cx=\"390\" cy=\"440\" r=\"40\"></circle>\n          <text class=\"title\" x=\"390\" y=\"440\">z¹₃</text>\n        </g>\n        <g id=\"a1\" class=\"node\">\n          <circle cx=\"620\" cy=\"120\" r=\"40\"></circle>\n          <text class=\"title\" x=\"620\" y=\"120\">a₁</text>\n        </g>\n        <g id=\"a2\" class=\"node\">\n          <circle cx=\"620\" cy=\"280\" r=\"40\"></circle>\n          <text class=\"title\" x=\"620\" y=\"280\">a₂</text>\n        </g>\n        <g id=\"a3\" class=\"node\">\n          <circle cx=\"620\" cy=\"440\" r=\"40\"></circle>\n          <text class=\"title\" x=\"620\" y=\"440\">a₃</text>\n        </g>\n        <g id=\"z2out\" class=\"node\">\n          <circle cx=\"900\" cy=\"250\" r=\"48\"></circle>\n          <text class=\"title\" x=\"900\" y=\"250\">z²</text>\n        </g>\n        <g id=\"yhat\" class=\"node\">\n          <circle cx=\"900\" cy=\"420\" r=\"48\"></circle>\n          <text class=\"title\" x=\"900\" y=\"420\">ŷ</text>\n        </g>\n        <g id=\"loss\" class=\"node\">\n          <circle cx=\"900\" cy=\"620\" r=\"48\"></circle>\n          <text class=\"title\" x=\"900\" y=\"620\">L(ŷ, y)</text>\n        </g>\n      </svg>\n\n      <div class=\"legend\">\n        <div class=\"legendItem\"><span class=\"dot\" style=\"background:#1f8f46\"></span> linear combination node</div>\n        <div class=\"legendItem\"><span class=\"dot\" style=\"background:#2f6fed\"></span> forward computation</div>\n        <div class=\"legendItem\"><span class=\"dot\" style=\"background:#d97706\"></span> backward gradient flow</div>\n        <div class=\"legendItem\"><span class=\"dot\" style=\"background:#cc0033\"></span> loss</div>\n      </div>\n      <div class=\"matrixFigure\">\n        <div class=\"matrixNode\">\\(\\mathbf{x}\\)</div>\n        <div class=\"matrixArrow\">→</div>\n        <div class=\"matrixNode\">\\(\\mathbf{z}^{1} = W\\mathbf{x} + \\mathbf{b}^{1}\\)</div>\n        <div class=\"matrixArrow\">→</div>\n        <div class=\"matrixNode\">\\(\\mathbf{a} = \\sigma(\\mathbf{z}^{1})\\)</div>\n        <div class=\"matrixArrow\">→</div>\n        <div class=\"matrixNode\">\\(z^{2} = W^{2}\\mathbf{a} + b^{2}\\)</div>\n        <div class=\"matrixArrow\">→</div>\n        <div class=\"matrixNode\">\\(\\hat{y} = \\sigma(z^{2})\\)</div>\n      </div>\n    </div>\n\n    <div class=\"card\">\n      <h2 class=\"panelTitle\" id=\"panelTitle\">Step 1: Structure</h2>\n      <div class=\"explain\" id=\"explain\"></div>\n      <div class=\"formula\" id=\"formula\"></div>\n      <div class=\"note\" id=\"noteBox\" style=\"display:none;\"></div>\n      <div class=\"equationBox\">\n        \\[\n        \\hat{y}\n        =\n        \\sigma\\!\\left(W^{2}\\mathbf{a} + b^{2}\\right)\n        =\n        \\sigma\\!\\left(W^{2}\\sigma\\!\\left(W^{1}\\mathbf{x} + \\mathbf{b}^{1}\\right) + b^{2}\\right)\n        \\]\n      </div>\n    </div>\n  </div>\n</div>\n\n<script>\n  const $ = (id) => document.getElementById(id);\n\n  const allNodes = [\"x1\",\"x2\",\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\",\"z2out\",\"yhat\",\"loss\"];\n  const linearNodes = [\"z1\",\"z2\",\"z3\",\"z2out\"];\n  const allEdges = [\n    \"e_x1_z1\",\"e_x1_z2\",\"e_x1_z3\",\"e_x2_z1\",\"e_x2_z2\",\"e_x2_z3\",\n    \"e_z1_a1\",\"e_z2_a2\",\"e_z3_a3\",\n    \"e_a1_z2out\",\"e_a2_z2out\",\"e_a3_z2out\",\n    \"e_z2out_yhat\",\"e_yhat_L\"\n  ];\n  const gradIds = [\n    \"g_yhat_L\",\"g_z2out_yhat\",\"g_a1_z2out\",\"g_a2_z2out\",\"g_a3_z2out\",\"g_z1_a1\",\"g_z2_a2\",\"g_z3_a3\",\n    \"g_x1_z1\",\"g_x2_z1\",\"g_x1_z2\",\"g_x2_z2\",\"g_x1_z3\",\"g_x2_z3\"\n  ];\n\n  const steps = [\n    {\n      title:\"Step 1: Structure\",\n      explain:`The hidden layer is written using linear nodes \\\\(z^1_j\\\\) and activation nodes \\\\(a_j=\\\\sigma(z^1_j)\\\\). The output layer is written as a linear node \\\\(z^2\\\\) followed by the prediction \\\\(\\\\hat y=\\\\sigma(z^2)\\\\).`,\n      formula:String.raw`\\[\n\\begin{aligned}\nz^1_j &= W^1_{1,j}x_1 + W^1_{2,j}x_2 + b^1_j, \\qquad j=1,2,3,\\\\\na_j &= \\sigma(z^1_j),\\\\\nz^2 &= W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2,\\\\\n\\hat y &= \\sigma(z^2),\\\\\nL &= \\frac12(\\hat y-y)^2.\n\\end{aligned}\n\\]`,\n      note:`This notation shows exactly where the layer-1 parameters, layer-2 parameters, and activation derivatives enter.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"x1\",\"x2\",\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\",\"z2out\",\"yhat\",\"loss\"],\n      forwardEdges:[\"e_x1_z1\",\"e_x1_z2\",\"e_x1_z3\",\"e_x2_z1\",\"e_x2_z2\",\"e_x2_z3\",\"e_z1_a1\",\"e_z2_a2\",\"e_z3_a3\",\"e_a1_z2out\",\"e_a2_z2out\",\"e_a3_z2out\",\"e_z2out_yhat\",\"e_yhat_L\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 2: Hidden linear outputs\",\n      explain:`First compute the hidden linear outputs. These are affine combinations of the inputs using the first-layer weights and biases.`,\n      formula:String.raw`\\[\n\\begin{aligned}\nz^1_1 &= W^1_{1,1}x_1 + W^1_{2,1}x_2 + b^1_1,\\\\\nz^1_2 &= W^1_{1,2}x_1 + W^1_{2,2}x_2 + b^1_2,\\\\\nz^1_3 &= W^1_{1,3}x_1 + W^1_{2,3}x_2 + b^1_3.\n\\end{aligned}\n\\]`,\n      note:`These nodes are purely linear; the nonlinearity has not yet been applied.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"x1\",\"x2\",\"z1\",\"z2\",\"z3\"],\n      forwardEdges:[\"e_x1_z1\",\"e_x1_z2\",\"e_x1_z3\",\"e_x2_z1\",\"e_x2_z2\",\"e_x2_z3\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 3: Hidden activations\",\n      explain:`Now apply the activation \\\\(\\\\sigma\\\\) to each hidden linear node.`,\n      formula:String.raw`\\[\n\\begin{aligned}\na_1 &= \\sigma(z^1_1),\\\\\na_2 &= \\sigma(z^1_2),\\\\\na_3 &= \\sigma(z^1_3).\n\\end{aligned}\n\\]`,\n      note:`Later, when the gradient crosses from \\\\(a_j\\\\) back to \\\\(z^1_j\\\\), it multiplies by \\\\(\\\\sigma'(z^1_j)\\\\).`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\"],\n      forwardEdges:[\"e_z1_a1\",\"e_z2_a2\",\"e_z3_a3\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 4: Output linear node\",\n      explain:`The output layer first forms the linear quantity \\\\(z^2\\\\) from the hidden activations.`,\n      formula:String.raw`\\[\n\\begin{aligned}\nz^2 &= W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2\\\\\n    &= W^2_1\\sigma(z^1_1) + W^2_2\\sigma(z^1_2) + W^2_3\\sigma(z^1_3) + b^2.\n\\end{aligned}\n\\]`,\n      note:`This is the pre-activation of the output unit.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"a1\",\"a2\",\"a3\",\"z2out\"],\n      forwardEdges:[\"e_a1_z2out\",\"e_a2_z2out\",\"e_a3_z2out\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 5: Prediction node\",\n      explain:`Now apply the output activation.`,\n      formula:String.raw`\\[\n\\hat y = \\sigma(z^2).\n\\]`,\n      note:`This means the backward pass must also cross the output activation edge and pick up \\\\(\\\\sigma'(z^2)\\\\).`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"z2out\",\"yhat\"],\n      forwardEdges:[\"e_z2out_yhat\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 6: Loss\",\n      explain:`Use squared error loss for one example.`,\n      formula:String.raw`\\[\nL = \\frac12(\\hat y-y)^2.\n\\]`,\n      note:`Backpropagation starts here.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"yhat\",\"loss\"],\n      forwardEdges:[\"e_yhat_L\"],\n      backwardNodes:[],\n      backwardEdges:[],\n      grads:{}\n    },\n    {\n      title:\"Step 7: Gradient at the prediction\",\n      explain:`Differentiate the loss with respect to the prediction.`,\n      formula:String.raw`\\[\n\\frac{\\partial L}{\\partial \\hat y} = \\hat y - y.\n\\]`,\n      note:`This is the first upstream gradient.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[],\n      backwardNodes:[\"yhat\",\"loss\"],\n      backwardEdges:[\"e_yhat_L\"],\n      grads:{ g_yhat_L:\"∂L/∂ŷ = ŷ - y\" }\n    },\n    {\n      title:\"Step 8: Cross the output activation\",\n      explain:`Since \\\\(\\\\hat y=\\\\sigma(z^2)\\\\), the gradient picks up the derivative of the output activation.`,\n      formula:String.raw`\\[\n\\frac{\\partial L}{\\partial z^2}\n=\n\\frac{\\partial L}{\\partial \\hat y}\n\\frac{\\partial \\hat y}{\\partial z^2}\n=\n(\\hat y-y)\\sigma'(z^2).\n\\]`,\n      note:`This is the correct replacement for the earlier identity step.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[],\n      backwardNodes:[\"z2out\",\"yhat\"],\n      backwardEdges:[\"e_z2out_yhat\"],\n      grads:{ g_z2out_yhat:\"× σ′(z²)\" }\n    },\n    {\n      title:\"Step 9: Second-layer gradients and messages to hidden activations\",\n      explain:`Now use \\\\(z^2 = W^2_1 a_1 + W^2_2 a_2 + W^2_3 a_3 + b^2\\\\) to compute the layer-2 parameter gradients and the gradients arriving at the hidden activations.`,\n      formula:String.raw`\\[\n\\begin{aligned}\n\\frac{\\partial L}{\\partial W^2_1} &= \\frac{\\partial L}{\\partial z^2}\\frac{\\partial z^2}{\\partial W^2_1}\n= (\\hat y-y)\\sigma'(z^2)a_1,\\\\\n\\frac{\\partial L}{\\partial W^2_2} &= (\\hat y-y)\\sigma'(z^2)a_2,\\\\\n\\frac{\\partial L}{\\partial W^2_3} &= (\\hat y-y)\\sigma'(z^2)a_3,\\\\\n\\frac{\\partial L}{\\partial b^2} &= (\\hat y-y)\\sigma'(z^2),\\\\[4pt]\n\\frac{\\partial L}{\\partial a_1} &= \\frac{\\partial L}{\\partial z^2}\\frac{\\partial z^2}{\\partial a_1}\n= (\\hat y-y)\\sigma'(z^2)W^2_1,\\\\\n\\frac{\\partial L}{\\partial a_2} &= (\\hat y-y)\\sigma'(z^2)W^2_2,\\\\\n\\frac{\\partial L}{\\partial a_3} &= (\\hat y-y)\\sigma'(z^2)W^2_3.\n\\end{aligned}\n\\]`,\n      note:`These are the backward messages arriving at the hidden activation nodes.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[],\n      backwardNodes:[\"a1\",\"a2\",\"a3\",\"z2out\"],\n      backwardEdges:[\"e_a1_z2out\",\"e_a2_z2out\",\"e_a3_z2out\"],\n      grads:{\n        g_a1_z2out:\"∂L/∂a₁=(ŷ-y)σ′(z²)W²₁\",\n        g_a2_z2out:\"∂L/∂a₂=(ŷ-y)σ′(z²)W²₂\",\n        g_a3_z2out:\"∂L/∂a₃=(ŷ-y)σ′(z²)W²₃\"\n      }\n    },\n    {\n      title:\"Step 10: Cross the hidden activation edges\",\n      explain:`Now move from each hidden activation \\\\(a_j\\\\) back to the corresponding hidden linear node \\\\(z^1_j\\\\).`,\n      formula:String.raw`\\[\n\\begin{aligned}\n\\frac{\\partial L}{\\partial z^1_1}\n&=\n\\frac{\\partial L}{\\partial a_1}\n\\frac{\\partial a_1}{\\partial z^1_1}\n=\n(\\hat y-y)\\sigma'(z^2)W^2_1\\sigma'(z^1_1),\\\\\n\\frac{\\partial L}{\\partial z^1_2}\n&=\n(\\hat y-y)\\sigma'(z^2)W^2_2\\sigma'(z^1_2),\\\\\n\\frac{\\partial L}{\\partial z^1_3}\n&=\n(\\hat y-y)\\sigma'(z^2)W^2_3\\sigma'(z^1_3).\n\\end{aligned}\n\\]`,\n      note:`This is where the hidden-layer activation derivatives enter.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[],\n      backwardNodes:[\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\"],\n      backwardEdges:[\"e_z1_a1\",\"e_z2_a2\",\"e_z3_a3\"],\n      grads:{\n        g_z1_a1:\"× σ′(z¹₁)\",\n        g_z2_a2:\"× σ′(z¹₂)\",\n        g_z3_a3:\"× σ′(z¹₃)\"\n      }\n    },\n    {\n      title:\"Step 11: First-layer weights and biases\",\n      explain:`Finally differentiate the hidden linear expressions with respect to the first-layer weights and biases.`,\n      formula:String.raw`\\[\n\\begin{aligned}\n\\frac{\\partial L}{\\partial W^1_{1,j}}\n&=\n\\frac{\\partial L}{\\partial z^1_j}\n\\frac{\\partial z^1_j}{\\partial W^1_{1,j}}\n=\n(\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j)x_1,\\\\\n\\frac{\\partial L}{\\partial W^1_{2,j}}\n&=\n\\frac{\\partial L}{\\partial z^1_j}\n\\frac{\\partial z^1_j}{\\partial W^1_{2,j}}\n=\n(\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j)x_2,\\\\\n\\frac{\\partial L}{\\partial b^1_j}\n&=\n\\frac{\\partial L}{\\partial z^1_j}\n\\frac{\\partial z^1_j}{\\partial b^1_j}\n=\n(\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j).\n\\end{aligned}\n\\]`,\n      note:`So each first-layer weight gets: upstream gradient × output activation derivative × second-layer weight × hidden activation derivative × input.`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[],\n      backwardNodes:[\"x1\",\"x2\",\"z1\",\"z2\",\"z3\"],\n      backwardEdges:[\"e_x1_z1\",\"e_x1_z2\",\"e_x1_z3\",\"e_x2_z1\",\"e_x2_z2\",\"e_x2_z3\"],\n      grads:{\n        g_x1_z1:\"∂L/∂W¹₁,₁=(ŷ-y)σ′(z²)W²₁σ′(z¹₁)x₁\",\n        g_x2_z1:\"∂L/∂W¹₂,₁=(ŷ-y)σ′(z²)W²₁σ′(z¹₁)x₂\",\n        g_x1_z2:\"∂L/∂W¹₁,₂=(ŷ-y)σ′(z²)W²₂σ′(z¹₂)x₁\",\n        g_x2_z2:\"∂L/∂W¹₂,₂=(ŷ-y)σ′(z²)W²₂σ′(z¹₂)x₂\",\n        g_x1_z3:\"∂L/∂W¹₁,₃=(ŷ-y)σ′(z²)W²₃σ′(z¹₃)x₁\",\n        g_x2_z3:\"∂L/∂W¹₂,₃=(ŷ-y)σ′(z²)W²₃σ′(z¹₃)x₂\"\n      }\n    },\n    {\n      title:\"Step 12: Full result\",\n      explain:`Putting everything together gives the complete backpropagation formulas for this notation.`,\n      formula:String.raw`\\[\n\\begin{aligned}\n\\frac{\\partial L}{\\partial \\hat y} &= \\hat y-y,\\\\\n\\frac{\\partial L}{\\partial z^2} &= (\\hat y-y)\\sigma'(z^2),\\\\\n\\frac{\\partial L}{\\partial W^2_j} &= (\\hat y-y)\\sigma'(z^2)a_j,\\\\\n\\frac{\\partial L}{\\partial b^2} &= (\\hat y-y)\\sigma'(z^2),\\\\\n\\frac{\\partial L}{\\partial a_j} &= (\\hat y-y)\\sigma'(z^2)W^2_j,\\\\\n\\frac{\\partial L}{\\partial z^1_j} &= (\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j),\\\\\n\\frac{\\partial L}{\\partial W^1_{1,j}} &= (\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j)x_1,\\\\\n\\frac{\\partial L}{\\partial W^1_{2,j}} &= (\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j)x_2,\\\\\n\\frac{\\partial L}{\\partial b^1_j} &= (\\hat y-y)\\sigma'(z^2)W^2_j\\sigma'(z^1_j).\n\\end{aligned}\n\\]`,\n      note:`The output activation contributes the factor \\\\(\\\\sigma'(z^2)\\\\), and each hidden activation contributes \\\\(\\\\sigma'(z^1_j)\\\\).`,\n      linear:[\"z1\",\"z2\",\"z3\",\"z2out\"],\n      forwardNodes:[\"x1\",\"x2\",\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\",\"z2out\",\"yhat\",\"loss\"],\n      forwardEdges:[],\n      backwardNodes:[\"x1\",\"x2\",\"z1\",\"z2\",\"z3\",\"a1\",\"a2\",\"a3\",\"z2out\",\"yhat\",\"loss\"],\n      backwardEdges:[\"e_yhat_L\",\"e_z2out_yhat\",\"e_a1_z2out\",\"e_a2_z2out\",\"e_a3_z2out\",\"e_z1_a1\",\"e_z2_a2\",\"e_z3_a3\",\"e_x1_z1\",\"e_x1_z2\",\"e_x1_z3\",\"e_x2_z1\",\"e_x2_z2\",\"e_x2_z3\"],\n      grads:{\n        g_yhat_L:\"∂L/∂ŷ=ŷ-y\",\n        g_z2out_yhat:\"×σ′(z²)\",\n        g_a1_z2out:\"∂L/∂a₁=(ŷ-y)σ′(z²)W²₁\",\n        g_a2_z2out:\"∂L/∂a₂=(ŷ-y)σ′(z²)W²₂\",\n        g_a3_z2out:\"∂L/∂a₃=(ŷ-y)σ′(z²)W²₃\",\n        g_z1_a1:\"×σ′(z¹₁)\",\n        g_z2_a2:\"×σ′(z¹₂)\",\n        g_z3_a3:\"×σ′(z¹₃)\"\n      }\n    }\n  ];\n\n  function clearClasses(){\n    allNodes.forEach(id => $(id).className.baseVal = \"node\");\n    allEdges.forEach(id => $(id).setAttribute(\"class\",\"edge\"));\n    gradIds.forEach(id => {\n      $(id).textContent = \"\";\n      $(id).setAttribute(\"class\",\"grad\");\n    });\n  }\n\n  async function typesetIfReady() {\n    if (window.MathJax && MathJax.typesetPromise) {\n      try { await MathJax.typesetPromise(); } catch (e) {}\n    }\n  }\n\n  let step = 0;\n  function render(){\n    clearClasses();\n    const s = steps[step];\n\n    $(\"panelTitle\").innerHTML = s.title;\n    $(\"explain\").innerHTML = s.explain;\n    $(\"formula\").innerHTML = s.formula;\n    $(\"noteBox\").innerHTML = s.note;\n    $(\"stepBadge\").textContent = `Step ${step + 1} / ${steps.length}`;\n\n    linearNodes.forEach(id => $(id).classList.add(\"linear\"));\n    (s.forwardNodes || []).forEach(id => $(id).classList.add(\"forward\"));\n    (s.backwardNodes || []).forEach(id => $(id).classList.add(\"backward\"));\n    (s.linear || []).forEach(id => $(id).classList.add(\"linear\"));\n    (s.forwardEdges || []).forEach(id => $(id).setAttribute(\"class\",\"edge forward\"));\n    (s.backwardEdges || []).forEach(id => $(id).setAttribute(\"class\",\"edge backward\"));\n\n    if ((s.forwardNodes || []).includes(\"loss\") || (s.backwardNodes || []).includes(\"loss\")) {\n      $(\"loss\").classList.add(\"loss\");\n    }\n\n    Object.entries(s.grads || {}).forEach(([id, txt]) => {\n      $(id).textContent = txt;\n      $(id).classList.add(\"show\");\n    });\n\n    $(\"prevBtn\").disabled = step === 0;\n    $(\"nextBtn\").disabled = step === steps.length - 1;\n    $(\"prevBtn\").style.opacity = step === 0 ? 0.45 : 1;\n    $(\"nextBtn\").style.opacity = step === steps.length - 1 ? 0.45 : 1;\n\n    typesetIfReady();\n  }\n\n  $(\"nextBtn\").addEventListener(\"click\", () => {\n    if (step < steps.length - 1) {\n      step += 1;\n      render();\n    }\n  });\n  $(\"prevBtn\").addEventListener(\"click\", () => {\n    if (step > 0) {\n      step -= 1;\n      render();\n    }\n  });\n  $(\"resetBtn\").addEventListener(\"click\", () => {\n    step = 0;\n    render();\n  });\n\n  window.addEventListener(\"keydown\", (e) => {\n    if (e.key === \"ArrowRight\") $(\"nextBtn\").click();\n    if (e.key === \"ArrowLeft\") $(\"prevBtn\").click();\n  });\n\n  window.addEventListener(\"load\", () => {\n    render();\n    setTimeout(typesetIfReady, 300);\n  });\n<\/script>\n</body>\n</html>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Forward Pass","kicker":"","lede":"","leftBlocks":[{"mode":"pseudocode-latex","title":"","content":"Input: \\(x\\), parameters \\(W^1, b^1 \\dots, W^T, b^T\\)\n\n\\(a^0 \\leftarrow x\\)\nfor \\(t = 1\\) to \\(T\\) do\n  \\(z^t \\leftarrow W^t a^{t-1} + b^t\\)\n  \\(a^t \\leftarrow \\sigma(z^t)\\)\nend\n\n\\(\\hat y \\leftarrow a^T\\)\nreturn \\(\\hat y\\)"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Backward Pass","kicker":"","lede":"","leftBlocks":[{"mode":"pseudocode-latex","title":"","content":"Input: stored forward-pass values, target \\(y\\)\n\n\\(\\nabla_{W^T} \\ell \\leftarrow \\ell'(\\hat y, y)\\, a^T\\)\n\\(\\nabla_{b^T} \\ell \\leftarrow \\ell'(\\hat y, y)\\)\n\\(\\delta^T \\leftarrow \\ell'(\\hat y, y)\\, W^T \\odot \\sigma'(z^T)\\)\n\nfor \\(t = T-1\\) down to \\(1\\) do\n  \\(\\nabla_{W^t} \\ell \\leftarrow \\delta^{t+1} (a^{t})^\\top\\)\n  \\(\\nabla_{b^t} \\ell \\leftarrow \\delta^{t+1}\\)\n  if \\(t > 1\\) then\n    \\(\\delta^{t-1} \\leftarrow \\sigma'(z^{t-1}) \\odot (W^t)^\\top \\delta^t\\)\n  end\nend\n\nreturn all gradients"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Residual Connection","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Add input to output activations after each layer.\nUL:$\\phi(x) = x$ is hard to learn directly.\nUL:Helps with the problem of vanishing gradients."},{"mode":"custom","title":"","content":"\n<div class=\"diag\">\n  <svg class=\"diagram\" viewBox=\"0 0 560 230\" role=\"img\" aria-label=\"Residual connection\">\n    <g fill=\"white\" stroke=\"currentColor\" stroke-width=\"2.4\">\n      <ellipse cx=\"70\" cy=\"120\" rx=\"34\" ry=\"28\"></ellipse>\n      <ellipse cx=\"210\" cy=\"120\" rx=\"56\" ry=\"30\"></ellipse>\n      <circle cx=\"330\" cy=\"120\" r=\"18\"></circle>\n      <ellipse cx=\"455\" cy=\"120\" rx=\"82\" ry=\"34\"></ellipse>\n    </g>\n    <g stroke=\"currentColor\" stroke-width=\"2.4\" fill=\"none\">\n      <line x1=\"104\" y1=\"120\" x2=\"154\" y2=\"120\" class=\"edge\"/>\n      <line x1=\"266\" y1=\"120\" x2=\"312\" y2=\"120\" class=\"edge\"/>\n      <line x1=\"348\" y1=\"120\" x2=\"373\" y2=\"120\" class=\"edge\"/>\n      <path d=\"M70 92 C 150 40, 290 40, 328 103\" class=\"edge\"/>\n    </g>\n    <text x=\"60\" y=\"128\" class=\"label\">x</text>\n    <text x=\"189\" y=\"128\" class=\"label\">f(x)</text>\n    <text x=\"323\" y=\"127\" class=\"label\">+</text>\n    <text x=\"405\" y=\"128\" class=\"label\">f(x) + x</text>\n  </svg>\n</div>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Dense Net","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:Concatenate input to output activations after each layer. \nUL: Preserves earlier features for later layers."},{"mode":"custom","title":"","content":"<div class=\"diag\">\n  <svg class=\"diagram\" viewBox=\"0 0 560 230\" role=\"img\" aria-label=\"Dense connection\">\n    <g fill=\"white\" stroke=\"currentColor\" stroke-width=\"2.4\">\n      <ellipse cx=\"80\" cy=\"120\" rx=\"34\" ry=\"28\"></ellipse>\n      <ellipse cx=\"220\" cy=\"120\" rx=\"56\" ry=\"30\"></ellipse>\n      <ellipse cx=\"430\" cy=\"120\" rx=\"50\" ry=\"88\"></ellipse>\n    </g>\n    <g stroke=\"currentColor\" stroke-width=\"2.4\" fill=\"none\">\n      <line x1=\"114\" y1=\"120\" x2=\"164\" y2=\"120\" class=\"edge\"/>\n      <line x1=\"276\" y1=\"120\" x2=\"380\" y2=\"120\" class=\"edge\"/>\n      <path d=\"M80 93 C 160 55, 285 55, 380 120\" class=\"edge\"/>\n    </g>\n    <text x=\"70\" y=\"128\" class=\"label\">x</text>\n    <text x=\"194\" y=\"128\" class=\"label\">f(x)</text>\n    <text x=\"407\" y=\"90\" class=\"label\">f(x)</text>\n    <text x=\"422\" y=\"167\" class=\"label\">x</text>\n  </svg>\n</div>\n"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Batch Norm","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:For each layer, over the mini-batch compute\\[ \\mu^t = \\frac{1}{B}\\sum_{(x,y)\\in\\mathcal{D}_i} z^t(x,y) \\]\\[ \\sigma^t = \\text{variance of }z^t\\text{ over the mini-batch} \\]\nUL:Renormalize as\\[ \\mathrm{BN}(u^t) = \\gamma_t \\frac{z^t - \\mu^t}{\\sqrt{\\sigma^t + \\epsilon}} + \\beta_t \\]\nUL:Then compute\\[ a^t = \\sigma(\\mathrm{BN}(z^t)) \\]\nUL:$\\gamma_t$ and $\\beta_t$ are learned parameters.\nUL:Quickens training and reduces internal covariate shift.\nUL:Used for CNN’s (next lecture)"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Layernorm","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:For each layer $t$, compute\\[ \\mu^t = \\frac{1}{m_t}\\sum_{i} z^t_i \\]\\[ \\sigma^t = \\text{variance of }z^t\\text{ across coordinates or neurons in layer} \\]\nUL:Renormalize as\\[ \\mathrm{LN}(z^t) = \\gamma_t \\frac{z^t - \\mu^t}{\\sqrt{\\sigma^t + \\epsilon}} + \\beta_t \\]\nUL:Then compute\\[ a^t = \\sigma(\\mathrm{LN}(z^t)) \\]\nUL:$\\gamma_t$ and $\\beta_t$ are learned parameters.\nUL:Used widely \nUL:Doesnt need large batch like for batch norm"}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""},{"slideType":"single","headingLevel":"h1","bgColor":"#ffffff","fontColor":"#111111","title":"Automatic Differentiation","kicker":"","lede":"","leftBlocks":[{"mode":"panel","title":"","content":"UL:The Backpropagation style of chain rule for differentiation can be extended more generally\nUL:Given a generic neural network where each layer is differentiable, one can dynamically form a so called computation graph (kind of like the simple example we saw)\nUL:From here using Backpropagation style method, one can generically compute gradients automatically\nUL:This is roughly auto differentiation and this is why today all you do is write down your architecture and innards of GD we dont worry about."}],"rightBlocks":[],"notesTitle":"Speaker notes","notesBody":""}]}</script>

<script>
const deckPayload=JSON.parse(document.getElementById('deck-source').textContent);
function escapeHtml(str){return String(str??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escapeAttr(str){return escapeHtml(str).replace(/\n/g,'&#10;');}
function preserveMathTokens(str){const tokens=[];let out=String(str??'');const patterns=[/\$\$[\s\S]+?\$\$/g,/\\\[[\s\S]+?\\\]/g,/\\\([\s\S]+?\\\)/g,/\$(?!\s)[^$\n]+?\$/g];patterns.forEach(pattern=>{out=out.replace(pattern,m=>{const key='@@MATH'+tokens.length+'@@';tokens.push(m);return key;});});return {out,tokens};}
function restoreMathTokens(str,tokens){return String(str).replace(/@@MATH(\d+)@@/g,(_,i)=>tokens[Number(i)]??'');}
function hexToRgb(hex){const clean=String(hex||'').trim().replace('#','');if(!/^[0-9a-fA-F]{3}$|^[0-9a-fA-F]{6}$/.test(clean)) return null;const full=clean.length===3?clean.split('').map(c=>c+c).join(''):clean;const num=parseInt(full,16);return {r:(num>>16)&255,g:(num>>8)&255,b:num&255};}
function rgbaFromHex(hex,alpha){const rgb=hexToRgb(hex);if(!rgb) return 'rgba(0,0,0,'+alpha+')';return 'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+alpha+')';}
function buildSlideStyle(slide){const bg=slide.bgColor||'#ffffff';const font=slide.fontColor||'#111111';const muted=rgbaFromHex(font,0.72);const line=rgbaFromHex(font,0.14);return 'background:'+bg+';color:'+font+';--text:'+font+';--muted:'+muted+';--line:'+line+';';}
function parseStructuredText(raw){const text=String(raw??'').replace(/\r\n/g,'\n').trim();if(!text)return '';function safeWithMath(str){const p=preserveMathTokens(str);return restoreMathTokens(escapeHtml(p.out),p.tokens);}const lines=text.split('\n');const parts=[];let paragraph=[];let listType=null;let listItems=[];function flushParagraph(){if(!paragraph.length)return;const joined=paragraph.join(' ').trim();if(joined)parts.push('<p>'+safeWithMath(joined)+'</p>');paragraph=[];}function flushList(){if(!listItems.length)return;const tag=listType==='enumerate'?'ol':'ul';parts.push('<'+tag+'>'+listItems.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</'+tag+'>');listItems=[];listType=null;}function collectUntil(endPattern,startIndex){const chunk=[];let i=startIndex;while(i<lines.length&&!endPattern.test(lines[i].trim())){chunk.push(lines[i]);i+=1;}return {body:chunk.join('\n').trim(),endIndex:i};}function simpleCardBody(body){const trimmed=body.trim();if(!trimmed)return '';return trimmed.split(/\n\s*\n/).map(block=>'<p>'+safeWithMath(block.replace(/\s*\n\s*/g,' ').trim())+'</p>').join('');}
for(let i=0;i<lines.length;i+=1){const line=lines[i].trim();if(!line){flushParagraph();flushList();continue;}const paragraphMatch=line.match(/^\\paragraph\{([\s\S]*)\}$/);if(paragraphMatch){flushParagraph();flushList();parts.push('<p>'+safeWithMath(paragraphMatch[1].trim())+'</p>');continue;}if(/^\\begin\{itemize\}$/i.test(line)){flushParagraph();flushList();const items=[];i+=1;while(i<lines.length&&!/^\\end\{itemize\}$/i.test(lines[i].trim())){const itemLine=lines[i].trim();if(itemLine){const itemMatch=itemLine.match(/^\\item\s+([\s\S]*)$/);if(itemMatch)items.push(itemMatch[1].trim());}i+=1;}parts.push('<ul>'+items.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</ul>');continue;}if(/^\\begin\{enumerate\}$/i.test(line)){flushParagraph();flushList();const items=[];i+=1;while(i<lines.length&&!/^\\end\{enumerate\}$/i.test(lines[i].trim())){const itemLine=lines[i].trim();if(itemLine){const itemMatch=itemLine.match(/^\\item\s+([\s\S]*)$/);if(itemMatch)items.push(itemMatch[1].trim());}i+=1;}parts.push('<ol>'+items.map(item=>'<li>'+safeWithMath(item)+'</li>').join('')+'</ol>');continue;}if(/^\\begin\{equation\}$/i.test(line)){flushParagraph();flushList();const collected=collectUntil(/^\\end\{equation\}$/i,i+1);parts.push('<div class="display-math">\\[\\begin{aligned}'+escapeHtml(collected.body)+'\\end{aligned}\\]</div>');i=collected.endIndex;continue;}const cardBegin=line.match(/^\\begin\{card\}\{([\s\S]*)\}$/i);if(cardBegin){flushParagraph();flushList();const collected=collectUntil(/^\\end\{card\}$/i,i+1);parts.push('<div class="bullet-card"><b>'+safeWithMath(cardBegin[1].trim())+'</b><div>'+simpleCardBody(collected.body)+'</div></div>');i=collected.endIndex;continue;}if(/^UL:/i.test(line)){flushParagraph();if(listType&&listType!=='itemize')flushList();listType='itemize';listItems.push(line.replace(/^UL:/i,'').trim());continue;}if(line.startsWith('- ')){flushParagraph();if(listType&&listType!=='itemize')flushList();listType='itemize';listItems.push(line.slice(2).trim());continue;}flushList();if(line.startsWith('### ')){flushParagraph();parts.push('<h3>'+safeWithMath(line.slice(4).trim())+'</h3>');continue;}if(/^P:/i.test(line)){flushParagraph();parts.push('<p>'+safeWithMath(line.replace(/^P:/i,'').trim())+'</p>');continue;}if(/^EQ:/i.test(line)){flushParagraph();parts.push('<div class="display-math">'+safeWithMath(line.replace(/^EQ:/i,'').trim())+'</div>');continue;}if(/^CARD:/i.test(line)){flushParagraph();const payload=line.replace(/^CARD:/i,'').trim();const pieces=payload.split('|');const cardTitle=pieces.shift()||'';const cardBody=pieces.join('|');parts.push('<div class="bullet-card"><b>'+safeWithMath(cardTitle)+'</b><div><p>'+safeWithMath(cardBody)+'</p></div></div>');continue;}paragraph.push(line);}flushParagraph();flushList();return parts.join('\n');}
function diagramMarkup(){return '<div class="diag"><svg class="diagram" viewBox="0 0 760 430" role="img" aria-label="Tiny neural network diagram placeholder"><line x1="145" y1="145" x2="355" y2="125" class="edge"/><line x1="145" y1="145" x2="355" y2="295" class="edge"/><line x1="145" y1="285" x2="355" y2="125" class="edge"/><line x1="145" y1="285" x2="355" y2="295" class="edge"/><line x1="405" y1="125" x2="615" y2="215" class="edge"/><line x1="405" y1="295" x2="615" y2="215" class="edge"/><circle cx="115" cy="145" r="34" class="node"/><circle cx="115" cy="285" r="34" class="node"/><circle cx="375" cy="125" r="34" class="node"/><circle cx="375" cy="295" r="34" class="node"/><circle cx="645" cy="215" r="34" class="node"/><text x="88" y="153" class="label">x₁</text><text x="88" y="293" class="label">x₂</text><text x="350" y="133" class="label">h₁</text><text x="350" y="303" class="label">h₂</text><text x="632" y="223" class="label">ŷ</text></svg></div>';}
function customFrameMarkup(raw){const html=String(raw||'').trim();if(!html)return '<div class="placeholder">Paste custom HTML here.</div>';return '<div class="custom-frame-wrap"><iframe class="custom-frame" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-downloads" referrerpolicy="no-referrer" srcdoc="'+escapeAttr(html)+'"></iframe></div>';}
function normalizeBlock(block){return {mode:block.mode||'panel',title:block.title||'',content:block.content||''};}
function normalizeSlide(slide){const out=JSON.parse(JSON.stringify(slide||{}));let leftBlocks=Array.isArray(out.leftBlocks)?out.leftBlocks.map(normalizeBlock):null;let rightBlocks=Array.isArray(out.rightBlocks)?out.rightBlocks.map(normalizeBlock):null;if(!leftBlocks){leftBlocks=[{mode:out.leftMode||'panel',title:'',content:out.leftHtml||''}];}if(!rightBlocks){rightBlocks=out.slideType==='two-col'?[{mode:out.rightMode||'panel',title:'',content:out.rightHtml||''}]:[];}out.leftBlocks=leftBlocks;out.rightBlocks=rightBlocks;return out;}
function renderBlock(block,placeholderText){const resolvedMode=block.mode||'panel';const raw=block.content||'';if(resolvedMode==='diagram')return diagramMarkup();if(resolvedMode==='custom')return customFrameMarkup(raw);if(resolvedMode==='placeholder')return '<div class="placeholder">'+escapeHtml(raw||placeholderText||'Placeholder')+'</div>';if(resolvedMode==='pseudocode')return '<pre class="pseudo-block">'+escapeHtml(raw)+'</pre>';if(resolvedMode==='pseudocode-latex'){const p=preserveMathTokens(raw);return '<div class="pseudo-latex-block">'+restoreMathTokens(escapeHtml(p.out),p.tokens)+'</div>';}return '<div class="rich">'+parseStructuredText(raw)+'</div>';}
function renderBlocks(blocks,placeholder){const list=blocks&&blocks.length?blocks:[{mode:'placeholder',content:placeholder||'Add a block'}];return '<div class="col-stack">'+list.map(block=>renderBlock(block,placeholder)).join('')+'</div>';}
function buildSlideInner(slide){const heading=slide.headingLevel||'h2';const titleHtml='<'+heading+'>'+escapeHtml(slide.title||'Untitled slide').replace(/\n/g,'<br>')+'</'+heading+'>';const kickerHtml=slide.kicker?'<div class="kicker">'+escapeHtml(slide.kicker)+'</div>':'';const ledeHtml=slide.lede?'<div class="lede">'+escapeHtml(slide.lede)+'</div>':'';const s=normalizeSlide(slide);if(s.slideType==='title-center')return '<div class="title-center">'+titleHtml+kickerHtml+'</div>';if(s.slideType==='two-col'){return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col">'+renderBlocks(s.leftBlocks,'Left column')+'</div><div class="col">'+renderBlocks(s.rightBlocks,'Right column')+'</div></div>';}return titleHtml+kickerHtml+ledeHtml+'<div class="slide-body"><div class="col">'+renderBlocks(s.leftBlocks,'Main content')+'</div></div>';}
const deck=document.getElementById('deck');const slideMap=document.getElementById('slideMap');const slideMapList=document.getElementById('slideMapList');document.getElementById('deckTitle').textContent=deckPayload.deckTitle||'Slides';
deck.innerHTML=deckPayload.slides.map((slide,idx)=>{const cls=slide.slideType==='title-center'?'deck-slide title-center':(slide.slideType==='two-col'?'deck-slide two-col':'deck-slide single');return '<section class="'+cls+'" data-index="'+idx+'" style="'+buildSlideStyle(slide)+'"><button class="slides-button" type="button">Slides</button><div class="slide-number">'+(idx+1)+' / '+deckPayload.slides.length+'</div>'+buildSlideInner(slide).trim()+'</section>';}).join('\n');
slideMapList.innerHTML=deckPayload.slides.map((slide,idx)=>'<button type="button" class="slide-map-item" data-go="'+idx+'"><span>'+(idx+1)+'.</span><span>'+escapeHtml(slide.title||('Slide '+(idx+1)))+'</span></button>').join('');
let active=0;const slideEls=Array.from(document.querySelectorAll('.deck-slide'));
function render(){slideEls.forEach((el,i)=>el.classList.toggle('active',i===active));if(window.MathJax&&typeof window.MathJax.typesetPromise==='function'){if(typeof window.MathJax.typesetClear==='function')window.MathJax.typesetClear(slideEls);window.MathJax.typesetPromise(slideEls.filter(el=>el.classList.contains('active'))).catch(()=>{});}}
function go(i){if(i<0||i>=slideEls.length)return;active=i;render();slideMap.classList.remove('open');}
document.getElementById('prevBtn').addEventListener('click',()=>go(active-1));document.getElementById('nextBtn').addEventListener('click',()=>go(active+1));document.getElementById('closeMapBtn').addEventListener('click',()=>slideMap.classList.remove('open'));document.querySelectorAll('.slides-button').forEach(btn=>btn.addEventListener('click',()=>slideMap.classList.add('open')));document.querySelectorAll('[data-go]').forEach(btn=>btn.addEventListener('click',()=>go(Number(btn.dataset.go))));window.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key)){e.preventDefault();go(active+1);}if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();go(active-1);}if(e.key==='Escape')slideMap.classList.remove('open');});render();
</script>
</body>
</html>
