<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ID3 Decision Boundary Demo</title>
<style>
  :root{
    --bg:#f4f7fb; --card:#fff; --ink:#162033; --muted:#647089; --border:#d7deea;
    --red:#d95c5c; --blue:#4d7fff; --shadow:0 10px 28px rgba(24,39,75,.08)
  }
  *{box-sizing:border-box}
  body{margin:0;padding:18px;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  .page{display:grid;gap:16px}
  .top{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:16px;display:grid;gap:12px}
  h1,h2,p{margin:0}
  .control{display:grid;gap:6px}
  label{font-weight:700;font-size:.95rem}
  select,button{font:inherit;border:1px solid var(--border);border-radius:12px;padding:10px 12px;background:#fff;color:var(--ink)}
  canvas{display:block;border:1px solid var(--border);border-radius:16px;background:#fff;width:100%;height:auto}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .box{padding:12px;border-radius:14px;background:#f8faff;border:1px solid #e4eaf5}
  .box strong{display:block;font-size:1.02rem}
  .note{color:var(--muted);font-size:.94rem;line-height:1.4}
  .legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:.92rem}
  .dot{width:12px;height:12px;border-radius:999px;display:inline-block;vertical-align:middle;margin-right:6px}
  .rules{display:grid;gap:8px}
  .rule{padding:10px 12px;border-radius:12px;background:#f8faff;border:1px solid #e4eaf5;font-size:.94rem}
  @media (max-width: 920px){ .top{grid-template-columns:1fr} .grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <section class="card">
      <h2>Demo 2: run ID3 automatically</h2>
      <p class="note">Choose an impurity, then click <strong>Run ID3</strong>. The demo learns a greedy axis-aligned decision tree and draws its decision regions.</p>

      <div class="control">
        <label for="preset">Dataset</label>
        <select id="preset">
          <option value="gaussian">Two Gaussian blobs</option>
          <option value="xor">XOR</option>
          <option value="stripes">Vertical stripes</option>
        </select>
      </div>
      <div class="control">
        <label for="criterion">Impurity</label>
        <select id="criterion">
          <option value="gini">Gini impurity</option>
          <option value="entropy">Entropy</option>
        </select>
      </div>

      <div class="grid">
        <button id="runBtn">Run ID3</button>
        <button id="regenBtn">Regenerate data</button>
      </div>

      <div class="grid">
        <div class="box"><strong id="nodeCount">—</strong><span class="note">nodes</span></div>
        <div class="box"><strong id="leafCount">—</strong><span class="note">leaves</span></div>
        <div class="box"><strong id="depthUsed">—</strong><span class="note">depth used</span></div>
        <div class="box"><strong id="trainAcc">—</strong><span class="note">training accuracy</span></div>
      </div>

      <div class="legend">
        <span><span class="dot" style="background:#d95c5c"></span> red class</span>
        <span><span class="dot" style="background:#4d7fff"></span> blue class</span>
        <span>background shading = ID3 prediction</span>
      </div>
    </section>

    <section class="card">
      <canvas id="canvas" width="760" height="520"></canvas>
      <div>
        <h3 style="margin-bottom:8px">Learned rules</h3>
        <div id="rules" class="rules"></div>
      </div>
    </section>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);
const controls = { preset:$('preset'), criterion:$('criterion'), run:$('runBtn'), regen:$('regenBtn') };
const outputs = { nodeCount:$('nodeCount'), leafCount:$('leafCount'), depthUsed:$('depthUsed'), trainAcc:$('trainAcc'), rules:$('rules') };

let state = { points:[], tree:null, seed:17, fitted:false };

function mulberry32(a){ return function(){ a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
function randn(rng){ let u=0,v=0; while(!u)u=rng(); while(!v)v=rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
function pointToCanvas(p){ return { x:(p.x+1)*0.5*canvas.width, y:(1-(p.y+1)*0.5)*canvas.height }; }
function canvasToPoint(px, py){ return { x:px/canvas.width*2-1, y:(1-py/canvas.height)*2-1 }; }
function impurity(points){
  if (!points.length) return 0;
  let blue = 0;
  for (const p of points) if (p.label === 1) blue++;
  const p1 = blue / points.length, p0 = 1 - p1;
  if (controls.criterion.value === 'entropy'){
    let h = 0;
    if (p1 > 0) h -= p1 * Math.log2(p1);
    if (p0 > 0) h -= p0 * Math.log2(p0);
    return h;
  }
  return p1*(1-p1) + p0*(1-p0);
}
function majorityLabel(points){
  let s=0; for (const p of points) s += p.label;
  return s >= 0 ? 1 : -1;
}
function allSame(points){
  if (!points.length) return true;
  const y = points[0].label;
  for (const p of points) if (p.label !== y) return false;
  return true;
}
function candidateThresholds(points, axis){
  const vals = [...new Set(points.map(p => axis===0 ? p.x : p.y).sort((a,b)=>a-b))];
  const out = [];
  for (let i=0;i<vals.length-1;i++) out.push((vals[i] + vals[i+1]) / 2);
  return out;
}
function split(points, axis, thr){
  const left=[], right=[];
  for (const p of points) ((axis===0 ? p.x : p.y) <= thr ? left : right).push(p);
  return {left, right};
}
function buildTree(points, depth=0, maxDepth=5, minLeaf=2){
  const node = { points, depth, prediction: majorityLabel(points), splitAxis:null, splitValue:null, left:null, right:null };
  if (depth >= maxDepth || points.length < 2*minLeaf || allSame(points)) return node;
  const parentImp = impurity(points);
  let best = null;
  for (const axis of [0,1]){
    for (const thr of candidateThresholds(points, axis)){
      const {left, right} = split(points, axis, thr);
      if (left.length < minLeaf || right.length < minLeaf) continue;
      const weighted = (left.length/points.length)*impurity(left) + (right.length/points.length)*impurity(right);
      const gain = parentImp - weighted;
      if (!best || weighted < best.weighted || (Math.abs(weighted-best.weighted)<1e-9 && gain > best.gain)){
        best = {axis, thr, left, right, weighted, gain};
      }
    }
  }
  if (!best) return node;
  node.splitAxis = best.axis;
  node.splitValue = best.thr;
  node.left = buildTree(best.left, depth+1, maxDepth, minLeaf);
  node.right = buildTree(best.right, depth+1, maxDepth, minLeaf);
  return node;
}
function predict(node,p){
  let cur=node;
  while (cur.left && cur.right){
    cur = ((cur.splitAxis===0 ? p.x : p.y) <= cur.splitValue) ? cur.left : cur.right;
  }
  return cur.prediction;
}
function countNodes(node){
  if (!node.left || !node.right) return {nodes:1, leaves:1, maxDepth:node.depth};
  const a=countNodes(node.left), b=countNodes(node.right);
  return {nodes:1+a.nodes+b.nodes, leaves:a.leaves+b.leaves, maxDepth:Math.max(node.depth,a.maxDepth,b.maxDepth)};
}
function rulesText(node, lines=[], prefix=''){
  if (!node.left || !node.right){
    const cls = node.prediction===1 ? 'blue' : 'red';
    lines.push(`${prefix}leaf → predict ${cls} (${node.points.length} pts)`);
    return lines;
  }
  const axis = node.splitAxis === 0 ? 'x₁' : 'x₂';
  lines.push(`${prefix}if ${axis} ≤ ${node.splitValue.toFixed(2)}`);
  rulesText(node.left, lines, prefix+'  ');
  lines.push(`${prefix}else`);
  rulesText(node.right, lines, prefix+'  ');
  return lines;
}
function generateData(){
  state.seed = (state.seed * 1664525 + 1013904223) >>> 0;
  const rng = mulberry32(state.seed || 1);
  const pts = [];
  const n = 32, preset = controls.preset.value;
  if (preset === 'gaussian'){
    for (let i=0;i<n;i++){
      pts.push({x:clamp(-0.45 + 0.22*randn(rng),-1,1), y:clamp(-0.05 + 0.26*randn(rng),-1,1), label:-1});
      pts.push({x:clamp(0.43 + 0.22*randn(rng),-1,1), y:clamp(0.08 + 0.26*randn(rng),-1,1), label:1});
    }
  } else if (preset === 'xor'){
    const cs=[[-0.55,-0.55,-1],[0.55,0.55,-1],[-0.55,0.55,1],[0.55,-0.55,1]];
    for (const [cx,cy,lab] of cs) for (let i=0;i<n/2;i++) pts.push({x:clamp(cx+0.17*randn(rng),-1,1), y:clamp(cy+0.17*randn(rng),-1,1), label:lab});
  } else {
    for (let i=0;i<2*n;i++){
      const x = -0.95 + 1.9 * rng();
      const y = -0.92 + 1.84 * rng();
      const band = Math.floor((x + 1) / 0.52);
      pts.push({x,y,label:band%2===0 ? -1 : 1});
    }
  }
  state.points = pts;
  state.tree = null;
  state.fitted = false;
}
function drawAxes(clearFirst=true){
  if (clearFirst) ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#edf1f8';
  ctx.lineWidth = 1;
  for (let g=1; g<4; g++){
    const x = g/4 * canvas.width, y = g/4 * canvas.height;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
  }
  ctx.strokeStyle = '#aeb8cc';
  ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.moveTo(canvas.width/2,0); ctx.lineTo(canvas.width/2,canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,canvas.height/2); ctx.lineTo(canvas.width,canvas.height/2); ctx.stroke();
}
function drawBackground(){
  if (!state.tree) return;
  const gs=48, cellW = canvas.width/gs, cellH = canvas.height/gs;
  for (let gy=0; gy<gs; gy++){
    for (let gx=0; gx<gs; gx++){
      const p = canvasToPoint((gx+.5)*cellW, (gy+.5)*cellH);
      const pred = predict(state.tree,p);
      ctx.fillStyle = pred===1 ? 'rgba(132,165,255,.22)' : 'rgba(255,164,164,.24)';
      ctx.fillRect(gx*cellW, gy*cellH, cellW+1, cellH+1);
    }
  }
}
function drawPoints(){
  for (const p of state.points){
    const q = pointToCanvas(p);
    ctx.beginPath();
    ctx.arc(q.x,q.y,7.0,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(q.x,q.y,5.5,0,Math.PI*2);
    ctx.fillStyle = p.label===1 ? '#4d7fff' : '#d95c5c';
    ctx.fill();
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(0,0,0,.24)';
    ctx.stroke();
  }
}

function drawSplitLines(node, xmin=-1, xmax=1, ymin=-1, ymax=1){
  if (!node || !node.left || !node.right) return;
  ctx.save();
  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 2.2;
  ctx.setLineDash([10,7]);
  if (node.splitAxis === 0){
    const x = pointToCanvas({x:node.splitValue, y:0}).x;
    const top = pointToCanvas({x:0, y:ymax}).y;
    const bot = pointToCanvas({x:0, y:ymin}).y;
    ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bot); ctx.stroke();
    ctx.restore();
    drawSplitLines(node.left, xmin, node.splitValue, ymin, ymax);
    drawSplitLines(node.right, node.splitValue, xmax, ymin, ymax);
  } else {
    const y = pointToCanvas({x:0, y:node.splitValue}).y;
    const left = pointToCanvas({x:xmin, y:0}).x;
    const right = pointToCanvas({x:xmax, y:0}).x;
    ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
    ctx.restore();
    drawSplitLines(node.left, xmin, xmax, ymin, node.splitValue);
    drawSplitLines(node.right, xmin, xmax, node.splitValue, ymax);
  }
}
function renderStats(){
  if (!state.tree){
    outputs.nodeCount.textContent = '—';
    outputs.leafCount.textContent = '—';
    outputs.depthUsed.textContent = '—';
    outputs.trainAcc.textContent = '—';
    outputs.rules.innerHTML = '<div class="rule">Press “Run ID3” to fit and draw the decision boundary.</div>';
    return;
  }
  const counts = countNodes(state.tree);
  let correct = 0;
  for (const p of state.points) if (predict(state.tree,p) === p.label) correct++;
  outputs.nodeCount.textContent = String(counts.nodes);
  outputs.leafCount.textContent = String(counts.leaves);
  outputs.depthUsed.textContent = String(counts.maxDepth);
  outputs.trainAcc.textContent = (100 * correct / Math.max(1, state.points.length)).toFixed(1) + '%';
  outputs.rules.innerHTML = '';
  for (const line of rulesText(state.tree, [])){
    const div = document.createElement('div');
    div.className = 'rule';
    div.textContent = line;
    outputs.rules.appendChild(div);
  }
}
function render(){
  drawAxes(true);
  drawBackground();
  drawAxes(false);
  if (state.tree) drawSplitLines(state.tree);
  drawPoints();
  renderStats();
}
controls.run.addEventListener('click', ()=>{ state.tree = buildTree(state.points, 0, 5, 2); state.fitted = true; render(); });
controls.regen.addEventListener('click', ()=>{ generateData(); render(); });
controls.preset.addEventListener('change', ()=>{ generateData(); render(); });
controls.criterion.addEventListener('change', ()=>{ state.tree = null; state.fitted = false; render(); });

function initializeDemo(){
  generateData();
  render();
}
initializeDemo();
window.addEventListener('load', initializeDemo);
</script>
</body>
</html>
