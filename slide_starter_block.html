<!-- ========================================================= -->
<!-- COPY THIS WHOLE BLOCK TO ADD A NEW SLIDE                   -->
<!-- ========================================================= -->
<section class="slide" data-title="New Slide Title" data-section="Section Name">
  <div class="slide-shell">
    <div class="slide-topbar">
      <div class="slide-meta">
        <span class="pill">Section Name</span>
        <span class="pill">Optional Tag</span>
      </div>
      <div class="slide-tools">
        <button class="open-refs-btn hidden">References</button>
        <button class="open-toc-btn">Slides</button>
      </div>
    </div>

    <div class="slide-content">
      <!-- ==================== SLIDE BODY START ==================== -->
      <h1 class="slide-title">New slide title</h1>
      <p class="slide-subtitle">Paste your HTML content here.</p>
      <!-- ===================== SLIDE BODY END ===================== -->

      <!-- ================= OPTIONAL REFERENCES START ============== -->
      <div class="slide-references hidden">
        <a href="https://example.com"
           data-desc="This appears only if the user opens References on this slide.">
          Example reference
        </a>
      </div>
      <!-- ================== OPTIONAL REFERENCES END =============== -->
    </div>

    <div class="slide-footer">
      <div class="mini">Optional footer note.</div>
      <div class="progress-wrap">
        <div class="progress"><div class="progress-bar"></div></div>
        <div class="slideCounterLocal">? / ?</div>
      </div>
    </div>
  </div>
</section>
